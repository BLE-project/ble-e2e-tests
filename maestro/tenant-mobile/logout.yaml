appId: com.terrio.tenant
---
# Tenant Mobile — Logout flow

- launchApp:
    clearState: true

- extendedWaitUntil:
    visible: "TERRIO Tenant"
    timeout: 30000

- tapOn:
    text: "Email"
- inputText: "dev-tenant-admin"
- tapOn:
    text: "Password"
- inputText: "dev-pass"
- tapOn: "Sign in"

- extendedWaitUntil:
    visible: "Home"
    timeout: 8000

- tapOn: "Settings"
- extendedWaitUntil:
    visible: "Settings"
    timeout: 5000

- runFlow:
    when:
      visible: "Logout"
    commands:
      - tapOn: "Logout"

- runFlow:
    when:
      visible: "Esci"
    commands:
      - tapOn: "Esci"

- extendedWaitUntil:
    visible: "Tenant admin portal"
    timeout: 8000
