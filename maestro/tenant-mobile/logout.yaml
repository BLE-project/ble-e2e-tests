appId: com.terrio.tenant
---
# Tenant Mobile — Logout flow

- launchApp:
    stopApp: true

# Warm launches skip the splash and boot directly into Home.
- extendedWaitUntil:
    visible:
      text: "TERRIO Tenant|Tenant admin portal|Welcome back"
    timeout: 30000

# Previous flows may have persisted auth tokens in SecureStore, so the app
# can auto-log-in and skip the login screen entirely. Only perform the
# login steps if the login screen is actually visible.
- runFlow:
    when:
      visible: "Tenant admin portal"
    commands:
      - tapOn: { id: "username-input" }
      - inputText: "dev-tenant-admin"
      - hideKeyboard
      - tapOn: { id: "password-input" }
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn: { id: "login-btn" }
      # Login screen inputs now have importantForAutofill="no" (rebuilt APK),
      # so Google save-password prompt should no longer appear. Fallback tap
      # kept for defensive coverage.
      - tapOn:
          text: "Non ora|Never|Not now"
          optional: true
      - extendedWaitUntil:
          visible: "Welcome back"
          timeout: 15000

- tapOn: "Settings"
- extendedWaitUntil:
    visible: "Account"
    timeout: 5000

# Settings tab exposes a red "Sign out" button directly (no Logout/Esci).
- tapOn: "Sign out"

# KI-S56-01 CLOSED (2026-04-18): declarative <Redirect /> in AuthGuard swaps
# routes synchronously during render — no more addViewAt race on main.
# The dismiss block below is kept as defensive fallback for older builds.
- runFlow:
    when:
      visible: "addViewAt"
    commands:
      - tapOn:
          text: "DISMISS.*"

- extendedWaitUntil:
    visible: "Tenant admin portal"
    timeout: 10000
