appId: it.terrio.tenant
---
# Tenant Mobile — Logout flow

- launchApp:
    stopApp: true

# Warm launches skip the splash and boot directly into Home.
- extendedWaitUntil:
    visible:
      text: ".*(TERRIO Tenant|Tenant admin portal|Welcome back|Amministra il tuo programma).*"
    timeout: 30000

# Previous flows may have persisted auth tokens in SecureStore, so the app
# can auto-log-in and skip the login screen entirely. Only perform the
# login steps if the login screen is actually visible.
# FIX-ITER5-002 (2026-05-02): "Email" label removed; gate on "Accedi|Sign in"
# button — deterministic marker for the unauthenticated screen.
- runFlow:
    when:
      visible: "Accedi|Sign in"
    commands:
      - tapOn: { id: "username-input" }
      - inputText: "dev-tenant-admin"
      - hideKeyboard
      - tapOn: { id: "password-input" }
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn: { id: "login-btn" }
      - runFlow:
          when:
            visible: "Accesso più rapido"
          commands:
            - pressKey: Back
      - extendedWaitUntil:
          visible: "Welcome back"
          timeout: 15000

# Iter3-A: biometric "Accesso più rapido" dialog re-appears on warm launches.
# Tapping "Non ora" triggers app logout (bug); use Back to dismiss.
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      - pressKey: Back

- tapOn:
    text: ".*, Impostazioni"
- extendedWaitUntil:
    visible:
      text: ".*(Account|Impostazioni|Settings).*"
    timeout: 5000

# Settings tab exposes a red "Sign out" button directly (no Logout/Esci).
- tapOn: "Sign out"

# KI-S56-01 CLOSED (2026-04-18): declarative <Redirect /> in AuthGuard swaps
# routes synchronously during render — no more addViewAt race on main.
# The dismiss block below is kept as defensive fallback for older builds.
- runFlow:
    when:
      visible: "addViewAt"
    commands:
      - tapOn:
          text: "DISMISS.*"

- extendedWaitUntil:
    visible:
      text: ".*(TERRIO Tenant|Tenant admin portal|Amministra il tuo programma).*"
    timeout: 10000
