appId: com.terrio.tenant
---
# Tenant Mobile — Full tab navigation
# Tab bar: Home | Territories | Beacons | Theme | Settings | Report

- launchApp:
    clearState: true

- extendedWaitUntil:
    visible: "TERRIO Tenant"
    timeout: 30000

- tapOn:
    text: "Email"
- inputText: "dev-tenant-admin"
- tapOn:
    text: "Password"
- inputText: "dev-pass"
- tapOn: "Sign in"

- extendedWaitUntil:
    visible: "Home"
    timeout: 8000

# ── Tab navigation ─────────────────────────────────────────────────────────

- tapOn: "Territories"
- extendedWaitUntil:
    visible: "Territories"
    timeout: 5000

- tapOn: "Beacons"
- extendedWaitUntil:
    visible: "Beacons"
    timeout: 5000

- tapOn: "Theme"
- extendedWaitUntil:
    visible: "White-label"
    timeout: 5000

- tapOn: "Settings"
- extendedWaitUntil:
    visible: "Settings"
    timeout: 5000

- tapOn: "Report"
- extendedWaitUntil:
    visible: "Report Bug"
    timeout: 5000

# Return to home
- tapOn: "Home"
- extendedWaitUntil:
    visible: "Home"
    timeout: 5000
