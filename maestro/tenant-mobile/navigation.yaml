appId: com.terrio.tenant
---
# Tenant Mobile — Tab navigation smoke test
# Iter3 (2026-05-02): tabs realigned to actual app UI captured via uiautomator dump.
# Actual tabs (content-desc): Home | Territori | Beacon | Theme | Moderazione | Merchant | Impostazioni | Report
# (Territories/Beacons/Settings English labels used in older builds.)

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: ".*(TERRIO Tenant|Tenant admin portal|Welcome back|Amministra il tuo programma).*"
    timeout: 30000

# FIX-ITER5-002 (2026-05-02): login screen no longer shows visible "Email" label
# (placeholders only). Gate on the "Accedi" / "Sign in" button which deterministically
# marks the unauthenticated screen.
- runFlow:
    when:
      visible: "Accedi|Sign in"
    commands:
      - tapOn:
          id: "username-input"
      - inputText: "dev-tenant-admin"
      - hideKeyboard
      - tapOn:
          id: "password-input"
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn:
          id: "login-btn"
      - runFlow:
          when:
            visible: "Accesso più rapido"
          commands:
            - pressKey: Back
      - extendedWaitUntil:
          visible:
            text: ".*(Welcome back|Home).*"
          timeout: 15000

- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      # Iter3-A workaround: tapping "Non ora" triggers app logout (bug).
      - pressKey: Back
- runFlow:
    when:
      visible: "Clipboard"
    commands:
      - pressKey: Back

# ── Tab navigation ─────────────────────────────────────────────────────────

- tapOn:
    text: ".*, Territori"
- extendedWaitUntil:
    visible:
      text: ".*Territori.*"
    timeout: 5000

- tapOn:
    text: ".*, Beacon"
- extendedWaitUntil:
    visible:
      text: ".*Beacon.*"
    timeout: 5000

- tapOn:
    text: ".*, Theme"
- extendedWaitUntil:
    visible:
      text: ".*(Theme|White-label).*"
    timeout: 5000

- tapOn:
    text: ".*, Impostazioni"
- extendedWaitUntil:
    visible:
      text: ".*(Impostazioni|Settings|Account).*"
    timeout: 5000

- tapOn:
    text: ".*, Report"
- extendedWaitUntil:
    visible:
      text: ".*(Report Bug|Report).*"
    timeout: 5000

- tapOn:
    text: ".*, Home"
- extendedWaitUntil:
    visible:
      text: ".*(Welcome back|Home).*"
    timeout: 5000
