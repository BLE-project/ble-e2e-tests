appId: com.terrio.tenant
---
# Tenant Mobile — Full tab navigation
# Tab bar: Home | Territories | Beacons | Theme | Settings | Report

- launchApp:
    stopApp: true

# Warm launches skip the splash and boot directly into Home. Accept any
# post-launch stable state.
- extendedWaitUntil:
    visible:
      text: "TERRIO Tenant|Tenant admin portal|Welcome back"
    timeout: 30000

# Previous flows may have persisted auth tokens in SecureStore. Only run
# the login steps if the login screen is actually showing.
- runFlow:
    when:
      visible: "Tenant admin portal"
    commands:
      - tapOn:
          text: "Email"
      - inputText: "dev-tenant-admin"
      - hideKeyboard
      - tapOn:
          text: "Password"
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn: "Sign in"
      - extendedWaitUntil:
          visible: "Welcome back"
          timeout: 8000

# ── Tab navigation ─────────────────────────────────────────────────────────

- tapOn: "Territories"
- extendedWaitUntil:
    visible: "Territories"
    timeout: 5000

- tapOn: "Beacons"
- extendedWaitUntil:
    visible: "Beacons"
    timeout: 5000

- tapOn: "Theme"
- extendedWaitUntil:
    visible: "White-label"
    timeout: 5000

- tapOn: "Settings"
- extendedWaitUntil:
    visible: "Settings"
    timeout: 5000

- tapOn: "Report"
- extendedWaitUntil:
    visible: "Report Bug"
    timeout: 5000

# Return to home
- tapOn: "Home"
- extendedWaitUntil:
    visible: "Home"
    timeout: 5000
