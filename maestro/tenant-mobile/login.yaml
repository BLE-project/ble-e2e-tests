appId: com.terrio.tenant
---
# Tenant Mobile — Login flow + BUG-003 verification

- launchApp:
    stopApp: true

# FIX-S55-003: dismiss RN red-screen if it appears on cold launch
- runFlow:
    when:
      visible: "addViewAt"
    commands:
      - pressKey: Escape

- extendedWaitUntil:
    visible: "TERRIO Tenant"
    timeout: 30000

- assertVisible: "Tenant admin portal"

- tapOn:
    text: "Email"
- inputText: "dev-tenant-admin"

- tapOn:
    text: "Password"
- inputText: "dev-pass"

- tapOn: "Sign in"

# BUG-003: navigation within 8s
- extendedWaitUntil:
    visible: "Home"
    timeout: 8000
