appId: com.terrio.tenant
---
# Tenant Mobile — Login flow + BUG-003 verification

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible: "TERRIO Tenant"
    timeout: 30000

- assertVisible: ".*(Tenant admin portal|Amministra il tuo programma).*"

- tapOn: { id: "username-input" }
- inputText: "dev-tenant-admin"
- hideKeyboard

- tapOn: { id: "password-input" }
- inputText: "dev-pass"
- hideKeyboard

- tapOn: { id: "login-btn" }

# FIX-ITER5-001 (2026-05-02): "Non ora" button was removed in iter5 from the
# biometric enrollment dialog ("Accesso più rapido"). Use pressKey:Back to
# dismiss instead — Modal.onRequestClose handles this cleanly.
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      - pressKey: Back

- extendedWaitUntil:
    visible: "Home|Welcome back|Tenant|Branding|Beacons|Moderation"
    timeout: 15000
