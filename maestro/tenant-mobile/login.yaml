appId: com.terrio.tenant
---
# Tenant Mobile — Login flow + BUG-003 verification

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible: "TERRIO Tenant"
    timeout: 30000

- assertVisible: "Tenant admin portal"

- tapOn: { id: "username-input" }
- inputText: "dev-tenant-admin"
- hideKeyboard

- tapOn: { id: "password-input" }
- inputText: "dev-pass"
- hideKeyboard

- tapOn: { id: "login-btn" }

- tapOn:
    text: "Non ora|Never|Not now"
    optional: true

- extendedWaitUntil:
    visible: "Home|Welcome back"
    timeout: 15000
