appId: it.terrio.tenant
---
# Tenant Mobile — Login flow + BUG-003 verification

- launchApp:
    stopApp: true

# FIX-ITER6-001 (2026-05-02): unrooted device + release-signed APK refuses
# both `install -g` and `pm grant` — drain runtime permission dialogs that
# appear on cold-install (location precision picker → BLE → notification).
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            visible: "Mentre usi l'app|While using the app"
          commands:
            - tapOn: "Mentre usi l'app|While using the app"
      - runFlow:
          when:
            visible: "Consenti|Allow"
          commands:
            - tapOn: "Consenti|Allow"

# Sequential-suite isolation: pm clear is DENIED on this unrooted device
# (CLEAR_APP_USER_DATA SecurityException), so a prior flow may have left the
# tenant authenticated — the app would boot straight to Home and the
# username-input tap below would fail. Dismiss any launch biometric, then if
# we're not on the login screen log out via Settings → "Sign out" to reach it.
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands: [ { pressKey: Back } ]
- runFlow:
    when:
      notVisible:
        id: "username-input"
    commands:
      - runFlow:
          when: { visible: ".*, Impostazioni" }
          commands: [ { tapOn: { text: ".*, Impostazioni" } } ]
      - runFlow:
          when: { visible: "Sign out" }
          commands: [ { tapOn: "Sign out" } ]
      - extendedWaitUntil:
          visible:
            id: "username-input"
          timeout: 10000

# Wait for the login screen — accept the i18n header ("TERRIO Tenant") and the
# legacy/subtitle variants so the flow does not rot on copy changes.
- extendedWaitUntil:
    visible: ".*(TERRIO Tenant|Tenant admin portal|Amministra il tuo programma|Accedi|Sign in).*"
    timeout: 30000

- assertVisible: ".*(TERRIO Tenant|Tenant admin portal|Amministra il tuo programma).*"

- tapOn: { id: "username-input" }
- inputText: "dev-tenant-admin"
- hideKeyboard

- tapOn: { id: "password-input" }
- inputText: "dev-pass"
- hideKeyboard

- tapOn: { id: "login-btn" }

# FIX-ITER5-001 (2026-05-02): "Non ora" button was removed in iter5 from the
# biometric enrollment dialog ("Accesso più rapido"). Use pressKey:Back to
# dismiss instead — Modal.onRequestClose handles this cleanly.
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      - pressKey: Back

- extendedWaitUntil:
    visible: "Home|Welcome back|Tenant|Branding|Beacons|Moderation"
    timeout: 15000
