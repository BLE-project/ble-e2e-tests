appId: it.terrio.tenant
tags:
  - moderation
  - p0
---
# §9bis M8 P0 — TENANT_ADMIN reviews an ESCALATED_TO_ADMIN ADV.
# Precondition: 1 ADV in ESCALATED_TO_ADMIN status seeded, tenant admin logged in.
# The tenant admin has the override power (Q7) to approve/reject any ADV in
# their tenant, including those already escalated from sales.

- launchApp:
    stopApp: true

# On the tenant app the fresh-install biometric enrolment prompt ("Accesso più
# rapido") appears at LAUNCH, BEFORE login (verified via uiautomator dump). Wait
# for either it or the login button, dismiss the prompt, then proceed.
- extendedWaitUntil:
    visible: "Accesso più rapido|Accedi|Sign in|Amministra il tuo programma|Welcome back"
    timeout: 30000
- runFlow:
    when: { visible: "Accesso più rapido" }
    commands: [ { tapOn: "Non chiedermelo più" } ]

# Gate login on the "Accedi"/"Sign in" button — deterministically marks the
# unauthenticated screen (login screen shows placeholders, not an "Email" label).
- runFlow:
    when: { visible: "Accedi|Sign in" }
    commands:
      - tapOn: { id: "username-input" }
      - inputText: "dev-tenant-admin"
      - hideKeyboard
      - tapOn: { id: "password-input" }
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn: { id: "login-btn" }
      # biometric prompt may re-appear post-login on some builds → dismiss again
      - runFlow:
          when: { visible: "Accesso più rapido" }
          commands: [ { tapOn: "Non chiedermelo più" } ]
      - extendedWaitUntil: { visible: "Welcome back|Bentornato|Home|Amministra il tuo programma", timeout: 8000 }

# Navigate to Moderation queue. The installed APK exposes tabs via Android
# content-desc ("tab N of M, Moderazione"), not the tab-moderazione testID — so
# match the same ".*, <Tab>" pattern that navigation.yaml uses. Waiting on the
# tab also serves as the post-login settle (the "Accedi" block is skipped when
# the app is already logged in).
- extendedWaitUntil:
    visible:
      text: ".*, Moderazione"
    timeout: 15000
- tapOn:
    text: ".*, Moderazione"

# Wait on the list row id — the status badge ("ESCALATED"/"Escalata") is styled
# text that Maestro doesn't reliably match (§4 copy-drift). The queue is seeded
# with ESCALATED_TO_ADMIN rows (TENANT_ADMIN review scope) via seed-moderation-queue.
- extendedWaitUntil:
    visible:
      id: "moderation-row"
    timeout: 15000

# The moderation cards are INLINE (ModerationCard) — no detail screen. Approve is
# a per-card action (testID moderation-approve) that opens the TOTP step-up modal
# (TotpPromptModal). Tap the first card's approve button.
- tapOn:
    id: "moderation-approve"

- extendedWaitUntil:
    visible:
      id: "totp-prompt-modal"
    timeout: 5000

- tapOn: { id: "totp-prompt-input" }
- inputText: "123456"
- tapOn: { id: "totp-prompt-confirm" }

# On success the host closes the modal (pendingApproveId → null) and refetches
# the queue. The modal disappearing is the deterministic success signal
# (e2e disables the TOTP guard, so a valid path returns 200).
- extendedWaitUntil:
    notVisible:
      id: "totp-prompt-modal"
    timeout: 10000
