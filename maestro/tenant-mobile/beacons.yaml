appId: it.terrio.tenant
---
# Tenant Mobile — Beacon list navigation + create modal flow

- launchApp:
    stopApp: true

# Warm launches skip the splash and boot directly into Home.
# IT i18n (2026-05-13): "Tenant admin portal" replaced by "TERRIO Tenant" + IT subtitle;
# post-login lands on Home/Welcome back/Bentornato.
# Sentinel includes "Accesso più rapido" + wrapped .*(...).* (proven nav preamble).
- extendedWaitUntil:
    visible:
      text: ".*(TERRIO Tenant|Tenant admin portal|Welcome back|Bentornato|Home|Amministra il tuo programma|Accesso più rapido).*"
    timeout: 30000

# Dismiss biometric enrollment modal if it surfaced on launch.
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      - pressKey: Back

# Previous flows may have persisted auth tokens in SecureStore. Only run
# the login steps if the login screen is actually showing.
- runFlow:
    when:
      visible: "Tenant admin portal|Accedi|Sign in"
    commands:
      - tapOn: { id: "username-input" }
      - inputText: "dev-tenant-admin"
      - hideKeyboard
      - tapOn: { id: "password-input" }
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn: { id: "login-btn" }
      - runFlow:
          when:
            visible: "Accesso più rapido"
          commands:
            - pressKey: Back
      - extendedWaitUntil:
          visible:
            text: ".*(Welcome back|Bentornato|Home).*"
          timeout: 15000

# Navigate to Beacons via the stable bottom-tab testID (tenant-mobile
# _layout.tsx tabBarButtonTestID 'tab-beacon'). The previous text regex
# "Beacons|..." matched the overview TILE (overview-tile-Beacons) before the
# tab and landed on the wrong screen → assert timeout (#51).
- tapOn:
    id: "tab-beacon"
- extendedWaitUntil:
    visible: "Beacon Registry|Registro Beacon"
    timeout: 5000

# ── CREATE phase ─────────────────────────────────────────────────────────────
# Randomise the beacon identity per run. The V36 partial-unique index rejects a
# duplicate (uuid, major, minor); the flow used to hard-code minor=1, so the
# create 400'd ('Failed to create beacon') on every run after the first. A random
# minor (BLE uint16 range) keeps each run's identity — and its label — unique.
- evalScript: ${output.minor = Math.floor(Math.random() * 60000 + 1001)}

# Open create modal. testID convention: `btn-add-beacon`.
- tapOn:
    text: "\\+ Add|Aggiungi|\\+ Aggiungi"
- extendedWaitUntil:
    visible: "New Beacon|Nuovo Beacon"
    timeout: 5000

# Fill form. testIDs `beacon-form-{uuid,major,minor,name}` planned app-side.
# Until then, target by placeholder/label text. Use synthetic UUID that
# won't collide with the V25 seed (major=999, minor=001).
- tapOn:
    id: "beacon-form-uuid"
- inputText: "FDA50693-A4E2-4FB1-AFCF-C6EB07647825"
- hideKeyboard

# eraseText first — major/minor have form defaults (100 / 1); inputText appends.
- tapOn:
    id: "beacon-form-major"
- eraseText: 6
- inputText: "999"
- hideKeyboard

- tapOn:
    id: "beacon-form-minor"
- eraseText: 6
- inputText: ${output.minor}
- hideKeyboard

# The create form has no 'name' field — the optional 'Label' input is the
# closest (testID beacon-form-label). The beacon's display name = label.
- tapOn:
    id: "beacon-form-label"
- inputText: "Maestro-CRUD-${output.minor}"
- hideKeyboard

# territoryId is required (FK) — empty string → BFF 400. Fill with the E2E Dev
# Tenant's seeded territory (Ter2). beaconType defaults to TRACKING in the form.
- tapOn:
    id: "beacon-form-territoryId"
- inputText: "8112bd70-1a4d-465c-89a3-c5168ce02f56"
- hideKeyboard

# Submit create. The app's create button reads "Create beacon" ("Creating…"
# while the mutation is pending). No testID app-side yet (T-112).
- tapOn:
    text: "Create beacon|Creating"

# Assert the created beacon appears in the list (modal closes + row renders).
# Verifies the beacon-registry create path end-to-end (form → BFF → list).
# The new row may render below the fold — scroll to it (the list has the seed
# beacons + prior test rows above it).
- extendedWaitUntil:
    visible: "Registro Beacon|Beacon Registry"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: "Maestro-CRUD-${output.minor}"
    direction: DOWN
    timeout: 15000

# NOTE (2026-06-01): UPDATE + DELETE phases removed — the current app
# (beacons.tsx, T-112 "list, create, delete") has NO edit/update UI, and its
# delete is a per-row "✕" + Alert with no per-row testID to target reliably.
# Re-add a delete assertion once the app ships beacon-row / beacon-delete
# testIDs (tracked in ble-e2e-tests#53).

# ── Negative-path coverage (optional) ────────────────────────────────────────
# Cancel-modal-without-save flow retained from prior version for regression.
- tapOn:
    text: "\\+ Add|Aggiungi|\\+ Aggiungi"
- extendedWaitUntil:
    visible: "New Beacon|Nuovo Beacon"
    timeout: 5000

- tapOn:
    text: "Cancel|Annulla"
- extendedWaitUntil:
    visible: "Beacon Registry|Registro Beacon"
    timeout: 5000
