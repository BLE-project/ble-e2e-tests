appId: com.terrio.tenant
---
# Tenant Mobile — Beacon list navigation + create modal flow

- launchApp:
    stopApp: true

# Warm launches skip the splash and boot directly into Home.
- extendedWaitUntil:
    visible:
      text: "TERRIO Tenant|Tenant admin portal|Welcome back"
    timeout: 30000

# Previous flows may have persisted auth tokens in SecureStore. Only run
# the login steps if the login screen is actually showing.
- runFlow:
    when:
      visible: "Tenant admin portal"
    commands:
      - tapOn:
          text: "Email"
      - inputText: "dev-tenant-admin"
      - hideKeyboard
      - tapOn:
          text: "Password"
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn: "Sign in"
      - extendedWaitUntil:
          visible: "Welcome back"
          timeout: 8000

# Navigate to Beacons tab
- tapOn: "Beacons"
- extendedWaitUntil:
    visible: "Beacon Registry"
    timeout: 5000

# Open create modal
- tapOn: "+ Add"
- extendedWaitUntil:
    visible: "New Beacon"
    timeout: 5000

# Cancel to test modal dismissal
- tapOn: "Cancel"
- extendedWaitUntil:
    visible: "Beacon Registry"
    timeout: 5000
