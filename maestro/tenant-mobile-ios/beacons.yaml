appId: com.terrio.tenant
tags:
  - beacons
  - p1
  - ios
---
# Tenant Mobile — Beacon list navigation + create modal flow (iOS)

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: "TERRIO Tenant|Tenant admin portal|Welcome back"
    timeout: 30000

- runFlow:
    when:
      visible: "Tenant admin portal"
    commands:
      - tapOn:
          text: "Email"
      - inputText: "dev-tenant-admin"
      - tapOn:
          text: "Password"
      - inputText: "dev-pass"
      - tapOn: "Sign in"
      - extendedWaitUntil:
          visible: "Welcome back"
          timeout: 8000

- tapOn: "Beacons"
- extendedWaitUntil:
    visible: "Beacon Registry"
    timeout: 5000

- tapOn: "+ Add"
- extendedWaitUntil:
    visible: "New Beacon"
    timeout: 5000

- tapOn: "Cancel"
- extendedWaitUntil:
    visible: "Beacon Registry"
    timeout: 5000
