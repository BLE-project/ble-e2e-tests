appId: it.terrio.consumer
---
# TC-CR-001 — Consumer registration → auto-login → first-scan empty state
# Spec: terrio-platform-docs/design_handoff/specs/consumer-registration-flow-2026-05-05.md
#
# This flow exercises the "new consumer" arc end-to-end at the UI level:
#   1. Cold install (or post-logout) → login screen
#   2. Tap "Crea account" link → register screen
#   3. Fill fields with a per-run unique email (Date.now() suffix) → submit
#   4. Success screen → "Accedi ora" → back to login (form pre-filled or empty)
#   5. Login with the just-registered credentials
#   6. Land on home — empty state ("Avvicinati ad un beacon") OR populated
#      ("Vicini") if a beacon is already in range and CC-001 BE has created
#      the card.
#
# BLE detection itself is hardware-dependent — verifying card creation by
# proximity requires 4 physical iBeacons in 2m range and the CC-001 BE chain
# (BeaconEarnConsumer → LoyaltyCardClient.autoCreate). This Maestro flow
# stops at "home reachable post-registration" and tolerates BOTH home
# variants. The full proximity arc is asserted by the JUnit suite
# `BeaconEarnConsumerTest.first_detection_creates_card_via_loyalty_card_client`
# (see ble-cashback-ledger PR #38) plus the manual hardware harness.

# FU-54 (2026-05-19): this flow needs a logged-out, cold-install state.
# Maestro `clearState` cannot deliver it here — its on-device driver runs as
# an unprivileged app and lacks CLEAR_APP_USER_DATA (SecurityException). The
# e2e harness clears the package via `adb shell pm clear` (the shell uid
# holds that permission) before invoking this flow, so here we just
# stop+relaunch onto the resulting cold-install state.
- launchApp:
    stopApp: true

- runFlow: _gates.yaml

# FU-54 (2026-05-19): on a cold-install launch the consumer app shows up to
# three interstitials whose order is NOT deterministic — stacked Android
# runtime permission prompts, the BLE-consent gate (app/_layout.tsx redirects
# to /onboarding/beacon-consent), and the biometric-enrol modal. Drain all of
# them in one repeat loop so the order does not matter; each iteration is a
# no-op once the login screen is reached. `consent-continue` testID =
# app/onboarding/beacon-consent.tsx.
- repeat:
    times: 6
    commands:
      - runFlow:
          when:
            visible: "Mentre usi l'app|While using the app"
          commands:
            - tapOn: "Mentre usi l'app|While using the app"
      - runFlow:
          when:
            visible: "Consenti|Allow"
          commands:
            - tapOn: "Consenti|Allow"
      # The _layout consent gate bounces /login back to this screen until
      # consent.granted is true, so the toggle must be ON before Continua.
      - runFlow:
          when:
            visible:
              id: "consent-continue"
          commands:
            - tapOn:
                id: "consent-toggle"
            - tapOn:
                id: "consent-continue"
      - runFlow:
          when:
            visible: "Accesso più rapido"
          commands:
            - pressKey: Back

# Sequential-suite isolation: pm clear is DENIED on this unrooted device
# (CLEAR_APP_USER_DATA SecurityException), so a prior flow in the same batch may
# have left the consumer authenticated — there would be no login screen and the
# login-btn wait below would time out. If we're not already on the login screen,
# log out via the Home tab "Sign out" button (the consumer logout path) to reach
# it. On a genuine cold/logged-out launch login-btn is present → this is a no-op.
- runFlow:
    when:
      notVisible:
        id: "login-btn"
    commands:
      - runFlow:
          when: { visible: { id: "tab-home" } }
          commands: [ { tapOn: { id: "tab-home" } } ]
      - runFlow:
          when: { visible: "Sign out" }
          commands: [ { tapOn: "Sign out" } ]
      - runFlow:
          when: { visible: "Accesso più rapido" }
          commands: [ { tapOn: { id: "enroll-never" } } ]

# 1. Login screen — wait for the stable login testIDs to be visible.
# FU-52 (2026-05-18): anchor on `login-btn` + `signup-link` testIDs instead
# of the "Accedi|Sign in" / "Discover nearby offers" literals (FU-38 brand
# migration + FU-28 copy rework rotted the text).
- extendedWaitUntil:
    visible:
      id: "login-btn"
    timeout: 30000

- assertVisible:
    id: "signup-link"

# 2. Tap "Crea account" link (added by MOB-001 in PR #58)
- tapOn:
    id: "signup-link"

# 3. Register form — fill with unique email per run.
# FU-54 (2026-05-19): anchor on the `register-*` testIDs added by
# ble-consumer-mobile#90 (app/register.tsx) instead of the i18n label text
# ("Nome *" etc.), which is brittle and rots on copy/i18n reworks.
- extendedWaitUntil:
    visible:
      id: "register-nome-input"
    timeout: 10000

# FU-57 (2026-05-19): generate a genuinely unique run token.
# The previous fixture interpolated `${maestroRunId}` — NOT a Maestro
# built-in variable, so it evaluated to the literal string "undefined".
# Every run therefore submitted `tcr001-undefined@terrio.test`; the first
# run created that Keycloak user and EVERY run afterwards failed with
# identity-access `409 "User exists with same email"`, surfacing in the app
# as the "Errore — Registrazione fallita" dialog. `clearState`/`pm clear`
# cannot recover it (the user lives in Keycloak, not on-device state).
# `Date.now()` is monotonic per invocation → a fresh email every run.
- evalScript: ${output.runToken = Date.now()}

# FU-54 (2026-05-19): hideKeyboard after every field — the soft keyboard
# otherwise stays up and covers the next input (register-confirm-input was
# unreachable). Same per-field pattern as login.yaml.
- tapOn:
    id: "register-nome-input"
- inputText: "Test"
- hideKeyboard

- tapOn:
    id: "register-cognome-input"
- inputText: "Auto"
- hideKeyboard

- tapOn:
    id: "register-username-input"
- inputText: "tcr001-${output.runToken}"
- hideKeyboard

- tapOn:
    id: "register-email-input"
- inputText: "tcr001-${output.runToken}@terrio.test"
- hideKeyboard

- tapOn:
    id: "register-password-input"
- inputText: "Test-Pass-2026!"
- hideKeyboard

- tapOn:
    id: "register-confirm-input"
- inputText: "Test-Pass-2026!"
- hideKeyboard

# 4. Submit registration
- tapOn:
    id: "register-submit"

# 5. Success screen — `register-success` container, then `register-goto-login`.
# FU-54 (2026-05-19): anchor on the new testIDs (app/register.tsx) instead of
# the "Benvenuto in Terrio" / "Accedi ora" literals.
- extendedWaitUntil:
    visible:
      id: "register-success"
    timeout: 20000

- tapOn:
    id: "register-goto-login"

# 6. Login screen again — fill credentials we just used.
# testID anchors shipped fleet-wide via ble-consumer-mobile#77 (login.tsx).
# FU-52 (2026-05-18): wait on the `login-btn` testID, not "Accedi|Sign in".
- extendedWaitUntil:
    visible:
      id: "login-btn"
    timeout: 15000

- tapOn: { id: "username-input" }
- inputText: "tcr001-${output.runToken}"
- hideKeyboard

- tapOn: { id: "password-input" }
- inputText: "Test-Pass-2026!"
- hideKeyboard

- tapOn: { id: "login-btn" }

# FU-56 (2026-05-19): drain ALL post-login interstitials before asserting
# Home — the federation prompt, the biometric modal, AND the BLE/location
# runtime permission dialogs the Home requests on mount (the permission
# dialog overlays the scan-status banner). Order-agnostic repeat loop; each
# iteration is a no-op once Home is clear.
- repeat:
    times: 6
    commands:
      - runFlow:
          when:
            visible: "Return to previous programme"
          commands:
            - tapOn: "STAY HERE"
      - runFlow:
          when:
            visible: "Accesso più rapido"
          commands:
            - pressKey: Back
      - runFlow:
          when:
            visible: "Mentre usi l'app|While using the app"
          commands:
            - tapOn: "Mentre usi l'app|While using the app"
      - runFlow:
          when:
            visible: "Consenti|Allow"
          commands:
            - tapOn: "Consenti|Allow"
      - runFlow:
          when:
            visible: "Precise|Posizione esatta"
          commands:
            - tapOn: "Precise|Posizione esatta"

# 7. Land on home — accept BOTH empty (pre-card) and populated (post-card).
# FU-52 (2026-05-18): the home scan-status banner (`scan-status-.*`,
# app/(app)/index.tsx:262) renders for every permState and on both the
# empty-state and populated-list home variants, so it is the state-agnostic
# "home is reachable" signal — replaces the rotted literal text set.
- extendedWaitUntil:
    visible:
      id: "scan-status-.*"
    timeout: 30000
