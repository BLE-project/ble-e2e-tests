appId: it.terrio.consumer
---
# Consumer Mobile — Logout flow
# The "Sign out" button lives on the Home (Nearby) tab header, not on
# Profilo. Navigate there, tap Sign out, verify return to login screen.

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: ".*(TERRIO|Discover nearby offers|Nearby).*"
    timeout: 30000

# FIX-ITER5-002 (2026-05-02): gate on "Accedi|Sign in" button (reliable post-render
# marker) and use "Username|Email" placeholder (Email label removed in 2026-05-02
# build).
- runFlow:
    when:
      visible: "Accedi|Sign in"
    commands:
      - tapOn:
          text: "Username|Email"
      - inputText: "dev-consumer"
      - hideKeyboard
      - tapOn:
          text: "Password"
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn: "Sign in|Accedi"
      # FIX-S55-001: federation auto-switch prompt after login
      - runFlow:
          when:
            visible: "Return to previous programme"
          commands:
            - tapOn: "STAY HERE"
      # 2026-07-02: la modale biometrica "Accesso più rapido" compare async DOPO
      # l'auth. Un dismiss one-shot subito dopo il tap login la mancava (race).
      # La landing consumer è il banner scan-status (testID, come login.yaml che
      # passa) — presente nell'accessibility tree anche quando la modale lo
      # copre, quindi NON è un marker affidabile per capire se la modale è
      # ancora aperta. Retry-dismiss con attesa tra i tentativi: cattura la
      # modale anche se compare in ritardo, no-op se l'opt-out è già persistito.
      - repeat:
          times: 5
          commands:
            - runFlow:
                when:
                  visible: "Accesso più rapido"
                commands:
                  - tapOn:
                      id: "enroll-never"
            - waitForAnimationToEnd:
                timeout: 1500
      # enroll-never invoca auth.optOut() da stato JS, nessun side-effect di nav
      # (a differenza di pressKey:Back che pop-erebbe l'auth-stack root).
      - extendedWaitUntil:
          visible:
            id: "scan-status-.*"
          timeout: 10000

# FIX-S55-001: dismiss the federation prompt if coming in already logged
# with a stored token that triggered the dialog again.
- runFlow:
    when:
      visible: "Return to previous programme"
    commands:
      - tapOn: "STAY HERE"

# Iter30 (2026-05-06): enroll-never instead of Back (top-level warm-launch
# dismiss path). Mirrors the fix above and the fleet-wide Iter15→Iter30
# alignment to use enroll-never for biometric opt-out (no nav side-effect).
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      - tapOn:
          id: "enroll-never"

# Dismiss Gboard clipboard overlay if still covering the bottom of screen.
- runFlow:
    when:
      visible: "Clipboard"
    commands:
      - pressKey: Back

# Ensure we're on the Nearby/Home tab where "Sign out" lives.
# Iter17-B fix (2026-05-04): selector ".*, Home" matched iOS-style accessibility
# content description format (e.g. "house.fill, Home") that RN Expo Android does
# NOT expose. Plain "Home" matches the Tab accessibilityLabel directly.
# 2026-07-02: il bottone logout (index.tsx, testID btn-logout) vive sulla Home
# dove il consumer atterra dopo il login — non serve il tap su "tab-home" (che
# non è esposto come testID in tutti gli stati e faceva fallire il flow).
# scrollUntilVisible è idempotente se già visibile e assorbe il caso "sotto la
# fold". Asserire il ritorno al login screen via login-btn testID invece della
# copy EN "Discover nearby offers" (i18n-rot: device in locale IT).
- scrollUntilVisible:
    element:
      id: "btn-logout"
    direction: DOWN
    timeout: 8000
- tapOn: { id: "btn-logout" }

# After logout we should see login screen again.
- extendedWaitUntil:
    visible:
      id: "login-btn"
    timeout: 8000
