appId: com.terrio.consumer
---
# Consumer Mobile — Logout flow
# The "Sign out" button lives on the Home (Nearby) tab header, not on
# Profilo. Navigate there, tap Sign out, verify return to login screen.

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: ".*(TERRIO|Discover nearby offers|Nearby).*"
    timeout: 30000

# FIX-ITER5-002 (2026-05-02): gate on "Accedi|Sign in" button (reliable post-render
# marker) and use "Username|Email" placeholder (Email label removed in 2026-05-02
# build).
- runFlow:
    when:
      visible: "Accedi|Sign in"
    commands:
      - tapOn:
          text: "Username|Email"
      - inputText: "dev-consumer"
      - hideKeyboard
      - tapOn:
          text: "Password"
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn: "Sign in|Accedi"
      # FIX-S55-001: federation auto-switch prompt after login
      - runFlow:
          when:
            visible: "Return to previous programme"
          commands:
            - tapOn: "STAY HERE"
      # Iter3-A: biometric "Non ora" tap triggers app logout (bug). Use Back.
      - runFlow:
          when:
            visible: "Accesso più rapido"
          commands:
            - pressKey: Back
      - extendedWaitUntil:
          visible:
            text: ".*(Vicini|Nearby).*"
          timeout: 10000

# FIX-S55-001: dismiss the federation prompt if coming in already logged
# with a stored token that triggered the dialog again.
- runFlow:
    when:
      visible: "Return to previous programme"
    commands:
      - tapOn: "STAY HERE"

# Iter3-A: biometric dialog re-appears on every warm launch. Dismiss with Back.
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      - pressKey: Back

# Dismiss Gboard clipboard overlay if still covering the bottom of screen.
- runFlow:
    when:
      visible: "Clipboard"
    commands:
      - pressKey: Back

# Ensure we're on the Nearby/Home tab where "Sign out" lives.
# Iter17-B fix (2026-05-04): selector ".*, Home" matched iOS-style accessibility
# content description format (e.g. "house.fill, Home") that RN Expo Android does
# NOT expose. Plain "Home" matches the Tab accessibilityLabel directly.
- tapOn: "Home"
- extendedWaitUntil:
    visible: "Sign out"
    timeout: 5000

- tapOn: "Sign out"

# After logout we should see login screen again.
- extendedWaitUntil:
    visible: "Discover nearby offers"
    timeout: 8000
