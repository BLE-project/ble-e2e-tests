appId: com.terrio.consumer
---
# Consumer Mobile — Logout flow
# The "Sign out" button lives on the Home (Nearby) tab header, not on
# Profilo. Navigate there, tap Sign out, verify return to login screen.

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: "TERRIO|Discover nearby offers|Nearby"
    timeout: 30000

# Previous flows may have persisted auth tokens in SecureStore. Only run
# the login steps if the login screen is actually showing.
- runFlow:
    when:
      visible: "Discover nearby offers"
    commands:
      - tapOn:
          text: "Email"
      - inputText: "dev-consumer"
      - hideKeyboard
      - tapOn:
          text: "Password"
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn: "Sign in"
      - extendedWaitUntil:
          visible: "Nearby"
          timeout: 10000

# Dismiss Gboard clipboard overlay if still covering the bottom of screen.
- runFlow:
    when:
      visible: "Clipboard"
    commands:
      - pressKey: Back

# Ensure we're on the Nearby/Home tab where "Sign out" lives.
- tapOn: "Nearby"
- extendedWaitUntil:
    visible: "Sign out"
    timeout: 5000

- tapOn: "Sign out"

# After logout we should see login screen again.
- extendedWaitUntil:
    visible: "Discover nearby offers"
    timeout: 8000
