appId: it.terrio.consumer
tags:
  - notifications
  - p1
---
# §7.3 P1 — Consumer notification preferences screen.
# Verifies: toggle of optional channel persists; always-on (beacon-proximity)
# shows "Sempre attivo" badge and its switch is disabled.

- launchApp:
    stopApp: true

- runFlow: _gates.yaml

- extendedWaitUntil:
    visible: "Home|Discover|Terrio"
    timeout: 30000

- runFlow:
    when: { visible: "Sign in|Accedi" }
    commands:
      - tapOn: { id: "username-input" }
      - inputText: "dev-consumer"
      - hideKeyboard
      - tapOn: { id: "password-input" }
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn: { id: "login-btn" }
      # Post-login the consumer lands on the Home tab whose title is "Nearby".
      - extendedWaitUntil: { visible: "Home|Discover|Nearby", timeout: 8000 }

# Navigate to Profilo tab → Notifications (tabBarTestID from #78).
- tapOn: { id: "tab-profilo" }
- extendedWaitUntil: { visible: "Preferenze|Settings", timeout: 5000 }

- tapOn: "Notifiche|Notifications|Preferenze notifiche"
- extendedWaitUntil: { visible: "Preferenze notifiche|Notification Preferences", timeout: 5000 }

# Always-on badge on beacon-proximity — rendered inline as
# "Beacon in prossimità • Sempre attivo"; scroll it into view (the channel list
# exceeds the landscape viewport). beacon-proximity is mandatory → its Switch is
# DISABLED (not a tappable element that fires an alert). Assert it + the badge
# WHILE the row is on-screen, before tapping cashback-credit (which scrolls away).
- scrollUntilVisible:
    element:
      text: ".*Sempre attivo.*"
    direction: DOWN
    visibilityPercentage: 10
- assertVisible:
    id: "toggle-beacon-proximity"
- assertVisible: ".*Sempre attivo.*"

# Toggle cashback-credit OFF (tapOn auto-scrolls back to it)
- tapOn:
    id: "toggle-cashback-credit"

# Wait for API save (no error alert)
- assertNotVisible: "Errore"
