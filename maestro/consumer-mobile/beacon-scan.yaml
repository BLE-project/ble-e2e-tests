appId: com.terrio.consumer
---
# Consumer Mobile — BLE beacon scanning flow
# UI-only version: verifies the scan screen renders correctly and the
# scanner auto-starts on mount. Accepts both empty state and real
# detections — physical iBeacons (Holy-IOT) are nice-to-have but not
# required.
#
# Fase 3.2: removed the manual "Start scan" / "Stop scan" button. The
# home screen now requests BLE + location permissions on mount and
# auto-starts the scanner as soon as they're granted. The flow below
# has been updated to match: no button tap, only wait for the new
# "Scanning for nearby beacons" or "Waiting for beacons" text banner.

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: "TERRIO|Discover nearby offers|Nearby"
    timeout: 30000

# Previous flows may have persisted auth tokens in SecureStore. Only run
# the login steps if the login screen is actually showing.
- runFlow:
    when:
      visible: "Discover nearby offers"
    commands:
      - tapOn:
          text: "Email"
      - inputText: "dev-consumer"
      - hideKeyboard
      - tapOn:
          text: "Password"
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn: "Sign in"
      # FIX-S55-001: federation auto-switch prompt
      - runFlow:
          when:
            visible: "Return to previous programme"
          commands:
            - tapOn: "STAY HERE"
      - extendedWaitUntil:
          visible: "Nearby"
          timeout: 10000

# FIX-S55-001: dismiss federation prompt on already-auth launch
- runFlow:
    when:
      visible: "Return to previous programme"
    commands:
      - tapOn: "STAY HERE"

# Dismiss Gboard clipboard overlay if present.
- runFlow:
    when:
      visible: "Clipboard"
    commands:
      - pressKey: Back

- tapOn: "Nearby"
- extendedWaitUntil:
    visible: "Nearby"
    timeout: 5000

# Grant Bluetooth permission if dialog appears
- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"

# Grant Location permission (required for BLE scan on Android)
- runFlow:
    when:
      visible: "While using the app"
    commands:
      - tapOn: "While using the app"

- runFlow:
    when:
      visible: "Precise"
    commands:
      - tapOn: "Precise"
      - tapOn: "While using the app"

# Fase 3.2: scanner auto-starts — no manual button to tap. Just wait for
# the banner text that proves the permission state resolved and (if
# granted) the scanner is running. The banner has three possible states:
#   - "Checking permissions…"   (transient; auto-resolves in < 1 s)
#   - "Scanning for nearby beacons" (granted; the happy path)
#   - "Grant permission"          (denied; user needs to retry)
#
# On CI with a stub build, isNativeBleAvailable() returns false so
# requestBlePermissions() short-circuits to "granted" and the banner
# shows the Scanning copy immediately. Either the empty-list state or a
# real beacon detection is a valid flow exit.
- extendedWaitUntil:
    visible:
      text: "Scanning for nearby beacons|Waiting for beacons|Grant permission|Holy-IOT|Beacon|Tenant"
    timeout: 15000

- assertVisible: "Nearby"
