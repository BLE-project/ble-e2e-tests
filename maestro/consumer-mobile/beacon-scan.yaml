appId: it.terrio.consumer
---
# Consumer Mobile — BLE beacon scanning flow
# UI-only version: verifies the scan screen renders correctly and the
# scanner auto-starts on mount. Accepts both empty state and real
# detections — physical iBeacons (Holy-IOT) are nice-to-have but not
# required.
#
# Fase 3.2: removed the manual "Start scan" / "Stop scan" button. The
# home screen now requests BLE + location permissions on mount and
# auto-starts the scanner as soon as they're granted. The flow below
# has been updated to match: no button tap, only wait for the scan-status
# banner (testID `scan-status-<permState>`) to reach a resolved state.

- launchApp:
    stopApp: true

# FU-52 (2026-05-18, follow-up): a persisted session from a prior flow
# foregrounds the biometric-enrol modal on relaunch, covering both entry
# testIDs. Dismiss it via the stable `enroll-never` testID
# (BiometricEnrollModal.tsx) before asserting the entry state.
- runFlow:
    when:
      visible:
        id: "enroll-never"
    commands:
      - tapOn:
          id: "enroll-never"

# FU-52 (2026-05-18): wait on stable testIDs present on either entry state.
# `login-btn` = login screen; `scan-status-.*` = home screen scan banner.
# Replaces the rotted "TERRIO|Discover nearby offers|Nearby|..." literal set
# (FU-28 home copy rework + FU-38 brand-token migration of "TERRIO").
- extendedWaitUntil:
    visible:
      id: "login-btn|scan-status-.*"
    timeout: 30000

# Previous flows may have persisted auth tokens in SecureStore. Only run
# the login steps if the login screen is actually showing.
# FU-52 (2026-05-18): gate on the `login-btn` testID instead of tagline text.
- runFlow:
    when:
      visible:
        id: "login-btn"
    commands:
      - tapOn: { id: "username-input" }
      - inputText: "dev-consumer"
      - hideKeyboard
      - tapOn: { id: "password-input" }
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn: { id: "login-btn" }
      # FIX-S55-001: federation auto-switch prompt
      - runFlow:
          when:
            visible: "Return to previous programme"
          commands:
            - tapOn: "STAY HERE"
      - extendedWaitUntil:
          visible:
            id: "scan-status-.*"
          timeout: 10000

# FIX-S55-001: dismiss federation prompt on already-auth launch
- runFlow:
    when:
      visible: "Return to previous programme"
    commands:
      - tapOn: "STAY HERE"

# Dismiss Gboard clipboard overlay if present.
- runFlow:
    when:
      visible: "Clipboard"
    commands:
      - pressKey: Back

# FU-52 (2026-05-18): re-open the Home tab via its stable testID. The map
# tab proves the tab bar mounted; we then return to Home where the scan
# banner lives. `tab-home`/`tab-mappa` are tabBarButtonTestID anchors
# (app/(app)/_layout.tsx:77,104).
- tapOn: { id: "tab-mappa" }
- tapOn: { id: "tab-home" }
- extendedWaitUntil:
    visible:
      id: "scan-status-.*"
    timeout: 5000

# Grant Bluetooth permission if dialog appears
- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"

# Grant Location permission (required for BLE scan on Android)
- runFlow:
    when:
      visible: "While using the app"
    commands:
      - tapOn: "While using the app"

- runFlow:
    when:
      visible: "Precise"
    commands:
      - tapOn: "Precise"
      - tapOn: "While using the app"

# Fase 3.2: scanner auto-starts — no manual button to tap. The scan-status
# banner View carries a permState-suffixed testID (app/(app)/index.tsx:262):
#   - scan-status-checking  (transient; auto-resolves in < 1 s)
#   - scan-status-granted   (granted; the happy path — "Scanning…" copy)
#   - scan-status-denied    (denied; shows scan-retry-btn / scan-settings-btn)
#
# On CI with a stub build, isNativeBleAvailable() returns false so
# requestBlePermissions() short-circuits to "granted".
#
# FU-52 (2026-05-18): assert the resolved-permission banner via testID
# instead of the brittle "Scanning for nearby beacons|Waiting for beacons|..."
# copy set. `scan-status-granted` OR `scan-status-denied` both prove the
# permission state resolved (only `scan-status-checking` is the transient
# pre-resolution state). The empty-list state (`empty-state`) or a real
# beacon detection is a valid flow exit.
- extendedWaitUntil:
    visible:
      id: "scan-status-granted|scan-status-denied"
    timeout: 15000

# Home is reachable: the empty-state placeholder (no beacons) or the
# detected-beacon list. `empty-state` testID = app/(app)/index.tsx:298.
- assertVisible:
    id: "empty-state|scan-status-granted"
