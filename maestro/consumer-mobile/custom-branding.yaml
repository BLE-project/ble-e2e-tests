appId: it.terrio.consumer
---
# Consumer Mobile — Custom branding verification (Fase 4.3)
#
# Verifies that the consumer app picks up the tenant's custom branding
# row (FEAT-BRAND-001) and re-themes the UI end-to-end:
#   fixture → PUT /api/v1/tenants/{id}/branding
#   consumer app → GET /bff/v1/consumer/brand → BrandingContext → useTheme
#   visible brand-tag chip on the Nearby header
#
# Prerequisites:
#   Run `npx tsx fixtures/seed-custom-branding-fixtures.ts` BEFORE this
#   flow (run-all.sh handles it automatically). The fixture PUTs the
#   canonical "E2E Brand" payload on the E2E tenant's branding row.
#
# What this flow asserts:
#   1. Cold-start boots cleanly (no crash from useTheme() reading an
#      empty BrandingContext).
#   2. Login succeeds.
#   3. On the Nearby screen (index.tsx), the testID="brand-tag" element
#      becomes visible with text "E2E Brand" — proving the round-trip
#      fixture → API → context → UI works.
#
# What this flow does NOT assert:
#   Exact hex colors in the rendered tree (Maestro has no DOM color
#   introspection). A manual visual pass or a future screenshot-diff
#   harness would catch those.

- launchApp:
    stopApp: true

- runFlow: _gates.yaml

# FU-10: drain cold-launch OS permission dialogs + in-app BLE consent screen
# (interleaved, non-deterministic order) BEFORE waiting on app content.
# Same proven block as login.yaml — each when-visible-guarded, surplus passes no-op.
- repeat:
    times: 8
    commands:
      - runFlow:
          when:
            visible: "Precise|Precisa"
          commands:
            - tapOn: "Precise|Precisa"
      - runFlow:
          when:
            visible: "Mentre usi l'app|While using the app|Solo questa volta|Only this time"
          commands:
            - tapOn: "Mentre usi l'app|While using the app|Solo questa volta|Only this time"
      - runFlow:
          when:
            visible: "Consenti|Allow"
          commands:
            - tapOn: "Consenti|Allow"
      - runFlow:
          when:
            visible: "Scan beacon BLE pre-registrazione"
          commands:
            - runFlow:
                when:
                  visible:
                    text: "Acconsento all'attivazione dello scan BLE$"
                    checked: false
                commands:
                  - tapOn:
                      text: "Acconsento all'attivazione dello scan BLE$"
            - tapOn: "Continua"

# Wait for login screen to load — wrapped .*(...).* for substring match.
- extendedWaitUntil:
    visible:
      text: ".*(TERRIO|Discover nearby offers|Nelle vicinanze|Home|Accesso più rapido).*"
    timeout: 30000

# Anchor robusto a i18n IT + custom branding (il fixture sostituisce il
# wordmark TERRIO col brand del tenant, es. "E2E Brand").
- assertVisible:
    text: ".*(Discover nearby offers|TERRIO|Nelle vicinanze|Home).*"

# ── Login (only if the login screen is showing — a previous flow may have
# left the app authenticated; cold-launch then boots straight to Nearby) ──
# testID anchors shipped fleet-wide via ble-consumer-mobile#77 (login.tsx).
- runFlow:
    when:
      visible: "Discover nearby offers|username-input|Accedi|Sign in"
    commands:
      - tapOn: { id: "username-input" }
      - inputText: "dev-consumer"
      - hideKeyboard
      - tapOn: { id: "password-input" }
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn: { id: "login-btn" }
      # FIX-S55-001: federation auto-switch prompt may appear after login
      - runFlow:
          when:
            visible: "Return to previous programme"
          commands:
            - tapOn: "STAY HERE"
      - runFlow:
          when:
            visible: "Accesso più rapido"
          commands:
            - pressKey: Back

# Wait for Nearby tab to be reachable.
- extendedWaitUntil:
    visible: "Nearby|Nelle vicinanze"
    timeout: 10000

# Some devices surface a clipboard permission sheet on first input —
# dismiss it if present so it doesn't block our assertion below.
- runFlow:
    when:
      visible: "Clipboard"
    commands:
      - pressKey: Back

# Make sure we're actually on the Nearby screen.
- tapOn: "Nearby|Nelle vicinanze"
- extendedWaitUntil:
    visible: "Nearby|Nelle vicinanze"
    timeout: 5000

# ── Brand tag assertion ─────────────────────────────────────────────────
#
# The testID="brand-tag" element is rendered by app/(app)/index.tsx only
# when theme.appName is non-null. Since the fixture sets
# appNameOverride="E2E Brand", the chip must be visible with that text.
#
# A 15s window gives BrandingProvider time to:
#   - fetch /bff/v1/consumer/brand after the tenant context is resolved
#   - push the resolved branding through React state
#   - re-render the Nearby header with the new chip
- extendedWaitUntil:
    visible:
      id: "brand-tag"
    timeout: 15000

- assertVisible: "E2E Brand"

# Sanity: the "Nearby" screen title is still visible (we did not replace
# it, only added the chip beside it).
- assertVisible: "Nearby|Nelle vicinanze"
