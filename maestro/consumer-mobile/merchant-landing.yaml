appId: it.terrio.consumer
tags:
  - landing
  - p1
---
# §5-6 P1 — Consumer opens merchant landing page.
# Precondition: 1 merchant PUBLISHED in seed (name "E2E Bar Centrale").
# Flow: search → tap merchant row → landing opens → CTA buttons visible.

- launchApp:
    stopApp: true

- runFlow: _gates.yaml

- extendedWaitUntil:
    visible: "Home|Discover|Terrio|Nearby|Accedi|Sign in"
    timeout: 30000

# Log in if on the login screen (_gates handles perms/enrolment, not login).
- runFlow:
    when: { visible: "Sign in|Accedi" }
    commands:
      - tapOn: { id: "username-input" }
      - inputText: "dev-consumer"
      - hideKeyboard
      - tapOn: { id: "password-input" }
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn: { id: "login-btn" }
      # The biometric enrolment prompt ("Accesso più rapido") appears post-login.
      - runFlow:
          when: { visible: "Accesso più rapido" }
          commands: [ { tapOn: "Non chiedermelo più" } ]
      - extendedWaitUntil: { visible: "Home|Discover|Nearby", timeout: 8000 }

# Navigate to the Cerca / Discover tab (testID tab-cerca; label "Cerca").
- tapOn: { id: "tab-cerca" }
- extendedWaitUntil: { visible: "Cerca|Search|merchant", timeout: 8000 }

# Search for the seeded merchant
- tapOn:
    id: "search-input"
    optional: true
- inputText:
    text: "Bar Centrale"
    optional: true
- hideKeyboard

# Tap the merchant row — landing opens. Match the FULL seeded name ("E2E Bar
# Centrale"): a bare "Bar Centrale" also matches the search box value above.
- tapOn:
    text: "E2E Bar Centrale"

# Landing opened — the CTA buttons ("🗺 Indicazioni" / "📞 Chiama") sit below the
# cover/description, off the landscape viewport → scroll them into view.
- scrollUntilVisible:
    element:
      text: ".*(Indicazioni|Chiama).*"
    direction: DOWN
    timeout: 12000
    visibilityPercentage: 10
