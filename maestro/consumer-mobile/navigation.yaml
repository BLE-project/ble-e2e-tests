appId: it.terrio.consumer
---
# Consumer Mobile — Tab navigation smoke test
# Iter3 (2026-05-02): tabs realigned to actual app UI captured via uiautomator dump.
# Actual tabs (content-desc): Home | Mappa | Wallet | Offerte | Profilo
# (Discover/History from older builds removed.)
# Home tab header text is "Nearby" (EN) on the device locale at test time.

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: ".*(TERRIO|Discover nearby offers|Nearby).*"
    timeout: 30000

# Login if login screen is showing (auth tokens may have persisted).
- runFlow:
    when:
      visible: "Discover nearby offers"
    commands:
      - tapOn:
          text: "Username|Email"
      - inputText: "dev-consumer"
      - hideKeyboard
      - tapOn:
          text: "Password"
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn: "Sign in|Accedi"
      - runFlow:
          when:
            visible: "Return to previous programme"
          commands:
            - tapOn: "STAY HERE"
      - runFlow:
          when:
            visible: "Accesso più rapido"
          commands:
            # Iter3-A workaround: tapping "Non ora" triggers app logout (bug).
            # Hardware Back dismisses the dialog without clearing auth state.
            - pressKey: Back
      - extendedWaitUntil:
          visible:
            text: ".*(Vicini|Nearby).*"
          timeout: 10000

# Defensive: dismiss any leftover dialogs (federation, biometric, clipboard).
- runFlow:
    when:
      visible: "Return to previous programme"
    commands:
      - tapOn: "STAY HERE"
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      - pressKey: Back
- runFlow:
    when:
      visible: "Clipboard"
    commands:
      - pressKey: Back

# ── Tab navigation ─────────────────────────────────────────────────────────

- tapOn:
    text: ".*, Wallet"
- extendedWaitUntil:
    visible:
      text: ".*Wallet.*"
    timeout: 5000

- tapOn:
    text: ".*, Offerte"
- runFlow:
    when:
      visible:
        text: "^Error(e)?$"
    commands:
      - tapOn: "OK"
- extendedWaitUntil:
    visible:
      text: ".*Offerte.*"
    timeout: 5000

- tapOn:
    text: ".*, Profilo"
- extendedWaitUntil:
    visible:
      text: ".*Profilo.*"
    timeout: 5000

# Return to Home tab. Some builds show "Nearby" as the header.
- tapOn:
    text: ".*, Home"
- runFlow:
    when:
      visible:
        text: "^Error(e)?$"
    commands:
      - tapOn: "OK"
- extendedWaitUntil:
    visible:
      text: ".*(Home|Nearby|Vicini).*"
    timeout: 5000
