appId: host.exp.exponent
---
# Consumer Mobile — Full navigation flow
# Tests all tabs + post-login redirect + back navigation.
#
# Tab bar: Nearby | Wallet | Discover | History | Territory | Prefs | Offers | Profilo

# Dismiss ANR if present
- runFlow:
    when:
      visible: "Wait"
    commands:
      - tapOn: "Wait"

# Open bundle in Expo Go
- openLink: "exp://10.0.2.2:19000"

# Wait for login screen to load
- extendedWaitUntil:
    visible: "BLE"
    timeout: 30000

# Login
- tapOn:
    text: "Email"
- inputText: "dev-consumer"
- tapOn:
    text: "Password"
- inputText: "dev-pass"
- tapOn: "Sign in"

# BUG-003 fix: verify immediate post-login navigation (no manual refresh needed)
- extendedWaitUntil:
    visible: "Nearby"
    timeout: 8000

# ── Tab navigation ─────────────────────────────────────────────────────────

- tapOn: "Wallet"
- extendedWaitUntil:
    visible: "Wallet"
    timeout: 5000

- tapOn: "Discover"
- extendedWaitUntil:
    visible: "Discover"
    timeout: 5000

- tapOn: "History"
- extendedWaitUntil:
    visible: "History"
    timeout: 5000

- tapOn: "Profilo"
- extendedWaitUntil:
    visible: "Profilo"
    timeout: 5000

- tapOn: "Offers"
- extendedWaitUntil:
    visible: "Notifications"
    timeout: 5000

- tapOn: "Prefs"
- extendedWaitUntil:
    visible: "Preferences"
    timeout: 5000

# Return to home
- tapOn: "Nearby"
- extendedWaitUntil:
    visible: "Nearby"
    timeout: 5000
