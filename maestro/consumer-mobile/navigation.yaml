appId: com.terrio.consumer
---
# Consumer Mobile — Full navigation flow
# Tab bar (9 tabs, may truncate): Nearby | Wallet | Discover | History |
# Territory | Prefs | Offers | Profilo | Report
# NOTE: on narrow devices some labels truncate ("Discover" → "Disco…",
# "Territory" → "Terri…") so we use substring selectors for those.

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: "TERRIO|Discover nearby offers|Nearby"
    timeout: 30000

# Previous flows may have persisted auth tokens in SecureStore. Only run
# the login steps if the login screen is actually showing.
- runFlow:
    when:
      visible: "Discover nearby offers"
    commands:
      - tapOn:
          text: "Email"
      - inputText: "dev-consumer"
      - hideKeyboard
      - tapOn:
          text: "Password"
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn: "Sign in"
      - extendedWaitUntil:
          visible: "Nearby"
          timeout: 10000

# Dismiss Gboard clipboard overlay if it's still covering the tab bar.
- runFlow:
    when:
      visible: "Clipboard"
    commands:
      - pressKey: Back

# ── Tab navigation ─────────────────────────────────────────────────────────

- tapOn: "Wallet"
- extendedWaitUntil:
    visible: "Wallet"
    timeout: 5000

# "Discover" truncates to "Disco…" on narrow tab bars — use substring.
- tapOn:
    text: "Disco"
- extendedWaitUntil:
    visible:
      text: "Discover|Nearby Programmes|Disco"
    timeout: 5000

# Dismiss any "Could not load nearby programmes" error modal.
- runFlow:
    when:
      visible: "OK"
    commands:
      - tapOn: "OK"

- tapOn: "History"
- extendedWaitUntil:
    visible: "History"
    timeout: 5000

# "Territory" truncates to "Terri…" — screen title is "My Territory".
- tapOn:
    text: "Terri"
- extendedWaitUntil:
    visible:
      text: "My Territory|Territory|Terri"
    timeout: 5000

- tapOn: "Profilo"
- extendedWaitUntil:
    visible: "Profilo"
    timeout: 5000

- tapOn: "Offers"
- extendedWaitUntil:
    visible: "Notifications"
    timeout: 5000

- tapOn: "Prefs"
- extendedWaitUntil:
    visible: "Preferences"
    timeout: 5000

# Return to home
- tapOn: "Nearby"
- extendedWaitUntil:
    visible: "Nearby"
    timeout: 5000
