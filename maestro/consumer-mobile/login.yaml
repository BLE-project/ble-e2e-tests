appId: com.terrio.consumer
---
# Consumer Mobile — Login flow + immediate navigation verification
# Validates BUG-003 fix: login must navigate WITHOUT manual refresh

- launchApp:
    stopApp: true

# FU-10 (2026-05-17): unified cold-install interstitial drain.
# A cold install of the release-signed APK cannot be pre-granted
# (`install -g` / `pm grant` are refused), so Android raises runtime
# permission dialogs (location precision, BLE scan, notification) AND
# the app renders the in-app BLE pre-registration GDPR consent screen.
# These surface interleaved in a non-deterministic order — the previous
# fixed-order handling (consent block first, then a permission-only
# loop) skipped whichever interstitial was not yet on top, leaving the
# flow stuck on the one that surfaced second.
# This single loop drains BOTH interstitial families every pass,
# repeated, BEFORE any wait on app content. Each block is `when
# visible`-guarded and the consent Switch is `checked: false`-guarded,
# so surplus passes are no-ops.
- repeat:
    times: 8
    commands:
      # OS — precise/approximate location selector (Android 12+)
      - runFlow:
          when:
            visible: "Precise|Precisa"
          commands:
            - tapOn: "Precise|Precisa"
      # OS — location grant
      - runFlow:
          when:
            visible: "Mentre usi l'app|While using the app|Solo questa volta|Only this time"
          commands:
            - tapOn: "Mentre usi l'app|While using the app|Solo questa volta|Only this time"
      # OS — generic allow (BLE scan / nearby devices / notification)
      - runFlow:
          when:
            visible: "Consenti|Allow"
          commands:
            - tapOn: "Consenti|Allow"
      # In-app — BLE pre-registration GDPR consent screen.
      # The consent Switch carries content-desc "Acconsento all'attivazione
      # dello scan BLE" with no trailing text; the `$` anchor excludes the
      # longer paragraph TextView so the toggle is targeted, not double-tapped.
      - runFlow:
          when:
            visible: "Scan beacon BLE pre-registrazione"
          commands:
            - runFlow:
                when:
                  visible:
                    text: "Acconsento all'attivazione dello scan BLE$"
                    checked: false
                commands:
                  - tapOn:
                      text: "Acconsento all'attivazione dello scan BLE$"
            - tapOn: "Continua"

# FIX-ITER5-001 (2026-05-02): dev-flavor APK lacks CLEAR_APP_USER_DATA so
# Maestro `clearState` errors out — sessions persist across test runs.
# Make the flow idempotent: handle both cold-start and already-logged-in
# entry states, dismiss the biometric prompt that may be foregrounded.
# Iter30 (2026-05-06): biometric dismiss via enroll-never testID instead
# of pressKey:Back. Back-press pops Expo Router auth-stack root → app
# navigates AWAY from home, breaking the post-login Vicini/Avvicinati
# assertion. enroll-never invokes auth.optOut() purely from JS state,
# no nav side-effect. Mirrors the Iter15 sales-agent + Iter29 territory fix.
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      - tapOn:
          id: "enroll-never"

- extendedWaitUntil:
    visible: "TERRIO|Vicini|Nearby"
    timeout: 30000

# Only enter credentials when actually on the login screen.
- runFlow:
    when:
      notVisible: "Vicini|Nearby"
    commands:
      - assertVisible: "Discover nearby offers"
      - tapOn:
          text: "Username|Email"
      - inputText: "dev-consumer"
      - tapOn:
          text: "Password"
      - inputText: "dev-pass"
      - tapOn: "Sign in|Accedi"
      - runFlow:
          when:
            visible: "Return to previous programme"
          commands:
            - tapOn: "STAY HERE"
      - runFlow:
          when:
            visible: "Accesso più rapido"
          commands:
            - pressKey: Back

# Iter20-A fix (2026-05-05): consumer post-login may show EITHER empty-state
# (Avvicinati|Approach a beacon|Nessun beacon — pre-first-card per design
# TC-CR-001) OR populated-state (Vicini|Nearby — post-card warm session).
# Accept both. Full empty-vs-populated-state distinction is out of scope
# for this flow; dedicated TC-CR-001 test covers the registration arc.
- extendedWaitUntil:
    visible: "Vicini|Nearby|Avvicinati|Approach a beacon|Nessun beacon|Discover nearby"
    timeout: 15000
