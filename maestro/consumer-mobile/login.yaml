appId: com.terrio.consumer
---
# Consumer Mobile — Login flow + immediate navigation verification
# Validates BUG-003 fix: login must navigate WITHOUT manual refresh

- launchApp:
    stopApp: true

# FIX-ITER6-001 (2026-05-02): unrooted device + release-signed APK refuses
# both `install -g` and `pm grant` — runtime permission dialogs always show
# on cold-install. Loop to drain stacked Android permission prompts (location
# precision picker → BLE scan → notification) BEFORE waiting on app UI.
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            visible: "Mentre usi l'app|While using the app"
          commands:
            - tapOn: "Mentre usi l'app|While using the app"
      - runFlow:
          when:
            visible: "Consenti|Allow"
          commands:
            - tapOn: "Consenti|Allow"

# FIX-ITER5-001 (2026-05-02): dev-flavor APK lacks CLEAR_APP_USER_DATA so
# Maestro `clearState` errors out — sessions persist across test runs.
# Make the flow idempotent: handle both cold-start and already-logged-in
# entry states, dismiss the biometric prompt that may be foregrounded.
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      - pressKey: Back

- extendedWaitUntil:
    visible: "TERRIO|Vicini|Nearby"
    timeout: 30000

# Only enter credentials when actually on the login screen.
- runFlow:
    when:
      notVisible: "Vicini|Nearby"
    commands:
      - assertVisible: "Discover nearby offers"
      - tapOn:
          text: "Username|Email"
      - inputText: "dev-consumer"
      - tapOn:
          text: "Password"
      - inputText: "dev-pass"
      - tapOn: "Sign in|Accedi"
      - runFlow:
          when:
            visible: "Return to previous programme"
          commands:
            - tapOn: "STAY HERE"
      - runFlow:
          when:
            visible: "Accesso più rapido"
          commands:
            - pressKey: Back

- extendedWaitUntil:
    visible: "Vicini|Nearby"
    timeout: 10000
