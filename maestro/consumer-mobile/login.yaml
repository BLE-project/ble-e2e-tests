appId: host.exp.exponent
---
# Consumer Mobile — Login flow + immediate navigation verification
# Validates BUG-003 fix: login must navigate without manual refresh

- runFlow:
    when:
      visible: "Wait"
    commands:
      - tapOn: "Wait"

- openLink: "exp://10.0.2.2:19000"

- extendedWaitUntil:
    visible: "BLE"
    timeout: 30000

- assertVisible: "Discover nearby offers"

- tapOn:
    text: "Email"
- inputText: "dev-consumer"

- tapOn:
    text: "Password"
- inputText: "dev-pass"

- tapOn: "Sign in"

# BUG-003: This MUST succeed within 8s (no manual refresh needed on iOS)
- extendedWaitUntil:
    visible: "Nearby"
    timeout: 8000
