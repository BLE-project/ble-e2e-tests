appId: com.terrio.consumer
---
# Consumer Mobile — Login flow + immediate navigation verification
# Validates BUG-003 fix: login must navigate WITHOUT manual refresh

- launchApp:
    stopApp: true

# Wait for login screen to load
- extendedWaitUntil:
    visible: "TERRIO"
    timeout: 30000

- assertVisible: "Discover nearby offers"

# Enter credentials (label: "Username" since 2026-05-02 — old builds had "Email")
- tapOn:
    text: "Username|Email"
- inputText: "dev-consumer"

- tapOn:
    text: "Password"
- inputText: "dev-pass"

# Submit login
- tapOn: "Sign in|Accedi"

# FIX-S55-001: after login the federation system may auto-prompt
# "Return to previous programme?" when the consumer had a card in
# another tenant. Dismiss the dialog first so the home assertion isn't
# masked by a modal overlay. This is the normal auto-switch UX (S30)
# not a regression.
- runFlow:
    when:
      visible: "Return to previous programme"
    commands:
      - tapOn: "STAY HERE"

# FIX-ITER6-001 (2026-05-02): post-login biometric enrollment dialog
# "Accesso più rapido — Vuoi accedere a TERRIO con Face ID / impronta digitale?"
# appears for first-time users on a fresh install. Use pressKey:Back to dismiss
# (Anomaly H: "Non ora" button was removed in Iter5 because tapping it triggered
# perceived logout regression. Modal.onRequestClose handles Back cleanly).
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      - pressKey: Back

# BUG-003: login must navigate within 8 seconds (no manual refresh needed)
# FIX-ITER2-002: home tab label is "Vicini" in IT, "Nearby" in EN — accept either.
- extendedWaitUntil:
    visible: "Vicini|Nearby"
    timeout: 10000
