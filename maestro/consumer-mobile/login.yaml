appId: com.terrio.consumer
---
# Consumer Mobile — Login flow + immediate navigation verification
# Validates BUG-003 fix: login must navigate WITHOUT manual refresh

- launchApp:
    stopApp: true

# FIX-ITER6-001 (2026-05-02): unrooted device + release-signed APK refuses
# both `install -g` and `pm grant` — runtime permission dialogs always show
# on cold-install. Loop to drain stacked Android permission prompts (location
# precision picker → BLE scan → notification) BEFORE waiting on app UI.
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            visible: "Mentre usi l'app|While using the app"
          commands:
            - tapOn: "Mentre usi l'app|While using the app"
      - runFlow:
          when:
            visible: "Consenti|Allow"
          commands:
            - tapOn: "Consenti|Allow"

# FIX-ITER5-001 (2026-05-02): dev-flavor APK lacks CLEAR_APP_USER_DATA so
# Maestro `clearState` errors out — sessions persist across test runs.
# Make the flow idempotent: handle both cold-start and already-logged-in
# entry states, dismiss the biometric prompt that may be foregrounded.
# Iter30 (2026-05-06): biometric dismiss via enroll-never testID instead
# of pressKey:Back. Back-press pops Expo Router auth-stack root → app
# navigates AWAY from home, breaking the post-login Vicini/Avvicinati
# assertion. enroll-never invokes auth.optOut() purely from JS state,
# no nav side-effect. Mirrors the Iter15 sales-agent + Iter29 territory fix.
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      - tapOn:
          id: "enroll-never"

- extendedWaitUntil:
    visible: "TERRIO|Vicini|Nearby"
    timeout: 30000

# Only enter credentials when actually on the login screen.
- runFlow:
    when:
      notVisible: "Vicini|Nearby"
    commands:
      - assertVisible: "Discover nearby offers"
      - tapOn:
          text: "Username|Email"
      - inputText: "dev-consumer"
      - tapOn:
          text: "Password"
      - inputText: "dev-pass"
      - tapOn: "Sign in|Accedi"
      - runFlow:
          when:
            visible: "Return to previous programme"
          commands:
            - tapOn: "STAY HERE"
      - runFlow:
          when:
            visible: "Accesso più rapido"
          commands:
            - pressKey: Back

# Iter20-A fix (2026-05-05): consumer post-login may show EITHER empty-state
# (Avvicinati|Approach a beacon|Nessun beacon — pre-first-card per design
# TC-CR-001) OR populated-state (Vicini|Nearby — post-card warm session).
# Accept both. Full empty-vs-populated-state distinction is out of scope
# for this flow; dedicated TC-CR-001 test covers the registration arc.
- extendedWaitUntil:
    visible: "Vicini|Nearby|Avvicinati|Approach a beacon|Nessun beacon|Discover nearby"
    timeout: 15000
