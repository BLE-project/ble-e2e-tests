appId: com.terrio.merchant
tags:
  - navigation
  - p1
  - ios
---
# Merchant Mobile — Full tab navigation (iOS)

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: "TERRIO Merchant|Merchant portal|Dashboard"
    timeout: 30000

- runFlow:
    when:
      visible: "Merchant portal"
    commands:
      - tapOn:
          text: "Email"
      - inputText: "dev-merchant"
      - tapOn:
          text: "Password"
      - inputText: "dev-pass"
      - tapOn: "Sign in"
      - extendedWaitUntil:
          visible: "Dashboard"
          timeout: 8000

- tapOn: "Health"
- extendedWaitUntil:
    visible: "Health"
    timeout: 5000

- tapOn: "Beacons"
- extendedWaitUntil:
    visible: "Beacons"
    timeout: 5000

- tapOn: "POS"
- extendedWaitUntil:
    visible: "Loyalty POS"
    timeout: 5000

- tapOn: "Billing"
- extendedWaitUntil:
    visible: "Billing"
    timeout: 5000

- tapOn: "Cashback"
- extendedWaitUntil:
    visible: "Cashback"
    timeout: 5000

- tapOn: "Report"
- extendedWaitUntil:
    visible: "Report Bug"
    timeout: 5000

- tapOn: "Home"
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 5000
