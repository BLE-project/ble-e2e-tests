appId: com.terrio.merchant
tags:
  - adv
  - p1
  - ios
---
- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible: "Terrio|Home|Merchant"
    timeout: 30000

- runFlow:
    when: { visible: "Home" }
    commands:
      - tapOn: "Profilo|Profile"
      - extendedWaitUntil: { visible: "Esci|Logout", timeout: 5000 }
      - tapOn: "Esci|Logout"
      - extendedWaitUntil: { visible: "Merchant", timeout: 10000 }

- tapOn: { id: "username-input" }
- inputText: "dev-merchant"
- tapOn: { id: "password-input" }
- inputText: "dev-pass"
- tapOn: { id: "login-btn" }
- extendedWaitUntil: { visible: "Home", timeout: 8000 }

- tapOn: "ADV|Campagne"
- extendedWaitUntil: { visible: "Approvata", timeout: 5000 }
- tapOn: "Approvata"

- extendedWaitUntil: { visible: "Ritira ADV", timeout: 5000 }
- tapOn: { id: "btn-takedown" }

- extendedWaitUntil: { visible: "Conferma takedown", timeout: 3000 }
- tapOn: { id: "takedown-reason" }
- inputText: "Prodotto esaurito, ritiro fino a reintegro stock"

- tapOn: { id: "totp-code" }
- inputText: "123456"

- tapOn: { id: "action-confirm" }
- extendedWaitUntil: { visible: "Ritirata", timeout: 10000 }
