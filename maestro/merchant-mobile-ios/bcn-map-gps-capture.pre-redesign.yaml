appId: com.terrio.merchant
tags:
  - beacon
  - gps
  - ios
---
# Merchant Mobile — GPS capture for a provisioned beacon (iOS).
# Mirror of merchant-mobile/bcn-map-gps-capture.yaml. The simulator serves a
# simulated location (set via `xcrun simctl location <udid> set` in CI, or the
# Simulator UI); accuracy there is synthetic, so BOTH outcomes stay legitimate:
# saved fix OR the app's "Accuratezza insufficiente" rejection (product
# threshold ≤10 m). UNVERIFIED until previewStaging builds land (see #125).

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: "TERRIO Merchant|Merchant portal|Dashboard"
    timeout: 30000

- runFlow:
    when:
      visible: "Merchant portal|Accedi|Sign in"
    commands:
      - tapOn: { id: "username-input" }
      - inputText: "dev-merchant"
      - tapOn: { id: "password-input" }
      - inputText: "dev-pass"
      - tapOn: { id: "login-btn" }
      - tapOn:
          text: "Non ora|Never|Not now"
          optional: true
      - extendedWaitUntil:
          visible: "Dashboard|Panoramica"
          timeout: 15000

# Sidebar → Fleet Beacon. RN composes the item label with a leading comma
# (icon has no label) on Android; keep the .* anchor for iOS parity.
- tapOn:
    text: ".*Fleet Beacon"
- extendedWaitUntil:
    visible: "Provisioned|Provisionati|Cattura GPS"
    timeout: 8000

- tapOn:
    text: "Cattura GPS"

# First capture triggers the iOS location permission alert (async).
- extendedWaitUntil:
    visible: "Allow While Using App|Consenti mentre usi l'app|Allow Once|Consenti una volta"
    timeout: 12000
    optional: true
- runFlow:
    when: { visible: "Allow While Using App|Consenti mentre usi l'app" }
    commands: [ { tapOn: "Allow While Using App|Consenti mentre usi l'app" } ]

# Capture outcome: saved fix OR legitimate accuracy rejection.
- extendedWaitUntil:
    visible: "GPS salvato|GPS catturato|GPS acquisito|GPS captured|Accuratezza insufficiente|Precisione attuale|accuracy"
    timeout: 60000
- assertVisible:
    text: "GPS salvato|GPS catturato|GPS acquisito|GPS captured|Accuratezza insufficiente|Precisione attuale|accuracy"

# Close the accuracy dialog if it surfaced, leaving the app clean.
- runFlow:
    when: { visible: "Accuratezza insufficiente|Precisione attuale" }
    commands: [ { tapOn: "OK" } ]
