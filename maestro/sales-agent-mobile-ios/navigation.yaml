appId: com.terrio.salesagent
tags:
  - navigation
  - p1
  - ios
---
# Sales Agent Mobile — Full tab navigation (iOS)

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: "Terrio|Agente Commerciale|Dashboard"
    timeout: 30000

- runFlow:
    when:
      visible: "Agente Commerciale"
    commands:
      - tapOn:
          id: "username-input"
      - inputText: "dev-sales-agent"
      - tapOn:
          id: "password-input"
      - inputText: "dev-pass"
      - tapOn:
          id: "login-btn"
      - extendedWaitUntil:
          visible: "Dashboard"
          timeout: 10000

- tapOn: "Richieste"
- extendedWaitUntil:
    visible: "Richieste"
    timeout: 5000

- tapOn: "Merchant"
- extendedWaitUntil:
    visible: "Merchant"
    timeout: 5000

- tapOn: "Royalties"
- extendedWaitUntil:
    visible: "Royalties"
    timeout: 5000

- tapOn: "Beacon"
- extendedWaitUntil:
    visible: "Beacon"
    timeout: 5000

- tapOn: "Profilo"
- extendedWaitUntil:
    visible: "Profilo"
    timeout: 5000

- tapOn: "Home"
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 5000
