appId: com.terrio.salesagent
tags:
  - moderation
  - p0
  - ios
---
- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible: "Terrio|Home|Agente Commerciale"
    timeout: 30000

- runFlow:
    when: { visible: "Home" }
    commands:
      - tapOn: "Profilo"
      - extendedWaitUntil: { visible: "Esci", timeout: 5000 }
      - tapOn: "Esci"
      - extendedWaitUntil: { visible: "Agente Commerciale", timeout: 10000 }

- tapOn: { id: "username-input" }
- inputText: "dev-sales-agent"
- tapOn: { id: "password-input" }
- inputText: "dev-pass"
- tapOn: { id: "login-btn" }
- extendedWaitUntil: { visible: "Home", timeout: 8000 }

- tapOn: "Moderazioni"
- extendedWaitUntil: { visible: "in attesa", timeout: 5000 }

- tapOn: { id: "moderation-row" }
- tapOn: { id: "btn-escalate" }

- extendedWaitUntil: { visible: "Escala", timeout: 3000 }
- tapOn: { id: "reason-input" }
- inputText: "Caso borderline — richiede tenant admin"

- tapOn: { id: "confirm-action" }
- extendedWaitUntil: { visible: "Escalata|Moderazioni", timeout: 10000 }
