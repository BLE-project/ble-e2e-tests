appId: com.terrio.territory
---
# Territory Mobile — List screen + drill-down smoke test
# Session 52 — verifies the read-only flow: login → territory list → detail.
# CRUD mutations (create/edit/delete) are covered in territory-crud.yaml.

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: "Terrio|Territory Manager|Territori|Nessun territorio"
    timeout: 30000

# If a previous flow (e.g. territory-crud) left the app authenticated
# as dev-tenant-admin, logout first so the assertion below runs against
# dev-territory-admin (who does NOT see the "+" FAB).
- runFlow:
    when:
      visible: "Esci"
    commands:
      - tapOn: "Esci"
      - extendedWaitUntil:
          visible: "Territory Manager"
          timeout: 10000

# Login as dev-territory-admin (restricted role, no create permission).
- runFlow:
    when:
      visible: "Territory Manager"
    commands:
      - tapOn:
          id: "username-input"
      - inputText: "dev-territory-admin"
      - hideKeyboard
      - tapOn:
          id: "password-input"
      - inputText: "dev-pass"
      - hideKeyboard
      - runFlow:
          when:
            visible: "Clipboard"
          commands:
            - pressKey: Back
      - tapOn:
          id: "login-btn"
      - extendedWaitUntil:
          visible: "Territori"
          timeout: 15000

# Clipboard suggestion panel hiding the list — dismiss if present.
- runFlow:
    when:
      visible: "Clipboard"
    commands:
      - pressKey: Back

# The list is populated by the seed data in terrio-e2e-compose: the
# acceptance criterion is that we reach the screen with at least the empty
# state rendered. The FAB is only rendered when the caller is
# TENANT_ADMIN / SUPER_ADMIN — dev-territory-admin does NOT see it.
- assertVisible:
    text: "Territori|Nessun territorio"

- assertNotVisible:
    id: "territory-list-new"
