appId: it.terrio.territory
---
# Territory Mobile — List screen + drill-down smoke test
# Session 52 — verifies the read-only flow: login → territory list → detail.
# CRUD mutations (create/edit/delete) are covered in territory-crud.yaml.

- launchApp:
    stopApp: true

# Drain cold-launch runtime permission dialogs (location/BLE/notification) —
# unrooted device + release APK can't pre-grant. Same block as login.yaml.
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            visible: "Mentre usi l'app|While using the app"
          commands:
            - tapOn: "Mentre usi l'app|While using the app"
      - runFlow:
          when:
            visible: "Consenti|Allow"
          commands:
            - tapOn: "Consenti|Allow"

# Sentinel INCLUDES "Accesso più rapido" so a warm-restart biometric modal
# counts as "screen reached" (else the bare list text never matches → 30s timeout).
# Wrapped in .*(...).* so substring matches the full element text.
- extendedWaitUntil:
    visible:
      text: ".*(Terrio|Territory Manager|Territori|TERRIO Territory|Accesso più rapido).*"
    timeout: 30000

# Dismiss biometric enrollment via the enroll-never testID — NOT pressKey:Back,
# which pops the Expo Router auth stack and navigates away (Iter29 fix).
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      - tapOn: { id: "enroll-never" }

# If a previous flow left the app authenticated as a different user, logout
# first so the assertion below runs against dev-territory-admin (no "+" FAB).
- runFlow:
    when:
      visible: "Esci"
    commands:
      - tapOn: { id: "btn-logout" }
      - extendedWaitUntil:
          visible: ".*(Territory Manager|TERRIO Territory).*"
          timeout: 10000

# Login as dev-territory-admin (restricted role, no create permission).
- runFlow:
    when:
      visible: "Territory Manager|TERRIO Territory|Accedi"
    commands:
      - tapOn:
          id: "username-input"
      - inputText: "dev-territory-admin"
      - hideKeyboard
      - tapOn:
          id: "password-input"
      - inputText: "dev-pass"
      - hideKeyboard
      - runFlow:
          when:
            visible: "Clipboard"
          commands:
            - pressKey: Back
      - tapOn:
          id: "login-btn"
      - runFlow:
          when:
            visible: "Accesso più rapido"
          commands:
            - pressKey: Back
      - extendedWaitUntil:
          visible: ".*(Territori|Errore nel caricamento).*"
          timeout: 15000

# Clipboard suggestion panel hiding the list — dismiss if present.
- runFlow:
    when:
      visible: "Clipboard"
    commands:
      - pressKey: Back

# The list is populated by the seed data in terrio-e2e-compose: the
# acceptance criterion is that we reach the screen with at least the empty
# state rendered. The FAB is only rendered when the caller is
# TENANT_ADMIN / SUPER_ADMIN — dev-territory-admin does NOT see it.
- assertVisible:
    text: "Territori|Nessun territorio"

- assertNotVisible:
    id: "territory-list-new"
