appId: it.terrio.territory
---
# Territory Mobile — Navigation smoke test
# Verifies the stack navigation: list → detail → back → list → new → back → list.
# Does NOT mutate state (create/update/delete are covered by territory-crud.yaml).
# Session 55 — added to align territory-mobile with the 5-flow baseline.

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: ".*(Terrio|Territory Manager|Territori|TERRIO Territory|Accesso più rapido|Esci).*"
    timeout: 30000

# Iter29 (2026-05-06): biometric dismiss via enroll-never testID instead
# of pressKey:Back. Back-press goes through Expo Router native-stack and
# pops the auth-stack root → app navigates AWAY from dashboard, breaking
# subsequent tab taps. Tapping enroll-never calls auth.optOut() + onDone()
# entirely from JS state, no nav side-effect. Mirrors the Iter15 sales-agent
# fix that flipped sales-agent/login from FAIL to PASS for 10+ iters.
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      - tapOn:
          id: "enroll-never"

# Login as TENANT_ADMIN so we can see the "+" FAB (create path).
# The app persists its session across pm-clear (launches straight to the
# territory list). Log out via the visible "Esci" text — btn-logout renders with
# zero bounds and can't be tapped — then dismiss any post-logout biometric.
- runFlow:
    when:
      visible: "Esci"
    commands:
      - tapOn: "Esci"
      - runFlow:
          when: { visible: "Accesso più rapido" }
          commands: [ { tapOn: { id: "enroll-never" } } ]
      - extendedWaitUntil:
          visible:
            id: "username-input"
          timeout: 10000

# Gate on the username-input id so login only fires on the login screen (the
# "TERRIO Territory" header text also appears on the logged-in home).
- runFlow:
    when:
      visible:
        id: "username-input"
    commands:
      - tapOn:
          id: "username-input"
      - inputText: "dev-tenant-admin"
      - hideKeyboard
      - tapOn:
          id: "password-input"
      - inputText: "dev-pass"
      - hideKeyboard
      - runFlow:
          when:
            visible: "Clipboard"
          commands:
            - pressKey: Back
      - tapOn:
          id: "login-btn"
      # Iter29 (2026-05-06): post-login biometric — same enroll-never path.
      - runFlow:
          when:
            visible: "Accesso più rapido"
          commands:
            - tapOn:
                id: "enroll-never"
      # Assert btn-logout (brand-independent home marker) — the Stack title is
      # theme.appName ?? 'Territori' and the white-label fixture overrides it.
      - extendedWaitUntil:
          visible:
            id: "btn-logout"
          timeout: 15000

# ── Stack navigation: list → new → back to list ───────────────────────────

- tapOn:
    id: "territory-list-new"

- extendedWaitUntil:
    visible: "Nuovo territorio"
    timeout: 5000

# Cancel out of the "new" form — we don't want to create a real territory here
- tapOn:
    id: "territory-form-cancel"

# Back on the home list — btn-logout marks it (header text is white-labelled).
- extendedWaitUntil:
    visible:
      id: "btn-logout"
    timeout: 5000

# ── Pull-to-refresh: verify the list reloads cleanly ──────────────────────
# Maestro's scroll is a proxy for pull-to-refresh on iOS/Android; the app's
# RefreshControl handles the gesture the same way.
- scroll

# Still on the home list after the refresh gesture — btn-logout marks it.
- extendedWaitUntil:
    visible:
      id: "btn-logout"
    timeout: 5000

# ── List → detail (only if there is at least one territory row) ───────────
# Use a soft assertion: if the list is empty we skip the detail leg.
- runFlow:
    when:
      notVisible: "Nessun territorio"
    commands:
      # Tap the first territory row. We match by the testID pattern
      # `territory-row-*`; Maestro allows regex on the id property.
      - tapOn:
          id: "territory-row-.*"
      - extendedWaitUntil:
          visible: "Dettaglio"
          timeout: 8000
      # Back out of the detail screen via the stack navigator
      - back
      # Back on the home list — btn-logout marks it (header is white-labelled).
      - extendedWaitUntil:
          visible:
            id: "btn-logout"
          timeout: 5000
