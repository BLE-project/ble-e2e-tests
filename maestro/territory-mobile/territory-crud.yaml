appId: it.terrio.territory
---
# Territory Mobile — CRUD happy-path
# Session 52 — verifies create → edit → delete against the real backend.
# Must run with a TENANT_ADMIN account (dev-tenant-admin) because the FAB
# and the delete button are gated.

- launchApp:
    stopApp: true

# Drain cold-launch runtime permission dialogs (same block as login.yaml).
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            visible: "Mentre usi l'app|While using the app"
          commands:
            - tapOn: "Mentre usi l'app|While using the app"
      - runFlow:
          when:
            visible: "Consenti|Allow"
          commands:
            - tapOn: "Consenti|Allow"

# Sentinel includes "Accesso più rapido" so a warm-restart biometric modal
# counts as "reached"; wrapped .*(...).* for substring match.
- extendedWaitUntil:
    visible:
      text: ".*(Terrio|Territory Manager|Territori|TERRIO Territory|Nessun territorio|Errore|Accesso più rapido|Esci).*"
    timeout: 30000

# Dismiss biometric enrollment via enroll-never testID (NOT Back — pops auth stack).
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      - tapOn: { id: "enroll-never" }

# If already logged in from a previous flow, logout first so we can
# re-login as dev-tenant-admin (who has TENANT_ADMIN role for CRUD).
# The app persists its session across pm-clear (launches straight to the
# territory list). Log out via the visible "Esci" text — btn-logout renders with
# zero bounds and can't be tapped — then dismiss any post-logout biometric.
- runFlow:
    when:
      visible: "Esci"
    commands:
      - tapOn: "Esci"
      - runFlow:
          when: { visible: "Accesso più rapido" }
          commands: [ { tapOn: { id: "enroll-never" } } ]
      - extendedWaitUntil:
          visible:
            id: "username-input"
          timeout: 10000

# Now on the login screen — login as TENANT_ADMIN. Gate on the username-input id
# so it only fires on the login screen (the "TERRIO Territory" header text also
# appears on the logged-in home).
- runFlow:
    when:
      visible:
        id: "username-input"
    commands:
      - tapOn:
          id: "username-input"
      - inputText: "dev-tenant-admin"
      - hideKeyboard
      - tapOn:
          id: "password-input"
      - inputText: "dev-pass"
      - hideKeyboard
      - runFlow:
          when:
            visible: "Clipboard"
          commands:
            - pressKey: Back
      - tapOn:
          id: "login-btn"
      - runFlow:
          when:
            visible: "Accesso più rapido"
          commands:
            - pressKey: Back
      - extendedWaitUntil:
          visible:
            id: "btn-logout"
          timeout: 15000

# Dismiss Clipboard panel if lingering from Gboard
- runFlow:
    when:
      visible: "Clipboard"
    commands:
      - pressKey: Back

# Wait for the territory list to finish loading (React Query fetch). Assert on
# btn-logout (brand-independent home marker) — the header is white-labelled.
- extendedWaitUntil:
    visible:
      id: "btn-logout"
    timeout: 15000

# ── Create ─────────────────────────────────────────────────────────────────
- tapOn:
    id: "territory-list-new"

- extendedWaitUntil:
    visible: "Nuovo territorio"
    timeout: 5000

- tapOn:
    id: "territory-form-name"
- inputText: "Maestro Smoke Zone"
- hideKeyboard

- tapOn:
    id: "territory-form-visibility-closed"

- tapOn:
    id: "territory-form-submit"

# The app shows an Alert confirming creation — dismiss it before asserting
- extendedWaitUntil:
    visible: "Territorio creato"
    timeout: 10000
- tapOn: "OK"

- extendedWaitUntil:
    visible: "Maestro Smoke Zone"
    timeout: 10000

# ── Edit ───────────────────────────────────────────────────────────────────
- tapOn:
    id: "territory-detail-edit"

- extendedWaitUntil:
    visible: "Modifica territorio"
    timeout: 5000

- tapOn:
    id: "territory-form-name"
- eraseText
- inputText: "Maestro Smoke Zone Edited"
- hideKeyboard

- tapOn:
    id: "territory-form-submit"

# The app shows an Alert confirming update — dismiss it before asserting
- extendedWaitUntil:
    visible: "Territorio aggiornato"
    timeout: 10000
- tapOn: "OK"

- extendedWaitUntil:
    visible: "Maestro Smoke Zone Edited"
    timeout: 10000

# ── Delete ─────────────────────────────────────────────────────────────────
- tapOn:
    id: "territory-detail-delete"

- extendedWaitUntil:
    visible: "Eliminare territorio?"
    timeout: 5000

- tapOn: "Elimina"

# Dismiss the "Territorio eliminato" confirmation alert before landing on the list
- extendedWaitUntil:
    visible: "Territorio eliminato"
    timeout: 10000
- tapOn: "OK"

# Back on the home list — assert btn-logout (brand-independent marker).
- extendedWaitUntil:
    visible:
      id: "btn-logout"
    timeout: 10000
