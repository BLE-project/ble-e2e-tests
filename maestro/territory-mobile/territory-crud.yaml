appId: com.terrio.territory
---
# Territory Mobile — CRUD happy-path
# Session 52 — verifies create → edit → delete against the real backend.
# Must run with a TENANT_ADMIN account (dev-tenant-admin) because the FAB
# and the delete button are gated.

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: "Terrio|Territory Manager|Territori|Nessun territorio|Errore"
    timeout: 30000

# If already logged in from a previous flow, logout first so we can
# re-login as dev-tenant-admin (who has TENANT_ADMIN role for CRUD).
- runFlow:
    when:
      visible: "Esci"
    commands:
      - tapOn: "Esci"
      - extendedWaitUntil:
          visible: "Territory Manager"
          timeout: 10000

# Now on the login screen — login as TENANT_ADMIN
- runFlow:
    when:
      visible: "Territory Manager"
    commands:
      - tapOn:
          id: "username-input"
      - inputText: "dev-tenant-admin"
      - hideKeyboard
      - tapOn:
          id: "password-input"
      - inputText: "dev-pass"
      - hideKeyboard
      - runFlow:
          when:
            visible: "Clipboard"
          commands:
            - pressKey: Back
      - tapOn:
          id: "login-btn"
      - extendedWaitUntil:
          visible: "Territori"
          timeout: 15000

# Dismiss Clipboard panel if lingering from Gboard
- runFlow:
    when:
      visible: "Clipboard"
    commands:
      - pressKey: Back

# Wait for the territory list to finish loading (React Query fetch);
# then scroll to ensure the FAB is visible on small-screen devices.
- extendedWaitUntil:
    visible:
      text: "Territori|Nessun territorio"
    timeout: 15000

# ── Create ─────────────────────────────────────────────────────────────────
- tapOn:
    id: "territory-list-new"

- extendedWaitUntil:
    visible: "Nuovo territorio"
    timeout: 5000

- tapOn:
    id: "territory-form-name"
- inputText: "Maestro Smoke Zone"
- hideKeyboard

- tapOn:
    id: "territory-form-visibility-closed"

- tapOn:
    id: "territory-form-submit"

# The app shows an Alert confirming creation — dismiss it before asserting
- extendedWaitUntil:
    visible: "Territorio creato"
    timeout: 10000
- tapOn: "OK"

- extendedWaitUntil:
    visible: "Maestro Smoke Zone"
    timeout: 10000

# ── Edit ───────────────────────────────────────────────────────────────────
- tapOn:
    id: "territory-detail-edit"

- extendedWaitUntil:
    visible: "Modifica territorio"
    timeout: 5000

- tapOn:
    id: "territory-form-name"
- eraseText
- inputText: "Maestro Smoke Zone Edited"
- hideKeyboard

- tapOn:
    id: "territory-form-submit"

# The app shows an Alert confirming update — dismiss it before asserting
- extendedWaitUntil:
    visible: "Territorio aggiornato"
    timeout: 10000
- tapOn: "OK"

- extendedWaitUntil:
    visible: "Maestro Smoke Zone Edited"
    timeout: 10000

# ── Delete ─────────────────────────────────────────────────────────────────
- tapOn:
    id: "territory-detail-delete"

- extendedWaitUntil:
    visible: "Eliminare territorio?"
    timeout: 5000

- tapOn: "Elimina"

# Dismiss the "Territorio eliminato" confirmation alert before landing on the list
- extendedWaitUntil:
    visible: "Territorio eliminato"
    timeout: 10000
- tapOn: "OK"

- extendedWaitUntil:
    visible: "Territori"
    timeout: 10000
