appId: com.terrio.territory
---
# Territory Mobile — Login flow
# Uses testID selectors: username-input, password-input, login-btn
# Session 52 — added after terrio-territory-mobile reached v0.2 with CRUD wiring.

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: "Terrio|Territory Manager|Territori|TERRIO Territory|Gestisci i tuoi territori"
    timeout: 30000

# If a previous flow left the app authenticated, logout first so we land
# on the login screen for this smoke test.
- runFlow:
    when:
      visible: "Esci"
    commands:
      - tapOn: "Esci"
      - extendedWaitUntil:
          visible: "TERRIO Territory|Territory Manager|Gestisci i tuoi territori"
          timeout: 10000

- assertVisible:
    text: "TERRIO Territory|Territory Manager|Gestisci i tuoi territori"

- tapOn:
    id: "username-input"
- inputText: "dev-territory-admin"
- hideKeyboard

- tapOn:
    id: "password-input"
- inputText: "dev-pass"
- hideKeyboard

# Gboard's clipboard suggestion panel can linger over the login button.
# Dismiss it before tapping login — same pattern used in sales-agent flows.
- runFlow:
    when:
      visible: "Clipboard"
    commands:
      - pressKey: Back

- tapOn:
    id: "login-btn"

# After login the territory-list screen renders; the header reads "Territori"
# via the Stack screenOptions. 20s allows for Keycloak token exchange latency.
# Network failure surfaces as "Accesso negato / Network request failed" dialog —
# treat that as a recoverable Gate-2 health miss (BFF unreachable), not a flow drift.
- extendedWaitUntil:
    visible: "Territori|Home|Lista|Caricamento|Accesso negato"
    timeout: 20000

# If we hit the network-error dialog, dismiss it (flow validates login button activation,
# not BFF backend health — that's Gate 2 scope).
- runFlow:
    when:
      visible: "Network request failed|Accesso negato"
    commands:
      - tapOn: "OK"
