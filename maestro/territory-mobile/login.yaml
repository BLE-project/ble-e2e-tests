appId: it.terrio.territory
---
# Territory Mobile — Login flow
# Uses testID selectors: username-input, password-input, login-btn
# Session 52 — added after terrio-territory-mobile reached v0.2 with CRUD wiring.

- launchApp:
    stopApp: true

# FIX-ITER6-001 (2026-05-02): unrooted device + release-signed APK refuses
# both `install -g` and `pm grant` — drain runtime permission dialogs that
# appear on cold-install (location precision picker → BLE → notification).
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            visible: "Mentre usi l'app|While using the app"
          commands:
            - tapOn: "Mentre usi l'app|While using the app"
      - runFlow:
          when:
            visible: "Consenti|Allow"
          commands:
            - tapOn: "Consenti|Allow"

# Sentinel INCLUDES "Accesso più rapido" — on a cold launch the biometric
# enrollment modal covers the screen first; its own text mentions "TERRIO
# Territory", so we must treat the modal as a valid "reached" state too.
- extendedWaitUntil:
    visible:
      text: ".*(Terrio|Territory Manager|Territori|TERRIO Territory|Accesso più rapido|Esci).*"
    timeout: 30000

# Dismiss the launch biometric modal FIRST so the home (with its "Esci" button)
# is revealed before the logout block runs — otherwise "Esci" stays covered and
# the logout silently skips, leaving us authenticated on a flow that needs the
# login screen.
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      - tapOn: { id: "enroll-never" }

# pm clear is denied on this unrooted device, so the app always launches
# authenticated. Log out via the "Esci" button (the FlatList now has flex:1 so
# the button is on-screen and tappable) and dismiss any post-logout biometric.
- runFlow:
    when:
      visible: "Esci"
    commands:
      - tapOn: "Esci"
      - runFlow:
          when: { visible: "Accesso più rapido" }
          commands: [ { tapOn: { id: "enroll-never" } } ]
      - extendedWaitUntil:
          visible:
            id: "username-input"
          timeout: 10000

- assertVisible: ".*(Territory Manager|TERRIO Territory|Gestisci i tuoi territori).*"

# A warm restart can land on the "Accesso più rapido" biometric enrollment
# modal BEFORE the login form is reachable (carry-over from a prior session
# that triggered the prompt). Dismiss it via the testID-bound opt-out tap.
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      - tapOn: { id: "enroll-never" }

- tapOn:
    id: "username-input"
- inputText: "dev-territory-admin"
- hideKeyboard

- tapOn:
    id: "password-input"
- inputText: "dev-pass"
- hideKeyboard

# Gboard's clipboard suggestion panel can linger over the login button.
# Dismiss it before tapping login — same pattern used in sales-agent flows.
- runFlow:
    when:
      visible: "Clipboard"
    commands:
      - pressKey: Back

- tapOn:
    id: "login-btn"

# FIX-ITER5-001 (2026-05-02): biometric enrollment prompt may appear post-login.
# "Non ora" button was removed — use pressKey:Back to dismiss the modal cleanly.
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      - pressKey: Back

# After login the territory-list screen renders. Assert on the btn-logout
# testID (always present on the home) rather than the header text: the Stack
# title is theme.appName ?? 'Territori', and the tenant white-label fixture
# overrides it to the brand name ("E2E Brand"), so "Territori" never matches.
# 15s allows for Keycloak token exchange latency.
- extendedWaitUntil:
    visible:
      id: "btn-logout"
    timeout: 15000
