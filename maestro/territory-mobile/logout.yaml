appId: com.terrio.territory
---
# Territory Mobile — Logout smoke test
# Verifies that tapping "Esci" from the territory list screen clears the
# SecureStore token and returns the user to the Territory Manager login.
# Session 55 — added to align territory-mobile with the 5-flow baseline
# used by the other mobile apps (consumer / merchant / tenant / sales-agent).

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: ".*(Terrio|Territory Manager|Territori|TERRIO Territory|Accesso più rapido).*"
    timeout: 30000

# Iter29 (2026-05-06): biometric dismiss via enroll-never testID instead of
# pressKey:Back. Back-press pops Expo Router auth-stack root → app exits
# dashboard mid-flow. enroll-never calls auth.optOut() with no nav side-effect.
# Mirrors the Iter15 sales-agent fix.
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      - tapOn:
          id: "enroll-never"

# Login if we're on the login screen (fresh install or previous logout).
# Iter4: gate on testID for unambiguous match — broader regex caused
# spurious activation on home screens whose text-overlap coincided.
- runFlow:
    when:
      visible:
        id: "username-input"
    commands:
      - tapOn:
          id: "username-input"
      - inputText: "dev-territory-admin"
      - hideKeyboard
      - tapOn:
          id: "password-input"
      - inputText: "dev-pass"
      - hideKeyboard
      - runFlow:
          when:
            visible: "Clipboard"
          commands:
            - pressKey: Back
      - tapOn:
          id: "login-btn"
      # Iter4: post-login biometric prompt — Back dismisses without logout.
      - runFlow:
          when:
            visible: "Accesso più rapido"
          commands:
            - pressKey: Back
      - extendedWaitUntil:
          visible: "Territori"
          timeout: 15000

# We are now on the territory list — scroll is not needed, "Esci" is at the
# bottom of a fixed footer. Tap it and assert we land on the login screen.
- tapOn: { id: "btn-logout" }

- extendedWaitUntil:
    visible:
      text: ".*(Territory Manager|TERRIO Territory|Gestisci i tuoi territori).*"
    timeout: 10000

# Confirm the username field is empty (SecureStore token cleared, user
# state reset to null).
- assertVisible: "Username"
- assertVisible: "Password"
