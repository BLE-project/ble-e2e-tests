appId: com.terrio.territory
---
# Territory Mobile — Logout smoke test
# Verifies that tapping "Esci" from the territory list screen clears the
# SecureStore token and returns the user to the Territory Manager login.
# Session 55 — added to align territory-mobile with the 5-flow baseline
# used by the other mobile apps (consumer / merchant / tenant / sales-agent).

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: "Terrio|Territory Manager|Territori"
    timeout: 30000

# Login if we're on the login screen (fresh install or previous logout)
- runFlow:
    when:
      visible: "Territory Manager"
    commands:
      - tapOn:
          id: "username-input"
      - inputText: "dev-territory-admin"
      - hideKeyboard
      - tapOn:
          id: "password-input"
      - inputText: "dev-pass"
      - hideKeyboard
      - runFlow:
          when:
            visible: "Clipboard"
          commands:
            - pressKey: Back
      - tapOn:
          id: "login-btn"
      - extendedWaitUntil:
          visible: "Territori"
          timeout: 15000

# We are now on the territory list — scroll is not needed, "Esci" is at the
# bottom of a fixed footer. Tap it and assert we land on the login screen.
- tapOn: "Esci"

- extendedWaitUntil:
    visible: "Territory Manager"
    timeout: 10000

# Confirm the username field is empty (SecureStore token cleared, user
# state reset to null).
- assertVisible: "Username"
- assertVisible: "Password"
