appId: com.terrio.merchant
---
# Merchant Mobile — Tab navigation smoke test
# Iter3 (2026-05-02): tabs realigned to actual app UI captured via uiautomator dump.
# Actual tabs: Account | Campagne | Fleet Beacon | Messaggi | POS | Report | Storico
# (Health/Beacons/Billing/Cashback/Home from older builds removed.)
# Post-login landing screen header is "Merchant" with "Today revenue" / "Transactions" / "Cashback issued" tiles.

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: ".*(TERRIO Merchant|Merchant portal|Dashboard|Gestisci il tuo negozio|Today revenue|Transactions).*"
    timeout: 30000

# FIX-ITER5-002 (2026-05-02): login screen no longer shows visible "Email" label
# (placeholders only). Gate on the login button text "Accedi" / "Sign in" which is
# the deterministic marker for being on the unauthenticated screen.
- runFlow:
    when:
      visible: "Accedi|Sign in"
    commands:
      - tapOn:
          id: "username-input"
      - inputText: "dev-merchant"
      - hideKeyboard
      - tapOn:
          id: "password-input"
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn:
          id: "login-btn"
      - runFlow:
          when:
            visible: "Accesso più rapido"
          commands:
            - pressKey: Back
      - extendedWaitUntil:
          visible:
            text: ".*(Today revenue|Transactions|Merchant).*"
          timeout: 15000

# Defensive: dismiss biometric / clipboard if surfaced.
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      # Iter3-A workaround: tapping "Non ora" triggers app logout (bug).
      - pressKey: Back
- runFlow:
    when:
      visible: "Clipboard"
    commands:
      - pressKey: Back

# ── Tab navigation ─────────────────────────────────────────────────────────

- tapOn:
    text: ".*, POS"
- extendedWaitUntil:
    visible:
      text: ".*POS.*"
    timeout: 5000

- tapOn:
    text: ".*, Storico"
- extendedWaitUntil:
    visible:
      text: ".*Storico.*"
    timeout: 5000

- tapOn:
    text: ".*, Campagne"
- extendedWaitUntil:
    visible:
      text: ".*Campagne.*"
    timeout: 5000

- tapOn:
    text: ".*, Account"
- extendedWaitUntil:
    visible:
      text: ".*Account.*"
    timeout: 5000

- tapOn:
    text: ".*, Report"
- extendedWaitUntil:
    visible:
      text: ".*Report.*"
    timeout: 5000
