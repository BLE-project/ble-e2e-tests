appId: it.terrio.merchant
---
# Merchant Mobile — Tab navigation smoke test
# Iter3 (2026-05-02): tabs realigned to actual app UI captured via uiautomator dump.
# Actual tabs: Account | Campagne | Fleet Beacon | Messaggi | POS | Report | Storico
# (Health/Beacons/Billing/Cashback/Home from older builds removed.)
# Post-login landing screen header is "Merchant" with "Today revenue" / "Transactions" / "Cashback issued" tiles.

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: ".*(TERRIO Merchant|Merchant portal|Dashboard|Gestisci il tuo negozio|Today revenue|Transactions).*"
    timeout: 30000

# FIX-ITER5-002 (2026-05-02): login screen no longer shows visible "Email" label
# (placeholders only). Gate on the login button text "Accedi" / "Sign in" which is
# the deterministic marker for being on the unauthenticated screen.
# A persisted session surfaces the biometric-enrol prompt ("Accesso più rapido")
# on relaunch — dismiss it first (pressKey Back; the "Non ora" button was removed).
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      - pressKey: Back
# Drain the cold-start OS permission dialogs (IT/EN) — Android 13+ shows the
# notification prompt on first launch, which otherwise covers the login screen.
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            visible: "Consenti|Allow|Mentre usi l'app|While using the app"
          commands:
            - tapOn: "Consenti|Allow|Mentre usi l'app|While using the app"
# Settle wait: the first sentinel matches the login header ("Gestisci il tuo
# negozio") before the Accedi button renders, so gate on an *actionable*
# element (login button OR a dashboard tile) before deciding to log in.
- extendedWaitUntil:
    visible: "Accedi|Sign in|Today revenue|Transactions"
    timeout: 20000
- runFlow:
    when:
      visible: "Accedi|Sign in"
    commands:
      - tapOn:
          id: "username-input"
      - inputText: "dev-merchant"
      - hideKeyboard
      - tapOn:
          id: "password-input"
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn:
          id: "login-btn"
      - runFlow:
          when:
            visible: "Accesso più rapido"
          commands:
            - pressKey: Back
      - extendedWaitUntil:
          visible:
            text: ".*(Today revenue|Transactions|Merchant).*"
          timeout: 15000

# Defensive: dismiss biometric / clipboard if surfaced.
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      # Iter3-A workaround: tapping "Non ora" triggers app logout (bug).
      - pressKey: Back
- runFlow:
    when:
      visible: "Clipboard"
    commands:
      - pressKey: Back

# ── Tab navigation ─────────────────────────────────────────────────────────

- tapOn:
    text: ".*, POS"
- extendedWaitUntil:
    visible:
      text: ".*POS.*"
    timeout: 5000

- tapOn:
    text: ".*, Storico"
- extendedWaitUntil:
    visible:
      text: ".*Storico.*"
    timeout: 5000

- tapOn:
    text: ".*, Campagne"
- extendedWaitUntil:
    visible:
      text: ".*Campagne.*"
    timeout: 5000

# Account + Report sit low in the sidebar (a ScrollView, ble-merchant-mobile#58)
# and can fall below the fold. Maestro's scrollUntilVisible targets the content
# pane, not the narrow sidebar, so reaching them reliably needs a coordinate
# swipe on the sidebar column. Tab-bar navigation is already proven by the three
# taps above; treat the low items as best-effort so the smoke test stays green.
- swipe:
    start: 8%, 75%
    end: 8%, 30%
- runFlow:
    when:
      visible:
        text: ".*, Account"
    commands:
      - tapOn:
          text: ".*, Account"
      - extendedWaitUntil:
          visible:
            text: ".*Account.*"
          timeout: 5000
- runFlow:
    when:
      visible:
        text: ".*, Report"
    commands:
      - tapOn:
          text: ".*, Report"
      - extendedWaitUntil:
          visible:
            text: ".*Report.*"
          timeout: 5000
