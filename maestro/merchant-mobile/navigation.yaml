appId: it.terrio.merchant
---
# Merchant Mobile — Tab navigation smoke test
# Iter3 (2026-05-02): tabs realigned to actual app UI captured via uiautomator dump.
# Actual tabs: Account | Campagne | Fleet Beacon | Messaggi | POS | Report | Storico
# (Health/Beacons/Billing/Cashback/Home from older builds removed.)
# Post-login landing screen header is "Merchant" with "Today revenue" / "Transactions" / "Cashback issued" tiles.

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: ".*(TERRIO Merchant|Merchant portal|Dashboard|Gestisci il tuo negozio|Today revenue|Transactions).*"
    timeout: 30000

# FIX-ITER5-002 (2026-05-02): login screen no longer shows visible "Email" label
# (placeholders only). Gate on the login button text "Accedi" / "Sign in" which is
# the deterministic marker for being on the unauthenticated screen.
# A persisted session surfaces the biometric-enrol prompt ("Accesso più rapido")
# on relaunch — dismiss it first (pressKey Back; the "Non ora" button was removed).
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      - pressKey: Back
# Drain the cold-start OS permission dialogs (IT/EN) — Android 13+ shows the
# notification prompt on first launch, which otherwise covers the login screen.
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            visible: "Consenti|Allow|Mentre usi l'app|While using the app"
          commands:
            - tapOn: "Consenti|Allow|Mentre usi l'app|While using the app"
# Settle wait: the first sentinel matches the login header ("Gestisci il tuo
# negozio") before the Accedi button renders, so gate on an *actionable*
# element (login button OR a dashboard tile) before deciding to log in.
# Dashboard tiles are localized — device in IT shows "Fatturato di oggi" /
# "Transazioni", never the EN strings (i18n-rot caught on-device 2026-07-10).
- extendedWaitUntil:
    visible: "Accedi|Sign in|Today revenue|Transactions|Fatturato di oggi|Transazioni"
    timeout: 20000
- runFlow:
    when:
      visible: "Accedi|Sign in"
    commands:
      - tapOn:
          id: "username-input"
      - inputText: "dev-merchant"
      - hideKeyboard
      - tapOn:
          id: "password-input"
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn:
          id: "login-btn"
      - runFlow:
          when:
            visible: "Accesso più rapido"
          commands:
            - pressKey: Back
      - extendedWaitUntil:
          visible:
            text: ".*(Today revenue|Transactions|Merchant).*"
          timeout: 15000

# Defensive: dismiss biometric / clipboard if surfaced.
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      # Iter3-A workaround: tapping "Non ora" triggers app logout (bug).
      - pressKey: Back
- runFlow:
    when:
      visible: "Clipboard"
    commands:
      - pressKey: Back

# ── Nav "4 + Altro" (redesign «La Piazza» C2, 2026-07-11) ────────────────────
# Rail primaria ridotta a Home | POS | ADV | Report | Altro (risolve overflow
# #58: niente più ScrollView/swipe). Storico/Campagne/Account sono migrate
# nell'hub "Altro" (route /more) come Card Piazza. POS e Report restano rail
# primaria → tap diretto invariato.

# POS (rail primaria) — INVARIATO
- tapOn:
    text: ".*, POS"
- extendedWaitUntil:
    visible:
      text: ".*POS.*"
    timeout: 5000

# Report (rail primaria) — INVARIATO (ora 4ª voce, sempre a video: niente swipe)
- tapOn:
    text: ".*, Report"
- extendedWaitUntil:
    visible:
      text: ".*Report.*"
    timeout: 5000

# Storico — migrata nell'hub "Altro". Tap rail Altro (a11y ", Altro") → card.
- tapOn:
    text: ".*, Altro"
- tapOn:
    text: "Storico"
- extendedWaitUntil:
    visible:
      text: ".*Storico.*"
    timeout: 5000

# Campagne — hub "Altro" (la rail resta visibile: ri-tap Altro riapre l'hub).
- tapOn:
    text: ".*, Altro"
- tapOn:
    text: "Campagne"
- extendedWaitUntil:
    visible:
      text: ".*Campagne.*"
    timeout: 5000

# Account — hub "Altro" (card più in basso post-redesign: scroll)
- tapOn:
    text: ".*, Altro"
- scrollUntilVisible:
    element: { text: "Account" }
    direction: DOWN
    timeout: 8000
- tapOn:
    text: "Account"
- extendedWaitUntil:
    visible:
      text: ".*Account.*"
    timeout: 5000
