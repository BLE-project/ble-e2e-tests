appId: com.terrio.merchant
---
# Merchant Mobile — Full tab navigation
# Tab bar: Home | Health | Beacons | POS | Billing | Cashback | Report

- launchApp:
    clearState: true

- extendedWaitUntil:
    visible: "TERRIO Merchant"
    timeout: 30000

- tapOn:
    text: "Email"
- inputText: "dev-merchant"
- tapOn:
    text: "Password"
- inputText: "dev-pass"
- tapOn: "Sign in"

- extendedWaitUntil:
    visible: "Home"
    timeout: 8000

# ── Tab navigation ─────────────────────────────────────────────────────────

- tapOn: "Health"
- extendedWaitUntil:
    visible: "Health"
    timeout: 5000

- tapOn: "Beacons"
- extendedWaitUntil:
    visible: "Beacons"
    timeout: 5000

- tapOn: "POS"
- extendedWaitUntil:
    visible: "Loyalty POS"
    timeout: 5000

- tapOn: "Billing"
- extendedWaitUntil:
    visible: "Billing"
    timeout: 5000

- tapOn: "Cashback"
- extendedWaitUntil:
    visible: "Cashback"
    timeout: 5000

- tapOn: "Report"
- extendedWaitUntil:
    visible: "Report Bug"
    timeout: 5000

# Return to home
- tapOn: "Home"
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 5000
