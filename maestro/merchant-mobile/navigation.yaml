appId: com.terrio.merchant
---
# Merchant Mobile — Full tab navigation
# Tab bar: Home | Health | Beacons | POS | Billing | Cashback | Report

- launchApp:
    stopApp: true

# Warm launches skip the splash and boot directly into Dashboard, so accept
# any of: splash brand, login screen, or post-login Dashboard as "ready".
- extendedWaitUntil:
    visible:
      text: "TERRIO Merchant|Merchant portal|Dashboard"
    timeout: 30000

# Previous flows may have persisted auth tokens in SecureStore. Only run
# the login steps if the login screen is actually showing.
- runFlow:
    when:
      visible: "Merchant portal"
    commands:
      - tapOn:
          text: "Email"
      - inputText: "dev-merchant"
      - hideKeyboard
      - tapOn:
          text: "Password"
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn: "Sign in"
      - extendedWaitUntil:
          visible: "Dashboard"
          timeout: 8000

# ── Tab navigation ─────────────────────────────────────────────────────────

- tapOn: "Health"
- extendedWaitUntil:
    visible: "Health"
    timeout: 5000

- tapOn: "Beacons"
- extendedWaitUntil:
    visible: "Beacons"
    timeout: 5000

- tapOn: "POS"
- extendedWaitUntil:
    visible: "Loyalty POS"
    timeout: 5000

- tapOn: "Billing"
- extendedWaitUntil:
    visible: "Billing"
    timeout: 5000

- tapOn: "Cashback"
- extendedWaitUntil:
    visible: "Cashback"
    timeout: 5000

- tapOn: "Report"
- extendedWaitUntil:
    visible: "Report Bug"
    timeout: 5000

# Return to home
- tapOn: "Home"
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 5000
