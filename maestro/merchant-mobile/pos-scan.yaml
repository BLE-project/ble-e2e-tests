appId: com.terrio.merchant
---
# Merchant Mobile — POS barcode scan flow

- launchApp:
    stopApp: true

# Warm launches skip the splash and boot directly into Dashboard.
- extendedWaitUntil:
    visible:
      text: "TERRIO Merchant|Merchant portal|Dashboard"
    timeout: 30000

# Previous flows may have persisted auth tokens in SecureStore. Only run
# the login steps if the login screen is actually showing.
- runFlow:
    when:
      visible: "Merchant portal"
    commands:
      - tapOn:
          text: "Email"
      - inputText: "dev-merchant"
      - hideKeyboard
      - tapOn:
          text: "Password"
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn: "Sign in"
      - extendedWaitUntil:
          visible: "Dashboard"
          timeout: 8000

# Navigate to POS tab
- tapOn: "POS"
- extendedWaitUntil:
    visible: "Loyalty POS"
    timeout: 5000

# FIX-S55-002: POS is a 3-step wizard with persistent state. If a previous
# transaction left it on STEP 3 (success), tap "Nuova Operazione" to
# rewind to STEP 1 before asserting.
- runFlow:
    when:
      visible: "Nuova Operazione"
    commands:
      - tapOn: "Nuova Operazione"
      - extendedWaitUntil:
          visible: "Identifica il Cliente"
          timeout: 5000

- assertVisible: "Identifica il Cliente"
# FIX-S56-004: the actual button text includes a box-drawing prefix
# ("▦  Scansiona Tessera"). Use regex substring match.
- assertVisible:
    text: ".*Scansiona Tessera"

# Enter barcode manually — optional; the Cerca Tessera button may be
# hidden behind the Gboard keyboard or the input may navigate back to
# Dashboard on some devices. We only run this when the placeholder
# chip is visible, and do not fail the whole flow if it isn't.
- runFlow:
    when:
      visible: "TERRIO-XXXX-XXXX-XXXX"
    commands:
      - tapOn: "TERRIO-XXXX-XXXX-XXXX"
      - inputText: "TERRIO-0000-0000-TEST"
      - hideKeyboard
      - runFlow:
          when:
            visible: "Cerca Tessera"
          commands:
            - tapOn: "Cerca Tessera"
            # Either card found OR "Tessera non trovata" — both are valid
            - extendedWaitUntil:
                visible:
                  text: "Tessera non trovata|Tessera trovata|Conferma"
                timeout: 10000
                optional: true
