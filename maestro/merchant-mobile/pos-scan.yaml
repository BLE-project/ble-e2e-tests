appId: com.terrio.merchant
---
# Merchant Mobile — POS barcode scan flow

- launchApp:
    clearState: true

- extendedWaitUntil:
    visible: "TERRIO Merchant"
    timeout: 30000

- tapOn:
    text: "Email"
- inputText: "dev-merchant"
- tapOn:
    text: "Password"
- inputText: "dev-pass"
- tapOn: "Sign in"

- extendedWaitUntil:
    visible: "Home"
    timeout: 8000

# Navigate to POS tab
- tapOn: "POS"
- extendedWaitUntil:
    visible: "Loyalty POS"
    timeout: 5000

- assertVisible: "Identifica il Cliente"
- assertVisible: "Scansiona Tessera"

# Enter barcode manually
- tapOn:
    id: "pos-barcode-input"
    optional: true
- runFlow:
    when:
      visible: "TERRIO-XXXX-XXXX-XXXX"
    commands:
      - tapOn: "TERRIO-XXXX-XXXX-XXXX"
- inputText: "TERRIO-0000-0000-TEST"

- tapOn: "Cerca Tessera"

# Either card found OR "Tessera non trovata" — both are valid flow exits
- extendedWaitUntil:
    visible: "Tessera non trovata"
    timeout: 10000
    optional: true
