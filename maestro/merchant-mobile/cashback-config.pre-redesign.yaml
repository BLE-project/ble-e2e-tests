appId: it.terrio.merchant
---
# Merchant Mobile — Cashback configuration screen (FEAT-MIN-SPEND-001)
# Tests: view current values, edit rate + min-spend, >25% warning

- launchApp:
    stopApp: true

# Warm launches skip the splash and boot directly into Dashboard.
# IT i18n (2026-05-13): subtitle "Gestisci il tuo negozio...", post-login "Panoramica".
# Sentinel includes "Accesso più rapido" + the actual post-login home tiles
# (Today revenue/Transactions), wrapped .*(...).* so substring matches the full
# element text. Mirrors the proven navigation.yaml preamble.
- extendedWaitUntil:
    visible:
      text: ".*(TERRIO Merchant|Merchant portal|Dashboard|Panoramica|Gestisci il tuo negozio|Today revenue|Transactions|Accesso più rapido).*"
    timeout: 30000

# Dismiss biometric enrollment modal if it surfaced on launch.
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      - pressKey: Back

# Previous flows may have persisted auth tokens in SecureStore. Only run
# the login steps if the login screen is actually showing.
- runFlow:
    when:
      visible: "Merchant portal|Gestisci il tuo negozio|Accedi"
    commands:
      - tapOn: { id: "username-input" }
      - inputText: "dev-merchant"
      - hideKeyboard
      - tapOn: { id: "password-input" }
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn: { id: "login-btn" }
      - runFlow:
          when:
            visible: "Accesso più rapido"
          commands:
            - pressKey: Back
      - extendedWaitUntil:
          visible:
            text: ".*(Dashboard|Panoramica|Today revenue|Transactions|Merchant).*"
          timeout: 15000

# Navigate to Cashback tab. The sidebar now has 9 items (ADV was added) which
# overflow the fixed left-rail viewport: Cashback is the 7th item and renders
# below the fold with collapsed/inverted bounds, so neither a label nor a
# testID match finds it. Maestro's auto-scroll drives the centre-screen content,
# not the narrow left rail — so swipe explicitly inside the sidebar (x≈12% of
# the 2400px-wide landscape canvas; the rail is the leftmost ~25%) to bring
# Cashback on-screen first.
- swipe:
    start: 12%, 78%
    end: 12%, 30%
    duration: 400
# Then tap by the sidebar item's accessibility label (".*, Cashback") — the
# proven pattern. A `tapOn: {id: tab-cashback-config}` resolves the testID node
# but does not fire onPress on-device (screen stays on Dashboard); the
# accessibility-label tap hits the TouchableOpacity centre and navigates.
- tapOn:
    text: ".*, Cashback"
- extendedWaitUntil:
    visible: "Configurazione Cashback"
    timeout: 5000

- assertVisible: "Valori attuali"
- assertVisible: "Nuovi valori"

# Enter a valid cashback rate (10%)
- tapOn:
    text: "es. 5 (min 5%, max 100%)"
- inputText: "10"
- hideKeyboard

- tapOn:
    text: "es. 5.00 (0 = nessun minimo)"
- inputText: "5.00"
- hideKeyboard

# The screen is a ScrollView and the Save button sits below the form — scroll
# it into view (the keyboard, now hidden, no longer covers it either).
- scrollUntilVisible:
    element:
      text: "Salva configurazione"
    direction: DOWN
    timeout: 10000

# Tap Save
- tapOn: "Salva configurazione"

# Expect success alert or error handling
- extendedWaitUntil:
    visible: "Salvato|Errore"
    timeout: 10000
    optional: true
