appId: it.terrio.merchant
tags:
  - adv
  - p1
---
# §9bis M8 P1 — Merchant ADV list with status filter UX.
# Verifies: empty-state, filter-dropdown reactive, no ADV leak between merchants.

# Robust login preamble (cold-install perm-drain + biometric dismiss + idempotent
# login) — shared subflow, fixes the "Terrio|Home|Merchant" launch-sentinel timeout.
- runFlow: _login.yaml

- tapOn: { id: "tab-campaigns" }

# Filter by each status, verify list updates
- extendedWaitUntil: { visible: "Tutti|Bozza|Approvata", timeout: 5000 }

# Filter: Approvata
- tapOn: "Approvata"
- assertVisible:
    text: "Approvata|APPROVED"
    optional: true

# Back to Tutti
- tapOn: "Tutti"

# Filter: Rifiutata
- tapOn: "Rifiutata"
- assertVisible:
    text: "Rifiutata|REJECTED|Nessuna ADV"
    optional: true

# New ADV button visible
- assertVisible: "Nuova ADV|+ Nuova"
