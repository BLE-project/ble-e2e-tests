appId: com.ble.merchant
---
# Merchant Mobile — Login flow
# Source: ble-merchant-mobile/app/login.tsx
#
# Login screen layout:
#   Title: "BLE Merchant"
#   Subtitle: "Merchant portal"
#   Input: placeholder "Email" (email-address keyboard)
#   Input: placeholder "Password" (secureTextEntry)
#   Button: "Sign in"

- launchApp

# Verify login screen is visible
- assertVisible: "BLE Merchant"
- assertVisible: "Merchant portal"

# Enter credentials
- tapOn:
    text: "Email"
- inputText: "dev-merchant"

- tapOn:
    text: "Password"
- inputText: "dev-pass"

# Submit login
- tapOn: "Sign in"

# Wait for login to complete — merchant app home tab is "Home" (Dashboard)
# Tab bar: Home | Health | Beacons | POS | Billing | Report
- assertVisible:
    text: "Home"
    timeout: 15000
