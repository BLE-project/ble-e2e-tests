appId: com.terrio.merchant
---
# Merchant Mobile — Login flow + BUG-003 verification

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible: "TERRIO Merchant"
    timeout: 30000

# IT locale (default): subtitle "Gestisci il tuo negozio...". EN fallback retained.
- assertVisible:
    text: "Gestisci il tuo negozio.*|Merchant portal"

- tapOn: { id: "username-input" }
- inputText: "dev-merchant"
- hideKeyboard

- tapOn: { id: "password-input" }
- inputText: "dev-pass"
- hideKeyboard

- tapOn: { id: "login-btn" }

- tapOn:
    text: "Non ora|Never|Not now"
    optional: true

- extendedWaitUntil:
    visible: "Home|Dashboard|Panoramica"
    timeout: 15000
