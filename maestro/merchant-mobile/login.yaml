appId: com.terrio.merchant
---
# Merchant Mobile — Login flow + BUG-003 verification

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible: "TERRIO Merchant"
    timeout: 30000

- assertVisible: "Merchant portal"

- tapOn:
    text: "Email"
- inputText: "dev-merchant"

- tapOn:
    text: "Password"
- inputText: "dev-pass"

- tapOn: "Sign in"

# BUG-003: login must navigate within 8s
- extendedWaitUntil:
    visible: "Home"
    timeout: 8000
