appId: it.terrio.merchant
---
# Merchant Mobile — Login flow + BUG-003 verification

- launchApp:
    stopApp: true

# FIX-ITER6-001 (2026-05-02): unrooted device + release-signed APK refuses
# both `install -g` and `pm grant` — drain runtime permission dialogs that
# appear on cold-install (location precision picker → BLE → notification).
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            visible: "Mentre usi l'app|While using the app"
          commands:
            - tapOn: "Mentre usi l'app|While using the app"
      - runFlow:
          when:
            visible: "Consenti|Allow"
          commands:
            - tapOn: "Consenti|Allow"

# FIX-ITER5-001 (2026-05-02): dialog may be lingering from a previous incomplete
# run; dismiss before any assertion.
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      - pressKey: Back

# Idempotent — accept splash OR post-login as valid starting state.
# Dashboard tiles are localized — device in IT shows "Fatturato di oggi" /
# "Transazioni" (same i18n-rot fix as navigation.yaml, 2026-07-10).
- extendedWaitUntil:
    visible: ".*(TERRIO Merchant|Fatturato di oggi|Transazioni|Dashboard|Storico).*"
    timeout: 30000

# Only enter credentials if actually on the login screen.
- runFlow:
    when:
      notVisible: "Fatturato di oggi|Transazioni|Dashboard|Storico"
    commands:
      - assertVisible: ".*(Merchant portal|Gestisci il tuo negozio).*"
      - tapOn: { id: "username-input" }
      - inputText: "dev-merchant"
      - hideKeyboard
      - tapOn: { id: "password-input" }
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn: { id: "login-btn" }
      - runFlow:
          when:
            visible: "Accesso più rapido"
          commands:
            - pressKey: Back

- extendedWaitUntil:
    visible: "Home|Dashboard|Fatturato di oggi|Transazioni|Storico"
    timeout: 15000
