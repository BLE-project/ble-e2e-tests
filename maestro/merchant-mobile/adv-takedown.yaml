appId: it.terrio.merchant
tags:
  - adv
  - p1
---
# §9bis M8 P1 — Merchant voluntarily takes down a PUBLISHED ADV.

# Robust login preamble (cold-install perm-drain + biometric dismiss + idempotent
# login) — shared subflow, fixes the "Terrio|Home|Merchant" launch-sentinel timeout.
- runFlow: _login.yaml

- tapOn: { id: "tab-adv" }

# Filter to approved
- extendedWaitUntil: { visible: "Approvata", timeout: 5000 }
- tapOn: "Approvata"

- extendedWaitUntil:
    visible: "Ritira ADV"
    timeout: 5000

- tapOn:
    id: "btn-takedown"

- extendedWaitUntil:
    visible: "Conferma takedown"
    timeout: 3000

- tapOn:
    id: "takedown-reason"
- inputText: "Prodotto esaurito, ritiro fino a reintegro stock"

- tapOn:
    id: "totp-code"
- inputText: "123456"
# Dismiss the keyboard — it overlaps the confirm button at the bottom of the modal.
- hideKeyboard

- tapOn:
    id: "action-confirm"

- extendedWaitUntil:
    visible: "Ritirata"
    timeout: 10000
