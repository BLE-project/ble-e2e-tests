appId: it.terrio.merchant
tags:
  - adv
  - p0
---
# §9bis M8 P0 — Merchant submits new ADV (happy path, LOW risk → auto-approve).

# Robust login preamble (cold-install perm-drain + biometric dismiss + idempotent
# login) — shared subflow, fixes the "Terrio|Home|Merchant" launch-sentinel timeout.
- runFlow: _login.yaml

# Navigate to ADV submit
- tapOn: "ADV|Campagne|Nuova"

- extendedWaitUntil:
    visible: "Nuova ADV|Invia per moderazione"
    timeout: 5000

- tapOn: { id: "adv-title" }
- inputText: "Sconto 10% prodotti selezionati"

- tapOn: { id: "adv-description" }
- inputText: "Valido fino al 30 aprile 2026 su una selezione di articoli del nostro store."

- tapOn: { id: "adv-discount-type" }
- tapOn: "Percentuale|percentage"

- tapOn: { id: "adv-discount-value" }
- inputText: "10"

- tapOn: { id: "adv-submit-btn" }

# Expect landing on status page with PENDING_AI or APPROVED badge
- extendedWaitUntil:
    visible: "In analisi AI|Approvata|Review umana"
    timeout: 15000
