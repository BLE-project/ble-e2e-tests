appId: com.terrio.merchant
---
# Merchant Mobile — Logout flow
# Iter3 (2026-05-02): "Home" tab is identified by content-desc=", Home" not text "Home".
# Sign out button is rendered inline on the home tab (text="Sign out" + content-desc="Sign out").

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: ".*(TERRIO Merchant|Merchant portal|Dashboard|Today revenue|Transactions).*"
    timeout: 30000

# Login if the login screen is actually showing.
- runFlow:
    when:
      visible: "Email"
    commands:
      - tapOn:
          id: "username-input"
      - inputText: "dev-merchant"
      - hideKeyboard
      - tapOn:
          id: "password-input"
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn:
          id: "login-btn"
      - tapOn:
          text: "Non ora|Never|Not now"
          optional: true
      - extendedWaitUntil:
          visible:
            text: ".*(Today revenue|Transactions|Merchant).*"
          timeout: 15000

- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      # Iter3-A workaround: tapping "Non ora" triggers app logout (bug).
      - pressKey: Back

# Iter3 (2026-05-02): merchant has no Home tab — landing page is the dashboard.
# Sign out button lives inline on the dashboard.
- extendedWaitUntil:
    visible:
      text: ".*(Today revenue|Transactions).*"
    timeout: 5000

- tapOn: "Sign out"

# Back to login screen.
- extendedWaitUntil:
    visible:
      text: ".*(TERRIO Merchant|Merchant portal|Gestisci il tuo negozio).*"
    timeout: 10000
