appId: it.terrio.merchant
---
# Merchant Mobile — Logout flow
# Iter3 (2026-05-02): "Home" tab is identified by content-desc=", Home" not text "Home".
# Sign out button is rendered inline on the home tab (text="Sign out" + content-desc="Sign out").

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: ".*(TERRIO Merchant|Merchant portal|Dashboard|Today revenue|Transactions).*"
    timeout: 30000

# FIX-ITER5-002 (2026-05-02): "Email" label removed; gate on "Accedi|Sign in"
# button which is the deterministic marker for the unauthenticated screen.
- runFlow:
    when:
      visible: "Accedi|Sign in"
    commands:
      - tapOn:
          id: "username-input"
      - inputText: "dev-merchant"
      - hideKeyboard
      - tapOn:
          id: "password-input"
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn:
          id: "login-btn"
      # Sprint14 P3 fix (2026-05-06): pressKey:Back popped Expo Router auth-stack
      # root → app navigated AWAY from dashboard. Use enroll-never testID
      # instead (auth.optOut() from JS state, no nav side-effect).
      # 2026-07-02: la modale biometrica compare async post-auth; il dismiss
      # one-shot la mancava (race) e la copy dashboard EN "Today revenue" non
      # matcha col device in locale IT. Retry-dismiss con attesa tra i tentativi
      # (cattura la modale ritardata, no-op se opt-out già persistito); la
      # landing è verificata più sotto dallo scrollUntilVisible su btn-logout.
      - repeat:
          times: 5
          commands:
            - runFlow:
                when:
                  visible: "Accesso più rapido"
                commands:
                  - tapOn:
                      id: "enroll-never"
            - waitForAnimationToEnd:
                timeout: 1500

- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      # Sprint14 P3 fix (2026-05-06): same enroll-never fix as above for the
      # warm-launch dismiss path.
      - tapOn:
          id: "enroll-never"

# Iter3 (2026-05-02): merchant has no Home tab — landing page is the dashboard.
# Sign out button lives inline on the dashboard.
# 2026-07-02: testID btn-logout (index.tsx) invece del testo "Sign out"
# (device IT mostra "Esci"); scrollUntilVisible assorbe il caso in cui il
# bottone è sotto la fold della dashboard.
- scrollUntilVisible:
    element:
      id: "btn-logout"
    direction: DOWN
    timeout: 8000
- tapOn: { id: "btn-logout" }

# Back to login screen.
- extendedWaitUntil:
    visible:
      text: ".*(TERRIO Merchant|Merchant portal|Gestisci il tuo negozio).*"
    timeout: 10000
