appId: com.terrio.merchant
---
# Merchant Mobile — Logout flow
# Iter3 (2026-05-02): "Home" tab is identified by content-desc=", Home" not text "Home".
# Sign out button is rendered inline on the home tab (text="Sign out" + content-desc="Sign out").

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: ".*(TERRIO Merchant|Merchant portal|Dashboard|Today revenue|Transactions).*"
    timeout: 30000

# FIX-ITER5-002 (2026-05-02): "Email" label removed; gate on "Accedi|Sign in"
# button which is the deterministic marker for the unauthenticated screen.
- runFlow:
    when:
      visible: "Accedi|Sign in"
    commands:
      - tapOn:
          id: "username-input"
      - inputText: "dev-merchant"
      - hideKeyboard
      - tapOn:
          id: "password-input"
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn:
          id: "login-btn"
      # Sprint14 P3 fix (2026-05-06): pressKey:Back popped Expo Router auth-stack
      # root → app navigated AWAY from dashboard, breaking post-modal assertion.
      # Use enroll-never testID instead (auth.optOut() from JS state, no nav
      # side-effect). Same Iter15 sales-agent + Iter29 territory + Iter30 consumer
      # fix pattern.
      - runFlow:
          when:
            visible: "Accesso più rapido"
          commands:
            - tapOn:
                id: "enroll-never"
      - extendedWaitUntil:
          visible:
            text: ".*(Today revenue|Transactions|Merchant).*"
          timeout: 15000

- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      # Sprint14 P3 fix (2026-05-06): same enroll-never fix as above for the
      # warm-launch dismiss path.
      - tapOn:
          id: "enroll-never"

# Iter3 (2026-05-02): merchant has no Home tab — landing page is the dashboard.
# Sign out button lives inline on the dashboard.
- extendedWaitUntil:
    visible:
      text: ".*(Today revenue|Transactions).*"
    timeout: 5000

- tapOn: "Sign out"

# Back to login screen.
- extendedWaitUntil:
    visible:
      text: ".*(TERRIO Merchant|Merchant portal|Gestisci il tuo negozio).*"
    timeout: 10000
