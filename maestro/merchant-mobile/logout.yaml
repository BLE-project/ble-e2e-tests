appId: com.terrio.merchant
---
# Merchant Mobile — Logout flow

- launchApp:
    stopApp: true

# Warm launches skip the splash and boot directly into Dashboard.
- extendedWaitUntil:
    visible:
      text: "TERRIO Merchant|Merchant portal|Dashboard"
    timeout: 30000

# Previous flows may have persisted auth tokens in SecureStore. Only run
# the login steps if the login screen is actually showing.
- runFlow:
    when:
      visible: "Merchant portal"
    commands:
      - tapOn:
          text: "Email"
      - inputText: "dev-merchant"
      - hideKeyboard
      - tapOn:
          text: "Password"
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn: "Sign in"
      - extendedWaitUntil:
          visible: "Dashboard"
          timeout: 8000

# Navigate to Home tab (Dashboard) — the logout button "Sign out" lives in
# the welcome header band there.
- tapOn: "Home"
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 5000

- tapOn: "Sign out"

# Back to login
- extendedWaitUntil:
    visible: "Merchant portal"
    timeout: 8000
