appId: it.terrio.merchant
---
# Merchant Mobile — Cashback configuration screen (FEAT-MIN-SPEND-001)
# Tests: view current values, edit rate + min-spend, >25% warning

- launchApp:
    stopApp: true

# Warm launches skip the splash and boot directly into Dashboard.
# IT i18n (2026-05-13): subtitle "Gestisci il tuo negozio...", post-login "Panoramica".
# Sentinel includes "Accesso più rapido" + the actual post-login home tiles
# (Today revenue/Transactions), wrapped .*(...).* so substring matches the full
# element text. Mirrors the proven navigation.yaml preamble.
- extendedWaitUntil:
    visible:
      text: ".*(TERRIO Merchant|Merchant portal|Dashboard|Panoramica|Gestisci il tuo negozio|Today revenue|Transactions|Accesso più rapido).*"
    timeout: 30000

# Dismiss biometric enrollment modal if it surfaced on launch.
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      - pressKey: Back

# Previous flows may have persisted auth tokens in SecureStore. Only run
# the login steps if the login screen is actually showing.
- runFlow:
    when:
      visible: "Merchant portal|Gestisci il tuo negozio|Accedi"
    commands:
      - tapOn: { id: "username-input" }
      - inputText: "dev-merchant"
      - hideKeyboard
      - tapOn: { id: "password-input" }
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn: { id: "login-btn" }
      - runFlow:
          when:
            visible: "Accesso più rapido"
          commands:
            - pressKey: Back
      - extendedWaitUntil:
          visible:
            text: ".*(Dashboard|Panoramica|Today revenue|Transactions|Merchant).*"
          timeout: 15000

# Navigate to Cashback tab
- tapOn: { id: "tab-cashback-config" }
- extendedWaitUntil:
    visible: "Configurazione Cashback"
    timeout: 5000

- assertVisible: "Valori attuali"
- assertVisible: "Nuovi valori"

# Enter a valid cashback rate (10%)
- tapOn:
    text: "es. 5 (min 5%, max 100%)"
- inputText: "10"

- tapOn:
    text: "es. 5.00 (0 = nessun minimo)"
- inputText: "5.00"

# Tap Save
- tapOn: "Salva configurazione"

# Expect success alert or error handling
- extendedWaitUntil:
    visible: "Salvato|Errore"
    timeout: 10000
    optional: true
