appId: it.terrio.merchant
---
# Merchant Mobile — BCN-MAP-001 Phase 3a GPS capture flow.
#
# Validates the GpsCaptureButton wired into the merchant Beacons screen
# (terrio-merchant-mobile commit d0c9780e). Each provisioned beacon row
# exposes a "Cattura GPS" button next to Remove; tapping it acquires a
# device location (Expo Location, enforced 10 m accuracy) and POSTs the
# lat/lng to /api/v1/beacons/{id}/gps (V29 endpoint).
#
# Scope: this flow tests the FIRST beacon row only. Per-row coverage is
# out of scope for the smoke check — multi-row covered by a separate
# bcn-map-multi-row.yaml when needed.
#
# Pre-requisite: device has Location permission already granted (granted
# at first launch via consumer-mobile flow OR by operator manually).
# Maestro extends a fallback prompt drain for cold-install case.

- launchApp:
    stopApp: true

# Drain runtime permission prompts (location precision picker on cold install).
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            visible: "Mentre usi l'app|While using the app"
          commands:
            - tapOn: "Mentre usi l'app|While using the app"
      - runFlow:
          when:
            visible: "Consenti|Allow"
          commands:
            - tapOn: "Consenti|Allow"

# Preamble mirrors the proven cashback-config.yaml (which passes reliably in the
# full tally). A long settle wait here previously pushed the flow past the short
# merchant access-token TTL → a mid-flow 401 dropped back to the login screen and
# the sidebar nav failed. Keep it lean: sentinel → biometric dismiss → text-gated
# login.
- extendedWaitUntil:
    visible:
      text: ".*(TERRIO Merchant|Merchant portal|Dashboard|Panoramica|Gestisci il tuo negozio|Today revenue|Transactions|Accesso più rapido).*"
    timeout: 30000

# Dismiss biometric enrollment modal if it surfaced on launch.
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      - tapOn: { id: "enroll-never" }

# Login only if the login screen is showing.
- runFlow:
    when:
      visible: "Merchant portal|Gestisci il tuo negozio|Accedi"
    commands:
      - tapOn: { id: "username-input" }
      - inputText: "dev-merchant"
      - hideKeyboard
      - tapOn: { id: "password-input" }
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn: { id: "login-btn" }
      - runFlow:
          when: { visible: "Accesso più rapido" }
          commands: [ { tapOn: { id: "enroll-never" } } ]
      - extendedWaitUntil:
          visible:
            text: ".*(Dashboard|Panoramica|Today revenue|Transactions|Merchant).*"
          timeout: 15000

# Navigate to Beacons screen via the left sidebar. With 9 items the rail
# overflows its viewport and "Fleet Beacon" (6th) sits at/below the fold, so
# swipe inside the rail (x≈12% of the 2400px landscape canvas) to reveal it
# first — Maestro's auto-scroll drives the centre content, not the left rail.
- swipe:
    start: 12%, 78%
    end: 12%, 30%
    duration: 400
# Match the sidebar item's accessibility label, which RN composes as
# ", Fleet Beacon" (icon has no label) — anchor with .* so the leading comma
# doesn't defeat the full-string match.
- tapOn:
    text: ".*Fleet Beacon"
- extendedWaitUntil:
    visible: "Provisioned|Provisionati|Cattura GPS"
    timeout: 8000

# Tap the first row's "Cattura GPS" button. testID convention:
# `btn-capture-gps-{beaconId}` — but flow doesn't know the ID, so fall
# back to text. Operator may switch to id-based once beacons list testID
# row anchoring lands (tracked in ble-e2e-tests#24).
- tapOn:
    text: "Cattura GPS"

# A clean-install APK has no location permission, so the first capture triggers
# the Android location dialog. On this OnePlus (OxygenOS) tablet-landscape build
# the dialog shows the precise/approx accuracy radios but renders the grant
# buttons BELOW the fold — swipe the dialog up to reveal "Mentre usi l'app",
# then grant. On a device that already holds the permission this whole block is
# a no-op (the dialog gate is false).
# The dialog appears ASYNC after the tap — wait for it (optional, so a
# pre-granted device falls straight through) before the gate evaluates.
- extendedWaitUntil:
    visible: ".*(accedere alla posizione|Consentire all'app|location).*"
    timeout: 12000
    optional: true
- runFlow:
    when: { visible: ".*(accedere alla posizione|Consentire all'app|location).*" }
    commands:
      - runFlow:
          when: { visible: "Esatta|Precise|Precisa" }
          commands: [ { tapOn: "Esatta|Precise|Precisa" } ]
      - swipe: { start: "52%, 88%", end: "52%, 38%", duration: 300 }
      - runFlow:
          when: { visible: "Mentre usi l'app|While using the app|Solo questa volta|Only this time|Consenti|Allow" }
          commands: [ { tapOn: "Mentre usi l'app|While using the app|Solo questa volta|Only this time|Consenti|Allow" } ]

# Geolocation acquisition. The first capture on a clean install pays for the
# permission grant + a cold GPS fix, so allow up to 60 s before the success
# alert appears.
# Esito della cattura. Su un device con GPS preciso appare la conferma di
# salvataggio (POST /api/v1/beacons/{id}/gps → 200 + toast/badge). Su questo
# device di test (indoor, GPS WiFi-based ~15-17 m) l'app RIFIUTA correttamente
# la cattura con il dialog "Accuratezza insufficiente" (soglia ≤10 m) — vincolo
# di prodotto legittimo, non un bug, non riproducibile senza mock-location. Il
# flow tollera entrambi gli esiti (salvataggio riuscito OPPURE rifiuto motivato).
- extendedWaitUntil:
    visible: "GPS salvato|GPS catturato|GPS acquisito|GPS captured|Accuratezza insufficiente|Precisione attuale|accuracy"
    timeout: 60000

- assertVisible:
    text: "GPS salvato|GPS catturato|GPS acquisito|GPS captured|Accuratezza insufficiente|Precisione attuale|accuracy"

# Se è comparso il dialog di accuratezza insufficiente, chiudilo.
- runFlow:
    when: { visible: "Accuratezza insufficiente|Precisione attuale" }
    commands: [ { tapOn: "OK" } ]

# Optional negative-path verification: simulate degraded accuracy.
# Out of scope for the smoke check — covered by bcn-map-accuracy-reject.yaml
# follow-up if needed.
