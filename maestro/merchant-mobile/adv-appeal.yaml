appId: it.terrio.merchant
tags:
  - adv
  - p1
---
# §9bis M8 P1 — Merchant opens appeal on REJECTED ADV.
# Precondition: 1 ADV in REJECTED status seeded.

# Robust login preamble (cold-install perm-drain + biometric dismiss + idempotent
# login) — shared subflow, fixes the "Terrio|Home|Merchant" launch-sentinel timeout.
- runFlow: _login.yaml

- tapOn: { id: "tab-adv" }

# Filter to rejected
- extendedWaitUntil: { visible: "Rifiutata|Tutti", timeout: 5000 }

# Tap first rejected ADV
- tapOn: "Rifiutata"

- extendedWaitUntil:
    visible: "Fai appello"
    timeout: 5000

- tapOn:
    id: "btn-appeal"

- extendedWaitUntil:
    visible: "Apri appello"
    timeout: 3000

- tapOn:
    id: "appeal-reason"
- inputText: "Richiesta riconsiderazione: ho corretto il claim misleading."

- tapOn:
    id: "totp-code"
- inputText: "123456"
# Dismiss the keyboard — it overlaps the confirm button at the bottom of the modal.
- hideKeyboard

- tapOn:
    id: "action-confirm"

- extendedWaitUntil:
    visible: "Appello in corso|In analisi AI"
    timeout: 10000
