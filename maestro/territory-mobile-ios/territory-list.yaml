appId: com.terrio.territory
tags:
  - list
  - p1
  - ios
---
# Territory Mobile — List screen + drill-down smoke test (iOS)

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: "Terrio|Territory Manager|Territori|Nessun territorio"
    timeout: 30000

- runFlow:
    when:
      visible: "Esci"
    commands:
      - tapOn: "Esci"
      - extendedWaitUntil:
          visible: "Territory Manager"
          timeout: 10000

- runFlow:
    when:
      visible: "Territory Manager"
    commands:
      - tapOn:
          id: "username-input"
      - inputText: "dev-territory-admin"
      - tapOn:
          id: "password-input"
      - inputText: "dev-pass"
      - tapOn:
          id: "login-btn"
      - extendedWaitUntil:
          visible: "Territori"
          timeout: 15000

- assertVisible:
    text: "Territori|Nessun territorio"

- assertNotVisible:
    id: "territory-list-new"
