appId: com.terrio.territory
tags:
  - login
  - p1
  - ios
---
# Territory Mobile — Login flow (iOS)

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: "Terrio|Territory Manager|Territori"
    timeout: 30000

- runFlow:
    when:
      visible: "Esci"
    commands:
      - tapOn: "Esci"
      - extendedWaitUntil:
          visible: "Territory Manager"
          timeout: 10000

- assertVisible: "Territory Manager"

- tapOn:
    id: "username-input"
- inputText: "dev-territory-admin"

- tapOn:
    id: "password-input"
- inputText: "dev-pass"

- tapOn:
    id: "login-btn"

- extendedWaitUntil:
    visible: "Territori"
    timeout: 15000
