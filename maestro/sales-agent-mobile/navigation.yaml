appId: com.terrio.salesagent
---
# Sales Agent Mobile — Full tab navigation
# Tab bar: Home | Richieste | Merchant | Royalties | Beacon | Profilo

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: ".*(Terrio|Agente Commerciale|Dashboard|TERRIO Sales|Assistenza merchant).*"
    timeout: 30000

# Previous flows may have persisted auth tokens in SecureStore. Only run
# the login steps if the login screen is actually showing.
- runFlow:
    when:
      visible: "Username"
    commands:
      - tapOn:
          id: "username-input"
      - inputText: "dev-sales-agent"
      - hideKeyboard
      - tapOn:
          id: "password-input"
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn:
          id: "login-btn"
      # Iter3-A (iter11 pivot, 2026-05-03): tap the proper opt-out testID
      # instead of pressKey:Back. Back-press goes through Expo Router's
      # native-stack and pops the auth-stack root; tapping `enroll-never`
      # calls auth.optOut() + onDone() entirely from JS state, no nav
      # side-effect. optOut() persists, so warm launches won't re-show.
      - runFlow:
          when:
            visible: "Accesso più rapido"
          commands:
            - tapOn:
                id: "enroll-never"
      # Iter15 (2026-05-04): widened post-modal assertion target.
      # Was `text: ".*(Home|Dashboard).*"` timeout 15s — that targets the
      # Tabs-internal screen header / tab-bar label, which is not exposed to
      # uiautomator until Tabs are fully active. iter11→iter14 proved the
      # YAML pivot dismisses the modal cleanly but this assertion still timed
      # out. `Panoramica` is the section title rendered by app/(app)/index.tsx:117
      # (a plain Text in the dashboard scroll body, outside Tabs internals)
      # and renders as soon as the index route mounts. Screenshot pre-asserts
      # so any future FAIL has visual evidence of what's on screen.
      - takeScreenshot: post-modal-dismiss
      - extendedWaitUntil:
          visible: "Panoramica"
          timeout: 30000

# Iter3-A (iter11): warm-launch fallback — same testID-tap path.
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      - tapOn:
          id: "enroll-never"

# Gboard's clipboard suggestion panel can linger after inputText and cover
# the bottom tab bar. Dismiss it if present before interacting with tabs.
- runFlow:
    when:
      visible: "Clipboard"
    commands:
      - pressKey: Back

# ── Tab navigation ─────────────────────────────────────────────────────────

- tapOn: "Richieste"
- extendedWaitUntil:
    visible: "Richieste"
    timeout: 5000

- tapOn: "Merchant"
- extendedWaitUntil:
    visible: "Merchant"
    timeout: 5000

- tapOn: "Royalties"
- extendedWaitUntil:
    visible: "Royalties"
    timeout: 5000

- tapOn: "Beacon"
- extendedWaitUntil:
    visible: "Beacon"
    timeout: 5000

- tapOn: "Profilo"
- extendedWaitUntil:
    visible: "Profilo"
    timeout: 5000

# Return to home
- tapOn: "Home"
# Iter27 (2026-05-05): "Dashboard" was the Tabs-internal screen header, not
# observable via uiautomator until Tabs are fully active — same gap that
# Iter15 fixed in login/logout flows. "Panoramica" is the section title
# rendered by app/(app)/index.tsx:117 and exposed in the accessibility
# tree as soon as the index route mounts. 30s timeout absorbs route
# remount + react-query refetch on tab switch.
- extendedWaitUntil:
    visible: "Panoramica"
    timeout: 30000
