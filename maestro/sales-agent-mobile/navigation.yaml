appId: com.terrio.salesagent
---
# Sales Agent Mobile — Full tab navigation
# Tab bar: Home | Richieste | Merchant | Royalties | Beacon | Profilo

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: ".*(Terrio|Agente Commerciale|Dashboard|TERRIO Sales|Assistenza merchant).*"
    timeout: 30000

# Previous flows may have persisted auth tokens in SecureStore. Only run
# the login steps if the login screen is actually showing.
- runFlow:
    when:
      visible: "Username"
    commands:
      - tapOn:
          id: "username-input"
      - inputText: "dev-sales-agent"
      - hideKeyboard
      - tapOn:
          id: "password-input"
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn:
          id: "login-btn"
      # Iter3-A: biometric "Non ora" tap triggers app logout (bug). Use Back.
      - runFlow:
          when:
            visible: "Accesso più rapido"
          commands:
            - pressKey: Back
      - extendedWaitUntil:
          visible:
            text: ".*(Home|Dashboard).*"
          timeout: 15000

# Iter3-A: biometric dialog can re-appear on warm launches.
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      - pressKey: Back

# Gboard's clipboard suggestion panel can linger after inputText and cover
# the bottom tab bar. Dismiss it if present before interacting with tabs.
- runFlow:
    when:
      visible: "Clipboard"
    commands:
      - pressKey: Back

# ── Tab navigation ─────────────────────────────────────────────────────────

- tapOn: "Richieste"
- extendedWaitUntil:
    visible: "Richieste"
    timeout: 5000

- tapOn: "Merchant"
- extendedWaitUntil:
    visible: "Merchant"
    timeout: 5000

- tapOn: "Royalties"
- extendedWaitUntil:
    visible: "Royalties"
    timeout: 5000

- tapOn: "Beacon"
- extendedWaitUntil:
    visible: "Beacon"
    timeout: 5000

- tapOn: "Profilo"
- extendedWaitUntil:
    visible: "Profilo"
    timeout: 5000

# Return to home
- tapOn: "Home"
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 5000
