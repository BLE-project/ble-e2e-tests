appId: com.terrio.salesagent
---
# Sales Agent Mobile — Registration Requests flow + status filters

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: "Terrio|Agente Commerciale|Dashboard"
    timeout: 30000

# Previous flows may have persisted auth tokens in SecureStore. Only run
# the login steps if the login screen is actually showing.
- runFlow:
    when:
      visible: "Agente Commerciale"
    commands:
      - tapOn:
          id: "username-input"
      - inputText: "dev-sales-agent"
      - hideKeyboard
      - tapOn:
          id: "password-input"
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn:
          id: "login-btn"
      - extendedWaitUntil:
          visible: "Dashboard"
          timeout: 10000

# Dismiss Gboard clipboard suggestion panel if still covering tab bar.
- runFlow:
    when:
      visible: "Clipboard"
    commands:
      - pressKey: Back

# Navigate to Richieste tab
- tapOn: "Richieste"
- extendedWaitUntil:
    visible: "Richieste"
    timeout: 5000

# Test status filters
- assertVisible: "PENDING"
- tapOn: "ALL"
- tapOn: "IN_REVIEW"
- tapOn: "APPROVED"
- tapOn: "REJECTED"
- tapOn: "PENDING"
