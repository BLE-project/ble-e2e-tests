appId: it.terrio.salesagent
tags:
  - moderation
  - p0
---
# §9bis M8 P0 — Moderation APPROVE flow.
# Precondition: at least 1 ADV PENDING_HUMAN seeded via BFF, TOTP enrolled.
# Login fixture: dev-sales-agent / dev-pass (FIX-S56-007 logout guard).

- launchApp:
    stopApp: true

# Login (copied from login.yaml logout-first guard)
- extendedWaitUntil:
    visible:
      text: "Terrio|TERRIO Sales|Assistenza merchant|Home|Agente Commerciale"
    timeout: 30000

- runFlow:
    when:
      visible: "Home"
    commands:
      - tapOn: { id: "tab-profilo" }
      - extendedWaitUntil: { visible: "Esci dall'account|Esci|Logout", timeout: 5000 }
      - tapOn: { id: "btn-logout" }
      - extendedWaitUntil: { visible: "TERRIO Sales|Assistenza merchant.*|Agente Commerciale", timeout: 10000 }

- tapOn: { id: "username-input" }
- inputText: "dev-sales-agent"
- hideKeyboard
- tapOn: { id: "password-input" }
- inputText: "dev-pass"
- hideKeyboard
- runFlow:
    when: { visible: "Clipboard" }
    commands: [ { pressKey: Back } ]
- tapOn: { id: "login-btn" }
# Fresh-install biometric enrolment prompt appears POST-login → dismiss it.
- runFlow:
    when: { visible: "Accesso più rapido" }
    commands: [ { tapOn: "Non chiedermelo più" } ]
- extendedWaitUntil: { visible: "Home", timeout: 8000 }

# Home shows Moderazioni tile with count
- assertVisible: "Moderazioni"

# Navigate to moderation queue. Wait on the actual list row (the next tap target)
# rather than the header copy — the first list fetch can take >5s on a cold start
# and the row id is the real precondition.
- tapOn: "Moderazioni"
- extendedWaitUntil:
    visible:
      id: "moderation-row"
    timeout: 20000

# Tap a VERDICT-bearing row by the title rendered by the mobile app. The seed
# source title is prefixed E2E-MOD-01, but the review API/mobile card exposes the
# normalized campaign title ("Sconto 10% prodotti selezionati").
- scrollUntilVisible:
    element:
      text: "Sconto 10% prodotti selezionati.*"
    direction: DOWN
    timeout: 30000
- tapOn:
    text: "Sconto 10% prodotti selezionati.*"

- extendedWaitUntil:
    visible: "ANALISI AI"
    timeout: 5000

# Approve
- tapOn:
    id: "btn-approve"

- extendedWaitUntil:
    visible: "Approva ADV"
    timeout: 3000

- tapOn:
    id: "reason-input"
- inputText: "Contenuto conforme policy"
- hideKeyboard   # keyboard covers the TOTP field below — dismiss before tapping

- tapOn:
    id: "totp-input"
- inputText: "123456"   # dev fixture — identity-access mock accepts 123456
- hideKeyboard

- tapOn:
    id: "confirm-action"

- extendedWaitUntil:
    visible: "Approvata|approvata|ADV approvata"
    timeout: 10000

# Dismiss the success dialog, then confirm we are back in the queue (now
# decremented — the approved ADV left the PENDING_HUMAN list).
- tapOn: "OK"
- extendedWaitUntil:
    visible:
      id: "moderation-row"
    timeout: 10000
