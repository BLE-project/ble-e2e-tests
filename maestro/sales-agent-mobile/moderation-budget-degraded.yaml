appId: it.terrio.salesagent
tags:
  - moderation
  - p2
---
# §9bis M8 P2 — Verify that when budget tier=HUMAN_ONLY, all ADVs skip AI
# and land directly in human review queue (they appear without claudeRiskLevel).
# Precondition: seed fixture sets tenant budget to 100% to force HUMAN_ONLY tier.

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible: "Terrio|TERRIO Sales|Assistenza merchant|Home|Agente Commerciale"
    timeout: 30000

- runFlow:
    when: { visible: "Home" }
    commands:
      - tapOn: { id: "tab-profilo" }
      - extendedWaitUntil: { visible: "Esci dall'account|Esci|Logout", timeout: 5000 }
      - tapOn: { id: "btn-logout" }
      - extendedWaitUntil: { visible: "TERRIO Sales|Assistenza merchant.*|Agente Commerciale", timeout: 10000 }

- tapOn: { id: "username-input" }
- inputText: "dev-sales-agent"
- hideKeyboard
- tapOn: { id: "password-input" }
- inputText: "dev-pass"
- hideKeyboard
- runFlow:
    when: { visible: "Clipboard" }
    commands: [ { pressKey: Back } ]
- tapOn: { id: "login-btn" }
# Fresh-install biometric enrolment prompt appears POST-login → dismiss it.
- runFlow:
    when: { visible: "Accesso più rapido" }
    commands: [ { tapOn: "Non chiedermelo più" } ]
- extendedWaitUntil: { visible: "Home", timeout: 8000 }

- tapOn: "Moderazioni"
# Wait on the list row id (styled header copy isn't reliably matched).
- extendedWaitUntil:
    visible:
      id: "moderation-row"
    timeout: 20000

# Target the budget-degraded ADV specifically: seeded under HUMAN_ONLY (spend
# forced to 100% via POST /v1/adv/budget) so it skipped Claude → no verdict.
# It is the newest → last in the queue (ordered by salesReviewExpiresAt), so the
# approve/reject flows (which tap the first row) hit a verdict ADV instead.
# 30 s scroll budget: the shared review queue can hold dozens of rows after a
# full suite's worth of top-ups, and the budget-degraded ADV sits at the very
# bottom (newest by salesReviewExpiresAt).
- scrollUntilVisible:
    element:
      text: "E2E-BUDGET no-verdict ADV"
    direction: DOWN
    timeout: 30000
- tapOn:
    text: "E2E-BUDGET no-verdict ADV"

- extendedWaitUntil:
    visible: "DESCRIZIONE"
    timeout: 5000

# Claude verdict section ("ANALISI AI") must NOT be visible — HUMAN_ONLY skipped AI.
- assertNotVisible: "ANALISI AI"
