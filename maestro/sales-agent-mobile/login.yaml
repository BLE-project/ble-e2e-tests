appId: com.terrio.salesagent
---
# Sales Agent Mobile — Login flow
# Uses testID selectors: username-input, password-input, login-btn

- launchApp:
    stopApp: true

# FIX-S56-007: if a previous flow left the app logged in, logout first so
# we land on the login screen for this smoke test.
- extendedWaitUntil:
    visible:
      text: "Terrio|Home|Agente Commerciale"
    timeout: 30000

- runFlow:
    when:
      visible: "Home"
    commands:
      # sales-agent uses the Profilo tab for sign out
      - tapOn: "Profilo"
      - extendedWaitUntil:
          visible: "Esci"
          timeout: 5000
      - tapOn: "Esci"
      - extendedWaitUntil:
          visible: "Agente Commerciale"
          timeout: 10000

- assertVisible: "Agente Commerciale"

- tapOn:
    id: "username-input"
- inputText: "dev-sales-agent"

- tapOn:
    id: "password-input"
- inputText: "dev-pass"

- tapOn:
    id: "login-btn"

# BUG-003: navigation within 8s
- extendedWaitUntil:
    visible: "Home"
    timeout: 8000
