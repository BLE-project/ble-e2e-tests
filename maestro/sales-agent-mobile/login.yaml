appId: it.terrio.salesagent
---
# Sales Agent Mobile — Login flow
# Uses testID selectors: username-input, password-input, login-btn

- launchApp:
    stopApp: true

# FIX-ITER6-001 (2026-05-02): unrooted device + release-signed APK refuses
# both `install -g` and `pm grant` — drain runtime permission dialogs that
# appear on cold-install (location precision picker → BLE → notification).
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            visible: "Mentre usi l'app|While using the app"
          commands:
            - tapOn: "Mentre usi l'app|While using the app"
      - runFlow:
          when:
            visible: "Consenti|Allow"
          commands:
            - tapOn: "Consenti|Allow"

# FIX-S56-007: if a previous flow left the app logged in, logout first so
# we land on the login screen for this smoke test.
- extendedWaitUntil:
    visible:
      text: "Terrio|Home|Agente Commerciale|TERRIO Sales|Assistenza merchant"
    timeout: 30000

- runFlow:
    when:
      visible: "Home"
    commands:
      # sales-agent uses the Profilo tab for sign out
      - tapOn: { id: "tab-profilo" }
      - extendedWaitUntil:
          visible: "Esci dall'account|Esci"
          timeout: 5000
      - tapOn: "Esci dall'account|Esci"
      - extendedWaitUntil:
          visible: "Agente Commerciale|TERRIO Sales|Assistenza merchant"
          timeout: 10000

- assertVisible: ".*(Agente Commerciale|TERRIO Sales|Assistenza merchant).*"

- tapOn:
    id: "username-input"
- inputText: "dev-sales-agent"
- hideKeyboard

- tapOn:
    id: "password-input"
- inputText: "dev-pass"
- hideKeyboard

- tapOn:
    id: "login-btn"

# La modale biometrica "Accesso più rapido" compare in modo ASINCRONO dopo che
# l'auth completa e SecureStore persiste — non nell'istante del tap login-btn.
# Un `runFlow when visible` one-shot valutato subito qui quasi sempre NON la
# trova ancora (race) → viene skippato → poi la modale compare, copre la Home e
# l'assert successiva fallisce (root cause dei fail login on-device 2026-07-02).
# Attendere esplicitamente la modale O la Home prima del dismiss elimina la
# race: su device fisico dove `pm clear` è negato l'opt-out può essere già
# persistito (compare Home diretta), altrimenti compare la modale e la si chiude
# con enroll-never (nessun side-effect di nav, a differenza di pressKey:Back).
- extendedWaitUntil:
    visible: "Accesso più rapido|Home"
    timeout: 15000
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      - tapOn:
          id: "enroll-never"

# BUG-003: navigation within 8s
- extendedWaitUntil:
    visible: "Home"
    timeout: 12000
