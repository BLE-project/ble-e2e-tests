appId: it.terrio.salesagent
---
# Sales Agent Mobile — Logout flow

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: ".*(Terrio|Agente Commerciale|Dashboard|TERRIO Sales|Assistenza merchant).*"
    timeout: 30000

# Previous flows may have persisted auth tokens in SecureStore. Only run
# the login steps if the login screen is actually showing.
- runFlow:
    # Login only when the login screen is showing. Its real sentinel is
    # "TERRIO Sales / Assistenza merchant sul territorio / Accedi" — NOT
    # "Agente Commerciale" (which never renders on the login screen, so the old
    # gate skipped login and the flow failed at tab-profilo when logged out).
    when:
      visible: "TERRIO Sales|Assistenza merchant|Accedi"
    commands:
      - tapOn:
          id: "username-input"
      - inputText: "dev-sales-agent"
      - hideKeyboard
      - tapOn:
          id: "password-input"
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn:
          id: "login-btn"
      # Iter3-A (iter11): dismiss biometric enrollment modal via testID rather
      # than pressKey:Back — see navigation.yaml comment for rationale.
      - runFlow:
          when:
            visible: "Accesso più rapido"
          commands:
            - tapOn:
                id: "enroll-never"
      # Iter15 (2026-05-04): mirrored navigation.yaml assertion-target widening.
      # `Dashboard` was a Tabs-internal screen-header title; `Panoramica` is
      # the dashboard body section heading (index.tsx:117) and is observable
      # in the accessibility tree as soon as the route mounts. 30s absorbs
      # SecureStore async + modal dismount animation + Tabs lazy-mount.
      - takeScreenshot: logout-post-modal-dismiss
      # Iter29 (2026-05-06): assert tab label "Home" instead of dashboard
      # body "Panoramica" — accessibility-tree stable as soon as Tabs mount,
      # mirrors the working login.yaml assertion. Avoids below-fold timing.
      - extendedWaitUntil:
          visible: "Home"
          timeout: 30000

# Dismiss Gboard clipboard suggestion panel if still covering tab bar.
- runFlow:
    when:
      visible: "Clipboard"
    commands:
      - pressKey: Back

- tapOn: { id: "tab-profilo" }
- extendedWaitUntil:
    visible: "Esci dall'account"
    timeout: 5000

# Sales-agent profile screen exposes an "Esci dall'account" button.
- tapOn: "Esci dall'account"

# Sprint14 P3 fix (2026-05-06): post-logout login-screen header is
# "TERRIO Sales / Assistenza merchant sul territorio" — not "Agente Commerciale"
# (which is only in the cold-launch broad assertion at top). Match the actual text.
- extendedWaitUntil:
    visible: ".*(TERRIO Sales|Assistenza merchant|Agente Commerciale).*"
    timeout: 8000
