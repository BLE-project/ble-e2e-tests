appId: com.terrio.salesagent
---
# Sales Agent Mobile — Logout flow

- launchApp:
    clearState: true

- extendedWaitUntil:
    visible: "Terrio"
    timeout: 30000

- tapOn:
    id: "username-input"
- inputText: "dev-sales-agent"
- tapOn:
    id: "password-input"
- inputText: "dev-pass"
- tapOn:
    id: "login-btn"

- extendedWaitUntil:
    visible: "Home"
    timeout: 8000

- tapOn: "Profilo"
- extendedWaitUntil:
    visible: "Profilo"
    timeout: 5000

- runFlow:
    when:
      visible: "Logout"
    commands:
      - tapOn: "Logout"

- runFlow:
    when:
      visible: "Esci"
    commands:
      - tapOn: "Esci"

- extendedWaitUntil:
    visible: "Agente Commerciale"
    timeout: 8000
