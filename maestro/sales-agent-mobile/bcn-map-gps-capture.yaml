appId: it.terrio.salesagent
---
# Sales-Agent Mobile — BCN-MAP-001 Phase 3a GPS capture flow.
#
# Mirrors merchant-mobile/bcn-map-gps-capture.yaml but in the sales-agent
# provisioning context. Sales-agent attaches a beacon to a merchant via
# the first-config wizard and is expected to capture GPS at install time.
#
# This flow tests the *standalone* GPS recapture (post-initial-config).
# First-config wizard GPS capture is covered by beacon-first-config.yaml.

- launchApp:
    stopApp: true

# Drain runtime permission prompts (location precision picker).
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            visible: "Mentre usi l'app|While using the app"
          commands:
            - tapOn: "Mentre usi l'app|While using the app"
      - runFlow:
          when:
            visible: "Consenti|Allow"
          commands:
            - tapOn: "Consenti|Allow"

# Login if not already authenticated.
- extendedWaitUntil:
    visible:
      text: "TERRIO Sales|Assistenza merchant.*|Terrio|Home|Agente Commerciale"
    timeout: 30000

- runFlow:
    when:
      visible: "TERRIO Sales|Assistenza merchant"
    commands:
      - tapOn: { id: "username-input" }
      - inputText: "dev-sales-agent"
      - hideKeyboard
      - tapOn: { id: "password-input" }
      - inputText: "dev-pass"
      - hideKeyboard
      - tapOn: { id: "login-btn" }
      - extendedWaitUntil:
          visible: "Home|Panoramica"
          timeout: 8000

# Dismiss biometric enroll modal cleanly.
- runFlow:
    when:
      visible: "Accesso più rapido"
    commands:
      - tapOn:
          id: "enroll-never"

# Navigate to provisioned beacons list (sales-agent context).
- tapOn:
    text: "Beacon|Provisionati|Provisioned"
- extendedWaitUntil:
    visible: "Cattura GPS|Capture GPS"
    timeout: 8000

# Recapture GPS for the first provisioned beacon.
- tapOn:
    text: "Cattura GPS"

# A clean-install APK has no location permission, so the first capture triggers
# the Android location dialog. On this OnePlus (OxygenOS) tablet-landscape build
# the dialog shows the precise/approx accuracy radios but renders the grant
# buttons BELOW the fold — swipe the dialog up to reveal "Mentre usi l'app",
# then grant. On a device that already holds the permission this whole block is
# a no-op (the dialog gate is false).
# The dialog appears ASYNC after the tap — wait for it (optional, so a
# pre-granted device falls straight through) before the gate evaluates.
- extendedWaitUntil:
    visible: ".*(accedere alla posizione|Consentire all'app|location).*"
    timeout: 12000
    optional: true
- runFlow:
    when: { visible: ".*(accedere alla posizione|Consentire all'app|location).*" }
    commands:
      - runFlow:
          when: { visible: "Esatta|Precise|Precisa" }
          commands: [ { tapOn: "Esatta|Precise|Precisa" } ]
      - swipe: { start: "52%, 88%", end: "52%, 38%", duration: 300 }
      - runFlow:
          when: { visible: "Mentre usi l'app|While using the app|Solo questa volta|Only this time|Consenti|Allow" }
          commands: [ { tapOn: "Mentre usi l'app|While using the app|Solo questa volta|Only this time|Consenti|Allow" } ]

- extendedWaitUntil:
    visible: "GPS salvato|GPS catturato|GPS acquisito|GPS captured"
    timeout: 60000

- assertVisible:
    text: "GPS salvato|GPS catturato|GPS acquisito|GPS captured"
