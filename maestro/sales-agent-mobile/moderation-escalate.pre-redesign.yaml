appId: it.terrio.salesagent
tags:
  - moderation
  - p0
---
# §9bis M8 P0 — Moderation ESCALATE flow.
# No TOTP required for escalation (Q9 decision: only approve/reject need 2FA).

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible: "Terrio|TERRIO Sales|Assistenza merchant|Home|Agente Commerciale"
    timeout: 30000

- runFlow:
    when: { visible: "Home" }
    commands:
      - tapOn: { id: "tab-profilo" }
      - extendedWaitUntil: { visible: "Esci dall'account|Esci|Logout", timeout: 5000 }
      - tapOn: { id: "btn-logout" }
      - extendedWaitUntil: { visible: "TERRIO Sales|Assistenza merchant.*|Agente Commerciale", timeout: 10000 }

- tapOn: { id: "username-input" }
- inputText: "dev-sales-agent"
- hideKeyboard
- tapOn: { id: "password-input" }
- inputText: "dev-pass"
- hideKeyboard
- runFlow:
    when: { visible: "Clipboard" }
    commands: [ { pressKey: Back } ]
- tapOn: { id: "login-btn" }
# Fresh-install biometric enrolment prompt appears POST-login → dismiss it.
- runFlow:
    when: { visible: "Accesso più rapido" }
    commands: [ { tapOn: "Non chiedermelo più" } ]
- extendedWaitUntil: { visible: "Home", timeout: 8000 }

- tapOn: "Moderazioni"
- extendedWaitUntil:
    visible:
      id: "moderation-row"
    timeout: 20000

- tapOn:
    id: "moderation-row"

- tapOn:
    id: "btn-escalate"

# Wait on the dialog's reason field (robust) rather than the styled title text.
- extendedWaitUntil:
    visible:
      id: "reason-input"
    timeout: 10000

- tapOn:
    id: "reason-input"
- inputText: "Caso borderline - richiede tenant admin"
- hideKeyboard

- tapOn:
    id: "confirm-action"

- extendedWaitUntil:
    visible: "Escalata|Moderazioni"
    timeout: 10000
