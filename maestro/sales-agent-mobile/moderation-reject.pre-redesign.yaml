appId: it.terrio.salesagent
tags:
  - moderation
  - p0
---
# §9bis M8 P0 — Moderation REJECT flow.

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible: "Terrio|TERRIO Sales|Assistenza merchant|Home|Agente Commerciale"
    timeout: 30000

- runFlow:
    when: { visible: "Home" }
    commands:
      - tapOn: { id: "tab-profilo" }
      - extendedWaitUntil: { visible: "Esci dall'account|Esci|Logout", timeout: 5000 }
      - tapOn: { id: "btn-logout" }
      - extendedWaitUntil: { visible: "TERRIO Sales|Assistenza merchant.*|Agente Commerciale", timeout: 10000 }

- tapOn: { id: "username-input" }
- inputText: "dev-sales-agent"
- hideKeyboard
- tapOn: { id: "password-input" }
- inputText: "dev-pass"
- hideKeyboard
- runFlow:
    when: { visible: "Clipboard" }
    commands: [ { pressKey: Back } ]
- tapOn: { id: "login-btn" }
# Fresh-install biometric enrolment prompt appears POST-login → dismiss it.
- runFlow:
    when: { visible: "Accesso più rapido" }
    commands: [ { tapOn: "Non chiedermelo più" } ]
- extendedWaitUntil: { visible: "Home", timeout: 8000 }

- tapOn: "Moderazioni"
- extendedWaitUntil:
    visible:
      id: "moderation-row"
    timeout: 20000

- tapOn:
    id: "moderation-row"

- extendedWaitUntil:
    visible: "ANALISI AI|DESCRIZIONE"
    timeout: 5000

- tapOn:
    id: "btn-reject"

- extendedWaitUntil:
    visible: "Rifiuta ADV"
    timeout: 3000

- tapOn:
    id: "reason-input"
- inputText: "Violazione policy prodotti regolamentati"
- hideKeyboard

- tapOn:
    id: "totp-input"
- inputText: "123456"
- hideKeyboard

- tapOn:
    id: "confirm-action"

- extendedWaitUntil:
    visible: "Rifiutata|rifiutata|ADV rifiutata"
    timeout: 10000
