appId: com.terrio.consumer
tags:
  - navigation
  - p1
  - ios
---
# Consumer Mobile — Full navigation flow (iOS)
# iOS: no hideKeyboard, no Clipboard dismiss, no Android location permission dialog.

- launchApp:
    stopApp: true

- extendedWaitUntil:
    visible:
      text: "TERRIO|Discover nearby offers|Nearby"
    timeout: 30000

- runFlow:
    when:
      visible: "Discover nearby offers"
    commands:
      - tapOn:
          text: "Email"
      - inputText: "dev-consumer"
      - tapOn:
          text: "Password"
      - inputText: "dev-pass"
      - tapOn: "Sign in"
      - runFlow:
          when:
            visible: "Return to previous programme"
          commands:
            - tapOn: "STAY HERE"
      - extendedWaitUntil:
          visible: "Nearby"
          timeout: 10000

- runFlow:
    when:
      visible: "Return to previous programme"
    commands:
      - tapOn: "STAY HERE"

- tapOn:
    text: ".*, Wallet"
- extendedWaitUntil:
    visible: "Wallet"
    timeout: 5000

- tapOn:
    text: ".*, Offerte"
- extendedWaitUntil:
    visible: "Offerte"
    timeout: 5000

- tapOn:
    text: ".*, Profilo"
- extendedWaitUntil:
    visible: "Profilo"
    timeout: 5000

# Redesign «4 + Altro» (2026-07): Discover / History / Nearby were demoted from
# the primary tab bar into the "Altro" hub. Open the Altro tab and verify the
# hub renders its rows, then drill into Mappa (nearby-tenants).
- tapOn:
    text: ".*, Altro"
- extendedWaitUntil:
    visible: "Cerca|Mappa|Cronologia"
    timeout: 5000

# Mappa (nearby-tenants) from the hub — triggers the iOS location dialog.
- tapOn: "Mappa"

- extendedWaitUntil:
    visible: "Allow While Using App|Allow Once|Allow"
    timeout: 5000
    optional: true
- runFlow:
    when:
      visible: "Allow While Using App"
    commands:
      - tapOn: "Allow While Using App"
- runFlow:
    when:
      visible: "Allow Once"
    commands:
      - tapOn: "Allow Once"

- runFlow:
    when:
      visible:
        text: "^Error$"
    commands:
      - tapOn: "OK"

- extendedWaitUntil:
    visible: "Programmi vicini"
    timeout: 8000
