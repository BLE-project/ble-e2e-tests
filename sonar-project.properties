sonar.projectKey=ble-e2e-tests
sonar.projectName=ble-e2e-tests
sonar.sources=.
# SQ-2 (#15): exclude test-only utility scripts from analysis. They live on
# developer / CI runner workstations only — never deployed — so Sonar's
# security hotspots on shell/python helpers (curl flags, dynamic eval,
# temp-file usage) do not represent a runtime attack surface.
sonar.exclusions=node_modules/**,scripts/**,maestro/**,**/*.lock,**/coverage/**,**/dist/**,**/build/**,target/**
sonar.test.inclusions=scripts/**,maestro/**
sonar.qualitygate.wait=false
