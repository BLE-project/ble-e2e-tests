name: E2E full reset (Playwright + Maestro)

# ble-e2e-tests#124 — invoke scripts/reset-e2e.sh (clean volumes, gated
# readiness, canonical seed) as an actual CI job, then run the Playwright
# suite against the freshly-reset stack. Maestro runs as a non-blocking
# syntax-check (same pattern as terrio-consumer-mobile/.github/workflows/e2e.yml)
# since a real on-device/emulator run needs signed APKs per app and is out of
# scope for this shared test-fixtures repo — see ble-e2e-tests#124 for the
# on-device follow-up.
#
# Cost note: this rebuilds all 9 Java backend services from source (Maven,
# via GitHub Packages for terrio-platform-commons) plus the full Docker
# Compose stack, plus 3 frontend dev servers (admin-web/tenant-web/
# merchant-portal — see scripts/start-frontends.sh). That is too expensive
# to run on every push/PR, so this is scheduled nightly + manually
# dispatchable, NOT wired into pull_request.
#
# marketing-site (Astro, :4321) IS covered since #151: Astro 6 requires
# Node >=22.12 while the 3 Vite apps run under the job's Node 20 pin, so
# the marketing build+preview runs in dedicated steps under a temporary
# setup-node 22 BEFORE the Node 20 setup. The preview keeps running as a
# background process (its node binary is resolved at spawn time, so the
# later PATH switch to Node 20 doesn't affect it).

on:
  workflow_dispatch: {}
  schedule:
    # Nightly 03:00 UTC — after the security.yml Monday scan, off peak hours.
    - cron: '0 3 * * *'

permissions:
  contents: read
  packages: read

jobs:
  full-reset:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      # Single source for the Grafana webhook shared secret so BOTH the
      # notification-service container (docker-compose reads
      # ${BLE_ALERT_WEBHOOK_TOKEN:-e2e-alert-webhook-secret-token-2026-not-prod})
      # and the Playwright client (tests/api/beacon-health-alert.spec.ts, which
      # otherwise defaults to 'dev-alert-secret') use the SAME value. Without
      # this the client sent the wrong Bearer → 401 on all 7 valid-token cases
      # (beacon-health-alert payload/dispatch), while the 3 negative cases that
      # expect 401 passed. Ties client+server to one secret, no drift. (#124)
      BLE_ALERT_WEBHOOK_TOKEN: e2e-alert-webhook-secret-token-2026-not-prod
    steps:
      - name: Checkout ble-e2e-tests
        uses: actions/checkout@v4
        with:
          path: terrio-e2e-tests

      - name: Checkout ble-e2e-compose (sibling)
        env:
          GH_PAT: ${{ secrets.GH_PAT_BACKEND_READ }}
        run: |
          set -euo pipefail
          git clone --depth 1 \
            "https://x-access-token:${GH_PAT}@github.com/BLE-project/ble-e2e-compose.git" \
            terrio-e2e-compose

      - name: Checkout backend service repos (siblings, private)
        # docker-compose.yml build contexts reference ../terrio-<service> —
        # these need to exist as siblings of terrio-e2e-compose. All 9
        # services + terrio-platform-commons are private repos in the same
        # org, so the default GITHUB_TOKEN (scoped to this repo only) can't
        # check them out. GH_PAT_BACKEND_READ already exists as a repo secret
        # (created 2026-04-27) for exactly this; it was unused until now.
        env:
          GH_PAT: ${{ secrets.GH_PAT_BACKEND_READ }}
        run: |
          set -euo pipefail
          repos="platform-commons identity-access core-registry event-ingestion cashback-ledger stream-processing notification-service reporting-pa gamification api-gateway-bff"
          for svc in $repos; do
            git clone --depth 1 \
              "https://x-access-token:${GH_PAT}@github.com/BLE-project/ble-${svc}.git" \
              "terrio-${svc}"
          done

      - name: Checkout frontend repos (siblings, private)
        # First 3 are started by scripts/start-frontends.sh (Vite, Node 20);
        # marketing-site is built+previewed by the dedicated Node 22 steps
        # below (Astro 6 requires Node >=22.12 — see workflow header).
        env:
          GH_PAT: ${{ secrets.GH_PAT_BACKEND_READ }}
        run: |
          set -euo pipefail
          repos="backoffice-admin-web backoffice-tenant-web merchant-portal marketing-site"
          for svc in $repos; do
            git clone --depth 1 \
              "https://x-access-token:${GH_PAT}@github.com/BLE-project/ble-${svc}.git" \
              "terrio-${svc}"
          done

      - name: Generate Maven settings for GitHub Packages (terrio-platform-commons)
        # Same auth pattern already used successfully in CI by
        # terrio-cashback-ledger/.github/workflows/ci.yml and siblings:
        # a token with read:packages, not the interactive `gh auth` OAuth
        # token the Makefile comment warns about (that warning is about local
        # dev machines, not CI). GH_PAT_BACKEND_READ covers packages:read too.
        #
        # NOTE: this writes settings.xml directly rather than calling
        # `make maven-settings` in ble-e2e-compose. That target's pre-flight
        # curl health-check returned HTTP 302 on GitHub Actions runners (run
        # https://github.com/BLE-project/ble-e2e-tests/actions/runs/28515349295)
        # — likely a redirect-following/actor-pairing quirk of that check on
        # this network path, not proof the PAT itself is invalid. The real
        # test is Maven actually resolving terrio-platform-commons during the
        # Docker build below, which surfaces a clear 401 if the token is bad.
        working-directory: terrio-e2e-compose
        env:
          MAVEN_TOKEN: ${{ secrets.GH_PAT_BACKEND_READ }}
        run: |
          set -euo pipefail
          mkdir -p secrets
          umask 077
          printf '%s\n' \
            '<settings><servers><server><id>github</id><username>x-access-token</username><password>'"$MAVEN_TOKEN"'</password></server></servers></settings>' \
            > secrets/maven-settings.xml

      - name: Set up Node 22 (marketing-site only — Astro 6 requires >=22.12)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build and start marketing-site preview (Astro, :4321)
        # Runs while Node 22 is on PATH; the backgrounded preview process
        # keeps its Node 22 binary after the next setup-node switches the
        # job to Node 20 (same nohup+disown persistence pattern as
        # scripts/start-frontends.sh). Static output + node adapter: the 7
        # marketing-site smoke tests need no BFF/Docker stack.
        working-directory: terrio-marketing-site
        run: |
          set -euo pipefail
          npm ci
          npm run build
          LOG_DIR="${GITHUB_WORKSPACE}/terrio-e2e-tests/test-results/frontend-logs"
          mkdir -p "$LOG_DIR"
          nohup npx astro preview --host 127.0.0.1 --port 4321 \
            > "$LOG_DIR/marketing-site.log" 2>&1 &
          disown
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://127.0.0.1:4321/; then
              echo "marketing-site preview up on :4321"
              exit 0
            fi
            sleep 1
          done
          echo "::error::marketing-site preview not responding on :4321"
          cat "$LOG_DIR/marketing-site.log" || true
          exit 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: terrio-e2e-tests/package-lock.json

      - name: Install e2e-tests dependencies
        working-directory: terrio-e2e-tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: terrio-e2e-tests
        run: npx playwright install --with-deps chromium

      - name: Reset stack from a clean state (scripts/reset-e2e.sh)
        working-directory: terrio-e2e-tests
        env:
          COMPOSE_DIR: ${{ github.workspace }}/terrio-e2e-compose
          # Fresh runner has no local terrio/*:local images yet — first
          # `docker compose up --wait` triggers the Maven-backed image builds
          # using the maven-settings.xml generated above.
          STACK_WAIT_TIMEOUT: '900'
        # bash explicitly: the exec bit on scripts/reset-e2e.sh isn't set in
        # git (100644, not 100755 — see run 28515500726), and `chmod +x` in a
        # prior step would be lost/racy across checkout re-clones anyway.
        run: bash ./scripts/reset-e2e.sh

      - name: Start frontend dev servers (admin-web, tenant-web, merchant-portal)
        working-directory: terrio-e2e-tests
        # Started as background processes (nohup + disown) that persist for
        # the rest of the job. marketing-site is NOT part of this script:
        # it already runs from the dedicated Node 22 preview step above.
        run: bash ./scripts/start-frontends.sh

      - name: Run Playwright suite
        working-directory: terrio-e2e-tests
        env:
          # Diagnosed 2026-07-01 (run 28533634636): 13 of the 15 fixture files
          # under fixtures/ default BFF_URL to http://localhost:8080 (the
          # container-internal port), not the host-mapped 8082 that
          # docker-compose.yml actually publishes. Without an explicit env
          # here, global-setup's seed step gets ECONNREFUSED on ::1:8080 and
          # every CRUD-dependent test fails downstream. playwright.config.ts
          # itself already defaults correctly to 8082 — only the fixtures
          # disagree, which is why this wasn't caught by the browser tests.
          BFF_URL: http://localhost:8082
          KC_URL: http://localhost:8180
          # 127.0.0.1 explicitly: the preview binds IPv4 only, while the
          # config default localhost:4321 can resolve to ::1 first on the
          # runner (same class of failure as the BFF_URL note above).
          MARKETING_URL: http://127.0.0.1:4321
        run: npx playwright test

      - name: Dump commission_rates (diagnose #124 commission-territory 500)
        # Diagnosed 2026-07-01: CommissionRateResource.resolve() throws 500
        # if findGlobal() finds no active GLOBAL row for CURRENT_DATE.
        # Verified locally the migration seeds one and RLS doesn't hide it —
        # dumping here to catch whatever is actually different in THIS run's
        # ephemeral DB (missing row, wrong validFrom/validTo, etc.) instead
        # of guessing again after the DB is torn down.
        if: always()
        working-directory: terrio-e2e-compose
        run: |
          echo "==> commission_rates (all rows)"
          docker compose exec -T postgres psql -U "${POSTGRES_USER:-ble}" -d ble_core \
            -c "SELECT scope, tenant_id, rate, valid_from, valid_to, now() AS db_now FROM commission_rates ORDER BY scope, valid_from;" \
            || echo "::warning:: dump failed (postgres not reachable or query error)"

      - name: Dump FCM beacon pipeline diagnostics (beacon-push-fcm #124)
        # Boundary evidence for the deterministically-red beacon-push-fcm Step 2
        # ("no FCM messages:send within 90s"). The error-context artifact carries
        # neither the WireMock journal nor service logs, so it cannot localise the
        # broken stage. This step dumps, at teardown, the three signals that pin it:
        #   1. notification-service beacon metric ble.notification.beacon.events
        #      {outcome=...} — the single most decisive counter:
        #        dispatched        → tokens found + orchestrator called (look at logs
        #                            for consent/rule/cap suppression or FCM error)
        #        no_tokens         → token lookup (tenantId,consumerId) empty
        #                            (consumerId/pseudonym mismatch)
        #        dropped_missing_ids → enriched event had null tenantId/consumerId
        #        (counter absent / all zero) → event never reached the dispatcher
        #                            (stream-processing didn't publish, or the
        #                            enriched-events consumer never consumed it)
        #   2. WireMock journal — did OAuth /oauth2/token arrive? any messages:send
        #      at all (maybe with a different token)?
        #   3. notification-service / event-ingestion / stream-processing logs.
        if: always()
        working-directory: terrio-e2e-compose
        run: |
          echo "==> [1] notification-service beacon + FCM metrics (host :8084)"
          curl -s http://localhost:8084/q/metrics \
            | grep -iE "beacon|fcm|notification_dispatch" || echo "(no beacon metrics — endpoint unreachable or zero events)"
          echo "==> [2a] WireMock journal — request count by method+url"
          curl -s http://localhost:8091/__admin/requests \
            | jq -r '.requests[]? | "\(.request.method) \(.request.url)"' \
            | sort | uniq -c | sort -rn || echo "::warning:: wiremock journal unreachable"
          echo "==> [2b] WireMock — messages:send bodies (was a token targeted?)"
          curl -s http://localhost:8091/__admin/requests \
            | jq -r '.requests[]? | select(.request.url | test("messages:send")) | .request.body' || true
          echo "==> [2c] WireMock — OAuth token requests present?"
          curl -s http://localhost:8091/__admin/requests \
            | jq -r '.requests[]? | select(.request.url | test("oauth2/token")) | "\(.request.method) \(.request.url)"' | head || true
          echo "==> [3a] notification-service logs (dispatch / consent / fcm)"
          docker compose logs --tail=500 notification-service 2>&1 \
            | grep -iE "beacon|consent|NOTIFY|dispatch|fcm|no_tokens|NO_RULE|CAPPED|GATEWAY|SENT|outcome|token|unreachable" | tail -150 || true
          echo "==> [3b] event-ingestion logs (ingest / tenant claim / outbox)"
          docker compose logs --tail=300 event-ingestion 2>&1 \
            | grep -iE "tenant|consumer|outbox|reject|ANY|RECEIVED|DUPLICATE|publish|dlq|pseudonym" | tail -100 || true
          echo "==> [3c] stream-processing logs (raw -> enriched publish)"
          docker compose logs --tail=300 stream-processing 2>&1 \
            | grep -iE "enrich|raw|tenant|drop|publish|fraud|ADR-003|failed" | tail -100 || true

      - name: Install Maestro CLI
        if: always()
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Maestro flow syntax check — all 5 apps, Android + iOS
        # Non-blocking (|| true): this validates flow YAML only, it does not
        # exercise app behavior. Real release-critical Maestro runs happen
        # on-device (see memory: emulator CI is non-fatal smoke, on-device is
        # canonical) — signed per-app APKs/IPAs are out of scope here.
        if: always()
        working-directory: terrio-e2e-tests
        run: maestro test --format junit maestro/ || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: terrio-e2e-tests/playwright-report/
          retention-days: 14

      - name: Upload test-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: terrio-e2e-tests/test-results/
          retention-days: 14
