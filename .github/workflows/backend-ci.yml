name: Backend CI (Quarkus microservices)

# §16 — Backend JUnit smoke tests fetched from the private service repos.
# Runs on every push to main/master + PRs.
#
# IMPORTANT: notification-service and core-registry jobs require
#   GH_PAT_BACKEND_READ (repo-scoped PAT) to be configured as a repository
#   secret. Without it the cross-repo checkout will fail with 401/404.
#   Both jobs are marked continue-on-error so a missing PAT does NOT
#   block the overall pipeline — configure the secret to get full coverage.
#
# The Playwright E2E suite lives in e2e-playwright.yml which spins up the
# full compose stack. Do NOT add playwright runs here without a live stack.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  notification-service:
    runs-on: ubuntu-latest
    steps:
      # Sentinel: GitHub doesn't allow `secrets` in job-level `if:`, so we
      # check at the first step. When GH_PAT_BACKEND_READ is missing, all
      # subsequent steps are skipped and the job reports SUCCESS rather
      # than FAILURE (which is what previously happened with the
      # `continue-on-error: true` workaround). Configure
      # GH_PAT_BACKEND_READ as a repo secret for full coverage.
      - name: Check PAT
        id: pat
        env:
          PAT: ${{ secrets.GH_PAT_BACKEND_READ }}
        run: |
          if [ -z "$PAT" ]; then
            echo "::warning::GH_PAT_BACKEND_READ not configured — skipping cross-repo backend test"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.pat.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          repository: BLE-project/ble-notification-service
          path: svc
          token: ${{ secrets.GH_PAT_BACKEND_READ }}

      - if: steps.pat.outputs.skip != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'maven'

      - if: steps.pat.outputs.skip != 'true'
        name: Build & Test
        working-directory: svc
        run: ./mvnw -B clean test

      - if: ${{ always() && steps.pat.outputs.skip != 'true' }}
        name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: notification-service-coverage
          path: svc/target/site/jacoco/

  core-registry:
    runs-on: ubuntu-latest
    steps:
      - name: Check PAT
        id: pat
        env:
          PAT: ${{ secrets.GH_PAT_BACKEND_READ }}
        run: |
          if [ -z "$PAT" ]; then
            echo "::warning::GH_PAT_BACKEND_READ not configured — skipping cross-repo backend test"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.pat.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          repository: BLE-project/ble-core-registry
          path: svc
          token: ${{ secrets.GH_PAT_BACKEND_READ }}

      - if: steps.pat.outputs.skip != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'maven'

      - if: steps.pat.outputs.skip != 'true'
        name: Build & Test
        working-directory: svc
        run: ./mvnw -B clean test
