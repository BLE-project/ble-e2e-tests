name: Security audit (S60 — M1 of v8.0)

# Runs weekly + on push to main. Gates for release:
#  1. CodeQL static analysis (JS/TS + Java)
#  2. Dependency vulnerability scan via Trivy
#  3. Secrets scan via gitleaks
#  4. OWASP ZAP baseline (Playwright + stack up)
#
# Artifacts uploaded as PR comments / GitHub Security tab.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Every Monday 03:00 UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ── CodeQL static analysis ───────────────────────────────────────────────
  codeql:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, java-kotlin]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild (JS/Java)
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}

  # ── Dependency scan (Trivy) ─────────────────────────────────────────────
  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          exit-code: 1    # fail on critical/high
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif

  # ── Trivy container scan (when we have signed images) ───────────────────
  trivy-images:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        service:
          - ble-api-gateway-bff
          - ble-core-registry
          - ble-identity-access
          - ble-notification-service
          - ble-cashback-ledger
          - ble-gamification
          - ble-event-ingestion
          - ble-reporting-pa
          - ble-stream-processing
    steps:
      - name: Pull image
        run: docker pull ghcr.io/ble-project/${{ matrix.service }}:latest || echo "Image not yet published; skip"

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true    # don't fail matrix if one image is missing
        with:
          image-ref: ghcr.io/ble-project/${{ matrix.service }}:latest
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH

      - name: Upload scan SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

  # ── Secrets scan (gitleaks) ─────────────────────────────────────────────
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: true

  # ── OWASP ZAP baseline (only on schedule, needs stack up) ───────────────
  zap-baseline:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Start Docker stack (infra only)
        run: |
          cd ../terrio-e2e-compose 2>/dev/null || true
          docker compose up -d postgres redis redpanda minio keycloak || echo "Compose not accessible on this runner"

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.13.0
        continue-on-error: true
        with:
          target: http://localhost:8080
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -I'
          token: ${{ secrets.GITHUB_TOKEN }}
