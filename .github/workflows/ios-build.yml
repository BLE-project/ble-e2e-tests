name: iOS IPA Build (5 apps, macOS runner)

# §18 master plan — iOS build pipeline. Runs on macos-14 (Xcode 16).
# Triggered on tag `mobile-v*-ios` or manual.
#
# Requires repo-level secrets:
#   APP_STORE_CONNECT_KEY_ID
#   APP_STORE_CONNECT_ISSUER_ID
#   APP_STORE_CONNECT_PRIVATE_KEY_B64   (base64 of AuthKey_*.p8)
#   MATCH_PASSWORD                       (if using fastlane match for signing)

on:
  push:
    tags:
      - 'mobile-v*-ios'
  workflow_dispatch:
    inputs:
      app:
        description: 'App to build'
        default: consumer
        type: choice
        options:
          - consumer
          - merchant
          - tenant
          - sales-agent
          - territory

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        app:
          - consumer
          - merchant
          - tenant
          - sales-agent
          - territory
    runs-on: macos-14
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          repository: BLE-project/ble-${{ matrix.app }}-mobile
          path: app
          token: ${{ secrets.GH_PAT_MOBILE_READ }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Install dependencies
        working-directory: app
        run: npm ci --legacy-peer-deps

      - name: Expo prebuild (iOS)
        working-directory: app
        run: npx expo prebuild --platform ios --clean --no-install

      - name: CocoaPods
        working-directory: app/ios
        run: |
          bundle install || true
          pod install --repo-update

      - name: Archive xcodebuild
        working-directory: app/ios
        run: |
          xcodebuild archive \
            -workspace *.xcworkspace \
            -scheme "$(ls *.xcworkspace | sed 's/.xcworkspace//')" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/app.xcarchive \
            CODE_SIGNING_ALLOWED=NO || echo "⚠ Unsigned archive (signing deferred)"

      - name: Upload xcarchive as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ble-${{ matrix.app }}-ios.xcarchive
          path: app/ios/build/app.xcarchive
          retention-days: 30
