name: Mobile APK Build (5 apps, parallel)

# §16 master plan — CI pipeline for all 5 mobile apps + DS-MOB-004 emulator Maestro.
# Builds each app's debug APK, then runs the full Maestro suite on an Android
# emulator (reactivecircus/android-emulator-runner) against the e2e-compose stack.
#
# Triggers:
#   - tag `mobile-v*` push (release candidate)
#   - manual workflow_dispatch
#   - nightly schedule (the emulator pass is heavy → never on PRs)
#
# PAT gating: building the APKs needs read access to the per-app repos
# (GH_PAT_MOBILE_READ); the Maestro stack needs ble-e2e-compose read access.
# Both fall back to GH_PAT_BACKEND_READ. When no usable PAT is configured the
# affected steps skip with a ::notice:: instead of failing the run.

on:
  push:
    tags:
      - 'mobile-v*'
  workflow_dispatch:
    inputs:
      app:
        description: 'Specific app to build (or "all")'
        default: all
        type: choice
        options:
          - all
          - consumer
          - merchant
          - tenant
          - sales-agent
          - territory
  schedule:
    # Nightly emulator Maestro run at 04:00 UTC (heavy; not on every PR).
    - cron: '0 4 * * *'

permissions:
  contents: read
  packages: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        app:
          - consumer
          - merchant
          - tenant
          - sales-agent
          - territory
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app repo
        id: appco
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: BLE-project/ble-${{ matrix.app }}-mobile
          path: app
          token: ${{ secrets.GH_PAT_MOBILE_READ || secrets.GH_PAT_BACKEND_READ }}

      - name: Skip notice (no mobile-read PAT)
        if: steps.appco.outcome != 'success'
        run: echo "::notice title=build skipped::ble-${{ matrix.app }}-mobile checkout failed (no PAT with read access). Set GH_PAT_MOBILE_READ to build the APK + run the emulator Maestro suite."

      - name: Set up Node
        if: steps.appco.outcome == 'success'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Set up JDK 17
        if: steps.appco.outcome == 'success'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        if: steps.appco.outcome == 'success'
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Install dependencies
        if: steps.appco.outcome == 'success'
        working-directory: app
        run: npm ci --legacy-peer-deps

      - name: Expo prebuild (Android)
        if: steps.appco.outcome == 'success'
        working-directory: app
        run: npx expo prebuild --platform android --clean --no-install

      # Build the RELEASE variant, not debug. The apps depend on expo-dev-client,
      # whose debug build boots into the dev-launcher ("Start a local development
      # server … Connect") and waits for Metro on :8081 instead of loading the
      # embedded JS bundle. On a physical device that worked because Metro ran on
      # the host (adb reverse :8081); CI has no Metro, so every debug APK sat on
      # the launcher and all 39 flows failed (run #7/#8, confirmed via the
      # uploaded Maestro screenshot). The release variant is standalone: it
      # auto-embeds the JS bundle (bundleReleaseJsAndAssets), excludes the
      # dev-launcher, and the Expo template signs release with the debug keystore
      # (no custom keystore) with minify off (testIDs preserved) — verified in
      # app/build.gradle (signingConfig signingConfigs.debug,
      # enableMinifyInReleaseBuilds=false).
      - name: Gradle assembleRelease
        if: steps.appco.outcome == 'success'
        working-directory: app/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        if: steps.appco.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ble-${{ matrix.app }}-dev.apk
          path: app/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

  # DS-MOB-004 — deterministic Maestro suite on an Android emulator.
  #   FU-TI-1   realm-ble.json token TTL is baked into the compose stack
  #   FU-TI-2/4 per-flow re-seed via fixtures/seed-cli.ts (run-maestro-suite.sh)
  #   FU-TI-3   per-flow `pm clear` isolation (emulator shell holds the perm)
  # Needs the e2e-compose backend stack: with no read PAT the suite skips
  # (notice, not failure) instead of running blind against no backend.
  # Runs on tag push / manual dispatch / nightly — never on PRs (too heavy).
  maestro:
    needs: build
    runs-on: ubuntu-latest
    # Run after the build job even if some APK legs failed (the install loop only
    # installs the APKs that exist) — just not on PRs and not when cancelled.
    if: ${{ always() && github.event_name != 'pull_request' }}
    env:
      BFF_URL: http://localhost:8080
      KC_URL:  http://localhost:8180
    steps:
      - uses: actions/checkout@v4

      - name: Checkout terrio-e2e-compose
        id: compose
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: BLE-project/ble-e2e-compose
          path: e2e-compose
          token: ${{ secrets.GH_PAT || secrets.GH_PAT_BACKEND_READ }}

      - name: Skip notice (no compose access)
        if: steps.compose.outcome != 'success'
        run: echo "::notice title=maestro skipped::ble-e2e-compose checkout failed (no PAT with read access). The Maestro suite needs the backend stack; skipping. Set a PAT with ble-e2e-compose read access to enable it."

      - name: Set up Node
        if: steps.compose.outcome == 'success'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install deps (seed-cli / tsx)
        if: steps.compose.outcome == 'success'
        run: npm ci

      - name: Download all APK artifacts
        if: steps.compose.outcome == 'success'
        uses: actions/download-artifact@v4
        with:
          path: apks

      - name: Install Maestro
        if: steps.compose.outcome == 'success'
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      # Brings up the backend the Maestro flows drive. The e2e-compose stack
      # builds its service images from sibling repos (terrio/*:local) — those
      # are not published to a registry, so in CI `up` tries to PULL them and
      # fails ("pull access denied … repository does not exist"). Until the
      # service images are published (GHCR) or built in CI, this step is
      # continue-on-error and the emulator run skips with a clear notice rather
      # than failing the whole workflow red. Same backend-image gap that blocks
      # e2e-playwright's stack step.
      - name: Log in to GHCR
        if: steps.compose.outcome == 'success'
        # The ghcr.io/ble-project/terrio-*:e2e packages are org-internal, so the
        # job's GITHUB_TOKEN (permissions: packages: read) can pull them — no PAT
        # needed (GH_PAT_BACKEND_READ lacks read:packages, verified 2026-06-14).
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Bring up E2E stack (GHCR images)
        id: stack
        if: steps.compose.outcome == 'success'
        continue-on-error: true
        working-directory: e2e-compose
        run: |
          # The compose reads POSTGRES_USER/PASSWORD/DB/TZ etc. from .env, which is
          # gitignored. Without it Postgres starts with an empty password and exits
          # 1 ("Database is uninitialized and superuser password is not specified"),
          # taking the whole stack down. .env.example carries working dev defaults.
          cp .env.example .env
          COMPOSE="-f docker-compose.yml -f docker-compose.override.yml -f docker-compose.ci.yml"
          docker compose $COMPOSE pull
          docker compose $COMPOSE up -d --no-build --wait --wait-timeout 300
          docker compose $COMPOSE ps

      - name: Skip notice (backend stack unavailable)
        if: steps.compose.outcome == 'success' && steps.stack.outcome != 'success'
        run: echo "::notice title=maestro skipped::e2e-compose stack failed to come up (service images terrio/*:local are not in a registry — they must be published to GHCR or built in CI). APKs built OK; emulator Maestro skipped."

      - name: Wait for BFF readiness
        if: steps.stack.outcome == 'success'
        run: |
          for i in $(seq 1 60); do
            curl -fsS http://localhost:8080/q/health/ready >/dev/null 2>&1 && { echo "BFF ready after ${i}s"; exit 0; }
            sleep 2
          done
          echo "BFF never became ready"; exit 1

      - name: Base seed (tenant + territory + KC claims + fixtures)
        if: steps.stack.outcome == 'success'
        run: npx tsx fixtures/seed-all.ts

      - name: Enable KVM
        if: steps.stack.outcome == 'success'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro suite (deterministic, FU-TI-1..4)
        if: steps.stack.outcome == 'success'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          # Reliability: headless emulator with swiftshader GPU + no snapshot/boot-anim
          # avoids the "Timeout waiting for emulator to boot" flakiness on GitHub
          # KVM runners (observed 2026-06-15). Generous boot timeout + cold AVD.
          force-avd-creation: true
          emulator-boot-timeout: 600
          disable-animations: true
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          script: |
            adb reverse tcp:8080 tcp:8080
            adb reverse tcp:8180 tcp:8180
            DEVICE=emulator-5554 bash scripts/ci-install-apks.sh
            DEVICE=emulator-5554 bash scripts/ci-probe-bff.sh
            DEVICE=emulator-5554 BFF_URL=http://localhost:8080 bash scripts/run-maestro-suite.sh

      # Diagnostic evidence: Maestro writes a screenshot + view hierarchy +
      # commands.json per flow under maestro-debug/<app>__<flow>/. Upload on
      # every outcome so a failing run (apps not reaching home/login) can be
      # diagnosed from the actual stuck screen instead of blind.
      - name: Upload Maestro debug artifacts
        if: always() && steps.stack.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: maestro-debug
          path: maestro-debug/
          retention-days: 14
          if-no-files-found: warn

      - name: Tear down stack
        if: always() && steps.compose.outcome == 'success'
        working-directory: e2e-compose
        run: docker compose -f docker-compose.yml -f docker-compose.override.yml -f docker-compose.ci.yml down --volumes --remove-orphans
