name: Mobile APK Build (5 apps, parallel)

# §16 master plan — CI pipeline for all 5 mobile apps.
# Triggered by tags `mobile-v*` or manual dispatch.
# Each app builds its debug APK as an artifact (release signing in S59).

on:
  push:
    tags:
      - 'mobile-v*'
  workflow_dispatch:
    inputs:
      app:
        description: 'Specific app to build (or "all")'
        default: all
        type: choice
        options:
          - all
          - consumer
          - merchant
          - tenant
          - sales-agent
          - territory

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        app:
          - consumer
          - merchant
          - tenant
          - sales-agent
          - territory
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          repository: BLE-project/ble-${{ matrix.app }}-mobile
          path: app
          token: ${{ secrets.GH_PAT_MOBILE_READ }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Install dependencies
        working-directory: app
        run: npm ci --legacy-peer-deps

      - name: Expo prebuild (Android)
        working-directory: app
        run: npx expo prebuild --platform android --clean --no-install

      - name: Embed JS bundle
        working-directory: app
        run: |
          mkdir -p android/app/src/main/assets android/app/src/main/res/raw
          npx expo export:embed --platform android --dev false \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Gradle assembleDebug
        working-directory: app/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ble-${{ matrix.app }}-dev.apk
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  maestro:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: apks

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro smoke
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          script: |
            for app in consumer merchant tenant sales-agent territory; do
              apk=$(find apks -name "ble-${app}-dev.apk" | head -1)
              if [ -f "$apk" ]; then
                adb install -r "$apk"
                maestro test maestro/${app}-mobile/ --flatten-debug-output || true
              fi
            done
